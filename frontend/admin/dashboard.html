<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Administrador</title>
    <link rel="icon" type="image/png" href="/assets/logo_V2.png">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        /* ── Selector de mes ── */
        .selector-mes {
            display: flex;
            align-items: center;
            gap: 8px;
            background: white;
            border: 1px solid var(--gris-borde);
            border-radius: 8px;
            padding: 6px 14px;
        }
        .selector-mes label { font-size: 12px; color: var(--gris); white-space: nowrap; }
        .selector-mes select {
            border: none; background: none; font-size: 14px;
            font-weight: 600; color: var(--texto); padding: 0;
            cursor: pointer; outline: none;
        }
        .nav-mes-btns button { padding: 6px 13px; font-size: 17px; line-height: 1; }

        /* ── Secciones del dashboard ── */
        .dash-seccion { margin-bottom: 24px; }
        .dash-seccion-titulo {
            font-size: 11px; font-weight: 700; text-transform: uppercase;
            letter-spacing: .7px; color: var(--gris); margin-bottom: 10px;
            border-bottom: 1px solid var(--gris-borde); padding-bottom: 6px;
        }

        /* ── Grid de KPI cards ── */
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
        .kpi-card {
            background: white; border: 1px solid var(--gris-borde); border-radius: 10px;
            padding: 14px 16px; text-align: center;
        }
        .kpi-card .val { font-size: 22px; font-weight: 700; color: var(--primario); line-height: 1.2; }
        .kpi-card .val.verde  { color: #27ae60; }
        .kpi-card .val.naranja { color: #e67e22; }
        .kpi-card .val.rojo   { color: #c0392b; }
        .kpi-card .val.azul   { color: #2980b9; }
        .kpi-card .val.morado { color: #8e44ad; }
        .kpi-card .lbl { font-size: 12px; color: var(--gris); margin-top: 4px; line-height: 1.3; }
        .kpi-card .sub { font-size: 11px; color: #aaa; margin-top: 2px; }

        /* ── Bloque de montos (jurados / delegados / total) ── */
        .monto-bloque {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
        }
        .monto-col {
            background: white; border: 1px solid var(--gris-borde);
            border-radius: 10px; padding: 14px 16px;
        }
        .monto-col-titulo {
            font-size: 12px; font-weight: 700; text-transform: uppercase;
            letter-spacing: .5px; margin-bottom: 10px; padding-bottom: 6px;
            border-bottom: 2px solid var(--gris-borde);
        }
        .monto-col-titulo.jurado   { color: var(--primario); border-color: var(--primario); }
        .monto-col-titulo.delegado { color: #27ae60; border-color: #27ae60; }
        .monto-col-titulo.total    { color: #8e44ad; border-color: #8e44ad; }
        .monto-fila {
            display: flex; justify-content: space-between;
            align-items: center; font-size: 13px;
            padding: 4px 0; border-bottom: 1px solid #f0f0f0;
        }
        .monto-fila:last-child { border-bottom: none; }
        .monto-fila .etiq { color: var(--gris); }
        .monto-fila .cifra { font-weight: 600; color: var(--texto); font-variant-numeric: tabular-nums; }
        .monto-fila.total-fila .cifra { color: var(--primario); font-size: 14px; }
        .monto-fila.liquido-fila .cifra { color: #27ae60; font-size: 14px; }
        .monto-fila.retencion-fila .cifra { color: #c0392b; }

        @media (max-width: 800px) {
            .monto-bloque { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <img src="/assets/logo_V2.png" alt="Federación del Rodeo Chileno" style="width:72px; height:72px; object-fit:contain; margin-bottom:6px;">
            <h2>Sistema de Jurados<br>Rodeo Chileno</h2>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-seccion">Principal</div>
            <a href="/admin/dashboard.html" class="nav-item activo"><span class="icon">📊</span> Dashboard</a>
            <div class="nav-seccion">Personas</div>
            <a href="/admin/usuarios.html" class="nav-item"><span class="icon">👥</span> Jurados y Delegados</a>
            <div class="nav-seccion">Rodeos</div>
            <a href="/admin/rodeos.html" class="nav-item"><span class="icon">🏆</span> Rodeos</a>
            <a href="/admin/importacion.html" class="nav-item"><span class="icon">📥</span> Importar Excel</a>
            <div class="nav-seccion">Pagos</div>
            <a href="/admin/bonos.html" class="nav-item"><span class="icon">💰</span> Bonos</a>
            <div class="nav-seccion">Reportes</div>
            <a href="/admin/reportes.html" class="nav-item"><span class="icon">📈</span> Reportes</a>
            <a href="/admin/exportacion-pagos.html" class="nav-item"><span class="icon">💳</span> Exportación de Pagos</a>
            <div class="nav-seccion">Sistema</div>
            <a href="/admin/configuracion.html" class="nav-item"><span class="icon">⚙️</span> Configuración</a>
            <a href="/admin/auditoria.html" class="nav-item"><span class="icon">📋</span> Auditoría</a>
        </nav>
        <div class="sidebar-footer">
            <div class="sidebar-usuario" id="nombre-admin"></div>
            <button class="btn btn-secundario btn-pequeño w-100" onclick="api.cerrarSesion()">Cerrar Sesión</button>
        </div>
    </aside>

    <!-- CONTENIDO -->
    <div class="main-content">
        <div class="topbar">
            <div class="flex items-center gap-12">
                <button class="btn-menu-movil" onclick="document.getElementById('sidebar').classList.toggle('abierto')">☰</button>
                <h1 id="titulo-dashboard">Dashboard</h1>
            </div>
            <div class="topbar-acciones" style="gap:8px;">
                <div class="nav-mes-btns flex gap-4">
                    <button class="btn btn-secundario btn-pequeño" onclick="navegarMes(-1)" title="Mes anterior">‹</button>
                    <button class="btn btn-secundario btn-pequeño" id="btn-sig-mes" onclick="navegarMes(1)" title="Mes siguiente">›</button>
                </div>
                <div class="selector-mes">
                    <label>Mes</label>
                    <select id="sel-mes" onchange="onCambioSelector()">
                        <option value="1">Enero</option>
                        <option value="2">Febrero</option>
                        <option value="3">Marzo</option>
                        <option value="4">Abril</option>
                        <option value="5">Mayo</option>
                        <option value="6">Junio</option>
                        <option value="7">Julio</option>
                        <option value="8">Agosto</option>
                        <option value="9">Septiembre</option>
                        <option value="10">Octubre</option>
                        <option value="11">Noviembre</option>
                        <option value="12">Diciembre</option>
                    </select>
                    <label>Año</label>
                    <select id="sel-año" onchange="onCambioSelector()">
                        <!-- Poblado por JS -->
                    </select>
                </div>
            </div>
        </div>

        <div class="page-body">

            <!-- Alertas globales -->
            <div id="alertas-criticas"></div>

            <!-- Spinner inicial -->
            <div id="cuerpo-dashboard">
                <div class="spinner-wrap"><div class="spinner"></div></div>
            </div>

        </div>
    </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script>
protegerRuta('administrador');
document.getElementById('nombre-admin').textContent = api.getUsuario()?.nombre || '';

// ─── Timezone-safe: obtener mes/año actual en Chile ───────────────
function mesAnioChile() {
    const partes = new Intl.DateTimeFormat('es-CL', {
        timeZone: 'America/Santiago',
        year: 'numeric', month: '2-digit'
    }).formatToParts(new Date());
    const p = {};
    partes.forEach(({ type, value }) => { p[type] = value; });
    return { mes: parseInt(p.month), año: parseInt(p.year) };
}

const hoy = mesAnioChile();
let mesActual = hoy.mes;
let añoActual = hoy.año;

// Poblar selector de años
function poblarAnios() {
    const sel = document.getElementById('sel-año');
    sel.innerHTML = '';
    for (let y = hoy.año; y >= hoy.año - 4; y--) {
        const opt = document.createElement('option');
        opt.value = String(y);
        opt.textContent = String(y);
        sel.appendChild(opt);
    }
}

function sincronizarSelectores() {
    document.getElementById('sel-mes').value = String(mesActual);
    document.getElementById('sel-año').value = String(añoActual);
    // Deshabilitar "siguiente" si ya estamos en mes actual
    const esHoy = (añoActual === hoy.año && mesActual >= hoy.mes);
    document.getElementById('btn-sig-mes').disabled = esHoy;
    document.getElementById('titulo-dashboard').textContent =
        `Dashboard — ${nombreMes(mesActual)} ${añoActual}`;
}

function navegarMes(delta) {
    mesActual += delta;
    if (mesActual > 12) { mesActual = 1; añoActual++; }
    if (mesActual < 1)  { mesActual = 12; añoActual--; }
    sincronizarSelectores();
    cargarDashboard();
}

function onCambioSelector() {
    mesActual = parseInt(document.getElementById('sel-mes').value);
    añoActual = parseInt(document.getElementById('sel-año').value);
    sincronizarSelectores();
    cargarDashboard();
}

// ─── Render principal ─────────────────────────────────────────────
async function cargarDashboard() {
    document.getElementById('cuerpo-dashboard').innerHTML =
        '<div class="spinner-wrap"><div class="spinner"></div></div>';

    try {
        const d = await api.get(`/admin/dashboard?mes=${mesActual}&año=${añoActual}`);

        // Alertas globales
        const aDiv = document.getElementById('alertas-criticas');
        let aHtml = '';
        if (d.alertas.bonos_pendientes > 0)
            aHtml += `<div class="alerta alerta-advertencia mb-8">⚠️ <strong>${d.alertas.bonos_pendientes}</strong> bono(s) esperando aprobación. <a href="/admin/bonos.html" style="margin-left:8px;color:inherit;font-weight:600;">Revisar →</a></div>`;
        if (d.alertas.pendientes_revision > 0)
            aHtml += `<div class="alerta alerta-advertencia mb-8">📋 <strong>${d.alertas.pendientes_revision}</strong> registro(s) de importación requieren revisión. <a href="/admin/importacion.html" style="margin-left:8px;color:inherit;font-weight:600;">Revisar →</a></div>`;
        if (d.alertas.duplicados_detectados > 0)
            aHtml += `<div class="alerta alerta-advertencia mb-8">🔁 <strong>${d.alertas.duplicados_detectados}</strong> duplicado(s) detectado(s). <a href="/admin/importacion.html" style="margin-left:8px;color:inherit;font-weight:600;">Revisar →</a></div>`;
        if (d.alertas.perfiles_incompletos > 0)
            aHtml += `<div class="alerta alerta-info mb-8">👤 <strong>${d.alertas.perfiles_incompletos}</strong> usuario(s) con perfil incompleto.</div>`;
        aDiv.innerHTML = aHtml;

        // Cuerpo completo
        document.getElementById('cuerpo-dashboard').innerHTML = `

            <!-- 1. ACTIVIDAD DEL MES -->
            <div class="dash-seccion">
                <div class="dash-seccion-titulo">Actividad del mes</div>
                <div class="kpi-grid">
                    <div class="kpi-card">
                        <div class="val">${d.actividad.rodeos}</div>
                        <div class="lbl">Rodeos realizados</div>
                    </div>
                    <div class="kpi-card">
                        <div class="val">${d.actividad.asignaciones_total}</div>
                        <div class="lbl">Asignaciones totales</div>
                    </div>
                    <div class="kpi-card">
                        <div class="val azul">${d.actividad.asignaciones_jurados}</div>
                        <div class="lbl">Asignaciones jurados</div>
                    </div>
                    <div class="kpi-card">
                        <div class="val verde">${d.actividad.asignaciones_delegados}</div>
                        <div class="lbl">Asignaciones delegados</div>
                    </div>
                    <div class="kpi-card">
                        <div class="val">${d.totales.jurados}</div>
                        <div class="lbl">Jurados activos</div>
                        <div class="sub">en el sistema</div>
                    </div>
                    <div class="kpi-card">
                        <div class="val verde">${d.totales.delegados_rentados}</div>
                        <div class="lbl">Delegados activos</div>
                        <div class="sub">en el sistema</div>
                    </div>
                    <div class="kpi-card">
                        <div class="val naranja">${d.alertas.bonos_pendientes}</div>
                        <div class="lbl">Bonos pendientes</div>
                        <div class="sub">aprobación requerida</div>
                    </div>
                    <div class="kpi-card">
                        <div class="val ${d.alertas.pendientes_revision > 0 ? 'rojo' : ''}">${d.alertas.pendientes_revision}</div>
                        <div class="lbl">Pendientes importación</div>
                        <div class="sub">sin resolver</div>
                    </div>
                </div>
            </div>

            <!-- 2. MONTOS BRUTOS -->
            <div class="dash-seccion">
                <div class="dash-seccion-titulo">Montos brutos del mes</div>
                <div class="monto-bloque">
                    <div class="monto-col">
                        <div class="monto-col-titulo jurado">Jurados</div>
                        <div class="monto-fila">
                            <span class="etiq">Pago base</span>
                            <span class="cifra">${formatCLP(d.brutos.jurados.base)}</span>
                        </div>
                        <div class="monto-fila">
                            <span class="etiq">Bonos distancia</span>
                            <span class="cifra">${formatCLP(d.brutos.jurados.bonos)}</span>
                        </div>
                        <div class="monto-fila total-fila">
                            <span class="etiq">Bruto total</span>
                            <span class="cifra">${formatCLP(d.brutos.jurados.total)}</span>
                        </div>
                    </div>
                    <div class="monto-col">
                        <div class="monto-col-titulo delegado">Delegados rentados</div>
                        <div class="monto-fila">
                            <span class="etiq">Pago base</span>
                            <span class="cifra">${formatCLP(d.brutos.delegados.base)}</span>
                        </div>
                        <div class="monto-fila">
                            <span class="etiq">Bonos distancia</span>
                            <span class="cifra">${formatCLP(d.brutos.delegados.bonos)}</span>
                        </div>
                        <div class="monto-fila total-fila">
                            <span class="etiq">Bruto total</span>
                            <span class="cifra">${formatCLP(d.brutos.delegados.total)}</span>
                        </div>
                    </div>
                    <div class="monto-col">
                        <div class="monto-col-titulo total">Total combinado</div>
                        <div class="monto-fila">
                            <span class="etiq">Base total</span>
                            <span class="cifra">${formatCLP(d.brutos.combinado.base)}</span>
                        </div>
                        <div class="monto-fila">
                            <span class="etiq">Bonos distancia</span>
                            <span class="cifra">${formatCLP(d.brutos.combinado.bonos)}</span>
                        </div>
                        <div class="monto-fila total-fila">
                            <span class="etiq">Bruto general</span>
                            <span class="cifra">${formatCLP(d.brutos.combinado.total)}</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 3. MONTOS LÍQUIDOS -->
            <div class="dash-seccion">
                <div class="dash-seccion-titulo">Montos líquidos del mes <span style="font-weight:400; font-size:11px;">(retención ${d.liquidos.retencion_pct}%)</span></div>
                <div class="kpi-grid" style="grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));">
                    <div class="kpi-card">
                        <div class="val" style="font-size:18px;">${formatCLP(d.liquidos.jurados)}</div>
                        <div class="lbl">Líquido jurados</div>
                        <div class="sub">bruto ${formatCLP(d.brutos.jurados.total)}</div>
                    </div>
                    <div class="kpi-card">
                        <div class="val verde" style="font-size:18px;">${formatCLP(d.liquidos.delegados)}</div>
                        <div class="lbl">Líquido delegados</div>
                        <div class="sub">bruto ${formatCLP(d.brutos.delegados.total)}</div>
                    </div>
                    <div class="kpi-card">
                        <div class="val morado" style="font-size:20px;">${formatCLP(d.liquidos.total)}</div>
                        <div class="lbl">Líquido total combinado</div>
                        <div class="sub">bruto ${formatCLP(d.brutos.combinado.total)}</div>
                    </div>
                </div>
            </div>

            <!-- 4. IMPORTACIONES + BONOS PENDIENTES -->
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">

                <div class="card">
                    <div class="card-titulo">📥 Importaciones del mes</div>
                    ${renderImportaciones(d.ultimas_importaciones)}
                </div>

                <div class="card">
                    <div class="card-titulo">⏳ Bonos pendientes de revisión</div>
                    ${renderBonosPend(d.bonos_pendientes_recientes)}
                    <div class="mt-8">
                        <a href="/admin/bonos.html" class="btn btn-outline btn-pequeño">Ver todos los bonos →</a>
                    </div>
                </div>

            </div>`;

    } catch (err) {
        document.getElementById('cuerpo-dashboard').innerHTML =
            `<div class="alerta alerta-error">${sanitizar(err.message || 'Error al cargar dashboard')}</div>`;
    }
}

function renderImportaciones(lista) {
    if (!lista || lista.length === 0)
        return '<p class="texto-gris texto-centrado">Sin importaciones en este mes</p>';
    return `<table>
        <thead><tr><th>Archivo</th><th>Insertadas</th><th>Pendientes</th><th>Fecha</th></tr></thead>
        <tbody>
        ${lista.map(i => `<tr>
            <td style="font-size:13px;">${sanitizar(i.nombre_archivo)}</td>
            <td><span class="badge badge-activo">${i.insertadas}</span></td>
            <td>${i.pendientes_reales > 0
                ? `<span class="badge badge-pendiente">${i.pendientes_reales}</span>`
                : '<span style="color:#aaa; font-size:12px;">—</span>'}</td>
            <td style="font-size:13px;">${formatFecha(i.created_at)}</td>
        </tr>`).join('')}
        </tbody>
    </table>`;
}

function renderBonosPend(lista) {
    if (!lista || lista.length === 0)
        return '<p class="texto-gris texto-centrado">Sin bonos pendientes ✓</p>';
    return `<table>
        <thead><tr><th>Persona</th><th>Club</th><th>Monto</th><th>Fecha</th></tr></thead>
        <tbody>
        ${lista.map(b => `<tr>
            <td style="font-size:13px;">${sanitizar(b.usuarios_pagados?.nombre_completo || '-')}</td>
            <td style="font-size:13px;">${sanitizar(b.asignaciones?.rodeos?.club || '-')}</td>
            <td class="monto-positivo">${formatCLP(b.monto_solicitado)}</td>
            <td style="font-size:13px;">${formatFecha(b.created_at)}</td>
        </tr>`).join('')}
        </tbody>
    </table>`;
}

// ─── Init ─────────────────────────────────────────────────────────
poblarAnios();
sincronizarSelectores();
cargarDashboard();
</script>
</body>
</html>
