<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disponibilidad — Administrador</title>
    <link rel="icon" type="image/png" href="/assets/logo_V2.png">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .filtros-disp {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 10px;
            margin-bottom: 16px;
        }
        .filtros-acciones { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }

        .fecha-bloque {
            background: #fff;
            border: 1px solid var(--gris-borde);
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 12px;
        }
        .fecha-bloque-header {
            font-weight: 700;
            font-size: 15px;
            color: var(--primario);
            margin-bottom: 8px;
            border-bottom: 1px solid var(--gris-borde);
            padding-bottom: 6px;
        }
        .fecha-personas { display: flex; flex-wrap: wrap; gap: 6px; }
        .persona-chip {
            background: #f0fff4;
            border: 1px solid #b3e8c5;
            border-radius: 20px;
            padding: 3px 10px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .persona-chip .tipo-badge {
            font-size: 10px;
            font-weight: 700;
            color: #888;
            text-transform: uppercase;
        }
        .vista-tabs { display: flex; gap: 6px; margin-bottom: 16px; }
        .vista-tab {
            padding: 6px 16px; border-radius: 20px; font-size: 13px;
            border: 1px solid var(--gris-borde); cursor: pointer;
            background: #fff; color: var(--texto);
        }
        .vista-tab.activo { background: var(--primario); color: #fff; border-color: var(--primario); }
        .spinner-msg {
            margin-top: 12px;
            color: #888;
            font-size: 13px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
<div class="layout">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <img src="/assets/logo_V2.png" alt="Federación del Rodeo Chileno" style="width:72px; height:72px; object-fit:contain; margin-bottom:6px;">
            <h2>Sistema de Jurados<br>Rodeo Chileno</h2>
        </div>
        <nav class="sidebar-nav"></nav>
        <div class="sidebar-footer">
            <div class="sidebar-usuario" id="nombre-admin"></div>
            <button class="btn btn-secundario btn-pequeño w-100" onclick="api.cerrarSesion()">Cerrar Sesión</button>
        </div>
    </aside>

    <div class="main-content">
        <div class="topbar">
            <div class="flex items-center gap-12">
                <button class="btn-menu-movil" onclick="document.getElementById('sidebar').classList.toggle('abierto')">☰</button>
                <h1>Disponibilidad de Jurados y Delegados</h1>
            </div>
        </div>

        <div class="page-body">

            <div class="card">
                <div class="card-titulo">Filtros</div>
                <div class="filtros-disp">
                    <div>
                        <label class="form-label">Fecha desde</label>
                        <input type="date" id="f-desde" class="form-control">
                    </div>
                    <div>
                        <label class="form-label">Fecha hasta</label>
                        <input type="date" id="f-hasta" class="form-control">
                    </div>
                    <div>
                        <label class="form-label">Tipo</label>
                        <select id="f-tipo" class="form-control">
                            <option value="">Todos</option>
                            <option value="jurado">Jurado</option>
                            <option value="delegado_rentado">Delegado Rentado</option>
                        </select>
                    </div>
                    <div>
                        <label class="form-label">Categoría</label>
                        <select id="f-cat" class="form-control">
                            <option value="">Todas</option>
                            <option value="A">A</option>
                            <option value="B">B</option>
                            <option value="C">C</option>
                        </select>
                    </div>
                    <div>
                        <label class="form-label">Nombre</label>
                        <input type="text" id="f-nombre" class="form-control" placeholder="Buscar nombre...">
                    </div>
                </div>
                <div class="filtros-acciones">
                    <button class="btn btn-primario" id="btn-buscar" onclick="cargar()">Buscar</button>
                    <button class="btn btn-secundario" id="btn-limpiar" onclick="limpiar()">Limpiar</button>
                    <button class="btn btn-outline" onclick="exportar('xlsx')">Exportar Excel</button>
                    <button class="btn btn-outline" onclick="exportar('csv')">Exportar CSV</button>
                </div>
                <div id="resumen-filtros" style="font-size:13px; color:#555;"></div>
            </div>

            <div class="vista-tabs">
                <button class="vista-tab activo" id="tab-fecha" onclick="cambiarVista('fecha')">Por fecha</button>
                <button class="vista-tab" id="tab-lista" onclick="cambiarVista('lista')">Lista completa</button>
            </div>

            <div id="resultados"></div>

        </div>
    </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/admin-nav.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/sidebar-toggle.js"></script>
<script>
(function() {
// ── Guard: evita doble ejecución si el script se carga más de una vez ──
if (window.__DISP_ADMIN_INIT__) return;
window.__DISP_ADMIN_INIT__ = true;

// ── Estado local (confinado al IIFE, sin contaminar el scope global) ──
var vistaActual = 'fecha';   // vista activa: 'fecha' | 'lista'
var fetchActivo = null;      // AbortController del fetch en vuelo
var cargaGen    = 0;         // generación de carga; respuestas de gens previas se descartan

protegerRuta('administrador');
document.getElementById('nombre-admin').textContent = api.getUsuario()?.nombre || '';

// ── Constantes locales (prefijo DISP_ para no colisionar con nada global) ──
const DISP_MESES       = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DISP_DIAS_NOMBRE = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
const DISP_TIPO_LABEL  = { jurado: 'Jurado', delegado_rentado: 'Delegado' };

// ── Precargar mes actual ──────────────────────────────────────
(function() {
    const hoy = new Date();
    const año = hoy.getFullYear();
    const mes = String(hoy.getMonth() + 1).padStart(2, '0');
    document.getElementById('f-desde').value = `${año}-${mes}-01`;
    const fin = new Date(año, hoy.getMonth() + 1, 0);
    document.getElementById('f-hasta').value = fin.toISOString().split('T')[0];
})();

function gv(id) { const el = document.getElementById(id); return el ? el.value.trim() : ''; }

function toQS(p) {
    return Object.entries(p)
        .filter(([, v]) => v !== '' && v != null)
        .map(([k, v]) => `${encodeURIComponent(k)}=${encodeURIComponent(v)}`)
        .join('&');
}

function setResultado(html) {
    document.getElementById('resultados').innerHTML = html;
}

function mostrarSpinnerConMensaje() {
    setResultado(`
        <div class="spinner-wrap" id="spinner-container">
            <div class="spinner"></div>
            <p class="spinner-msg" id="spinner-msg"></p>
        </div>
    `);
}

/**
 * Hace GET al endpoint con AbortController.
 * Timeout de 90s para tolerar Render free tier (spin-up ~50s).
 * A los 10s muestra aviso de "servidor despertando".
 */
async function fetchDisponibilidad(endpoint) {
    // Cancelar request anterior si existe (no limpiar fetchActivo aquí:
    // se asignará al nuevo ctrl en la línea siguiente)
    if (fetchActivo) {
        fetchActivo.abort();
    }

    const ctrl = new AbortController();
    fetchActivo = ctrl;

    // Aviso de "servidor despertando" a los 8 segundos
    const avisoTimer = setTimeout(() => {
        const msg = document.getElementById('spinner-msg');
        if (msg) {
            msg.textContent = 'Conectando con el servidor... Esto puede tardar hasta 60 segundos si el servidor estuvo inactivo.';
            msg.style.display = 'block';
        }
    }, 8000);

    // Timeout duro a los 75 segundos (cold start Render ~50s + query ~20s = ~70s)
    const abortTimer = setTimeout(() => ctrl.abort(), 75000);

    try {
        const token = api.getToken();
        const response = await fetch('/api' + endpoint, {
            method: 'GET',
            headers: { 'Authorization': `Bearer ${token}` },
            signal: ctrl.signal
        });

        clearTimeout(avisoTimer);
        clearTimeout(abortTimer);
        if (fetchActivo === ctrl) fetchActivo = null; // solo limpiar si aún es el activo

        if (response.status === 401) {
            api.cerrarSesion();
            return null;
        }

        // Intentar parsear como JSON
        let data;
        try {
            data = await response.json();
        } catch (_) {
            throw new Error('El servidor devolvió una respuesta no válida (no es JSON).');
        }

        if (!response.ok) {
            throw new Error(data?.error || `Error del servidor (${response.status})`);
        }

        return data;
    } catch (err) {
        clearTimeout(avisoTimer);
        clearTimeout(abortTimer);
        if (fetchActivo === ctrl) fetchActivo = null; // solo limpiar si aún es el activo

        if (err.name === 'AbortError') {
            throw new Error('El servidor no respondió en 75 segundos. Verifique que el backend esté corriendo y que Supabase sea accesible.');
        }
        throw err;
    }
}

async function cargar() {
    // ── Generación: si otra cargar() empieza antes de que esta termine,
    //    los callbacks de esta instancia se ignoran (no sobreescriben UI).
    const gen = ++cargaGen;

    const divRes     = document.getElementById('resultados');
    const btnBuscar  = document.getElementById('btn-buscar');
    const btnLimpiar = document.getElementById('btn-limpiar');

    // Feedback inmediato — antes de cualquier await o lógica que pueda fallar
    mostrarSpinnerConMensaje();
    document.getElementById('resumen-filtros').textContent = '';
    if (btnBuscar)  btnBuscar.disabled = true;
    if (btnLimpiar) btnLimpiar.disabled = true;

    let respondio = false;

    try {
        // ── Construir parámetros y endpoint DENTRO del try ────────────────
        // (evita ReferenceError silencioso si vistaActual/gv no estuvieran listos)
        const params = {
            fecha_desde:  gv('f-desde'),
            fecha_hasta:  gv('f-hasta'),
            tipo_persona: gv('f-tipo'),
            categoria:    gv('f-cat'),
            nombre:       gv('f-nombre'),
        };
        const endpoint = vistaActual === 'fecha'
            ? `/admin/disponibilidad/por-fecha?${toQS(params)}`
            : `/admin/disponibilidad?${toQS(params)}`;

        const data = await fetchDisponibilidad(endpoint);

        // Si otra cargar() arrancó mientras esperábamos, descartar esta respuesta
        if (gen !== cargaGen) return;

        respondio = true;

        // null → 401, cerrarSesion() ya fue llamado
        if (data === null) return;

        if (vistaActual === 'fecha') {
            renderPorFecha(
                data && typeof data === 'object' && !Array.isArray(data) ? data : {}
            );
        } else {
            renderLista(Array.isArray(data) ? data : []);
        }

    } catch (err) {
        // Respuesta de una cargar() ya supersedida — ignorar silenciosamente
        if (gen !== cargaGen) return;

        respondio = true;
        const msg = err?.message || 'Error desconocido al cargar disponibilidad.';

        // Doble try: si sanitizar o setResultado falla, caemos al DOM directo
        try {
            setResultado(`
                <div class="alerta alerta-error" style="margin:0;">
                    <strong>Error al cargar disponibilidad</strong><br>
                    ${sanitizar(msg)}<br>
                    <small style="color:#999; display:block; margin-top:6px;">
                        Si el servidor está en Render (plan gratuito), puede tardar hasta 60 s
                        en responder tras inactividad. Intente nuevamente.
                    </small>
                </div>
            `);
        } catch (_) {
            if (divRes) divRes.textContent = 'Error: ' + msg;
        }
        document.getElementById('resumen-filtros').textContent = '';

    } finally {
        // Si otra cargar() ya tomó el control, no tocar botones ni spinner
        if (gen !== cargaGen) return;

        if (btnBuscar)  btnBuscar.disabled = false;
        if (btnLimpiar) btnLimpiar.disabled = false;

        // Safety net: spinner persistente solo si nada lo reemplazó
        if (!respondio && divRes && divRes.querySelector('.spinner-wrap')) {
            setResultado('<div class="alerta alerta-error" style="margin:0;">No se recibió respuesta. Intente nuevamente.</div>');
        }
    }
}

function renderPorFecha(porFecha) {
    const fechas = Object.keys(porFecha).sort();

    if (fechas.length === 0) {
        setResultado('<div class="card"><p class="tabla-vacia">No hay disponibilidad para los filtros seleccionados</p></div>');
        document.getElementById('resumen-filtros').textContent = '0 fechas con disponibilidad';
        return;
    }

    const totalPersonas = fechas.reduce((s, f) => s + porFecha[f].length, 0);
    document.getElementById('resumen-filtros').textContent =
        `${fechas.length} fecha(s) · ${totalPersonas} disponibilidad(es)`;

    let html = '';
    fechas.forEach(fecha => {
        const personas = porFecha[fecha];
        const [año, mes, dia] = fecha.split('-');
        const d = new Date(parseInt(año), parseInt(mes) - 1, parseInt(dia));
        const diaNombre = DISP_DIAS_NOMBRE[d.getDay()];
        const mesNombre = DISP_MESES[d.getMonth()];

        html += `<div class="fecha-bloque">
            <div class="fecha-bloque-header">
                ${dia} de ${mesNombre} ${año}
                <span style="font-weight:400; color:#888; font-size:13px;">(${diaNombre})</span>
                <span style="float:right; font-size:13px; font-weight:400; color:#27ae60;">${personas.length} disponible(s)</span>
            </div>
            <div class="fecha-personas">`;

        personas.forEach(p => {
            const tipo = DISP_TIPO_LABEL[p.tipo_persona] || sanitizar(p.tipo_persona || '');
            const cat  = p.categoria ? ` · Cat. ${p.categoria}` : '';
            const ciudad = p.ciudad ? ` · ${sanitizar(p.ciudad)}` : '';
            const asoc   = p.asociacion ? ` · ${sanitizar(p.asociacion)}` : '';
            const historial = (p.historial_rodeos || []);
            const histHtml = historial.length > 0
                ? `<span style="display:block; font-size:10px; color:#666; margin-top:2px; max-width:220px; white-space:normal;">${historial.map(h => sanitizar(h)).join(' | ')}</span>`
                : '';
            html += `<div class="persona-chip" style="flex-direction:column; align-items:flex-start;">
                <div><span>${sanitizar(p.nombre_completo || '—')}</span>
                <span class="tipo-badge" style="margin-left:5px;">${tipo}${cat}${ciudad}${asoc}</span></div>
                ${histHtml}
            </div>`;
        });

        html += `</div></div>`;
    });

    setResultado(html);
}

function renderLista(datos) {
    if (!datos || datos.length === 0) {
        setResultado('<div class="card"><p class="tabla-vacia">No hay disponibilidad para los filtros seleccionados</p></div>');
        document.getElementById('resumen-filtros').textContent = '0 registros';
        return;
    }

    document.getElementById('resumen-filtros').textContent = `${datos.length} registro(s)`;

    setResultado(`<div class="card"><div class="tabla-wrap"><div style="overflow-x:auto;"><table>
        <thead><tr>
            <th>Nombre</th><th>Tipo</th><th>Categoría</th><th>Asociación</th><th>Ciudad</th><th>Fecha disponible</th><th>Día</th><th>Últimos rodeos (máx. 8)</th>
        </tr></thead>
        <tbody>
        ${datos.map(d => {
            const u = d.usuarios_pagados;
            const [año, mes, dia] = d.fecha.split('-');
            const fechaObj = new Date(parseInt(año), parseInt(mes) - 1, parseInt(dia));
            const historial = u.historial_rodeos || [];
            const histHtml = historial.length === 0
                ? '<span style="color:#aaa;">—</span>'
                : historial.map(h => `<div style="font-size:11px; white-space:nowrap; color:#555;">${sanitizar(h)}</div>`).join('');
            return `<tr>
                <td><strong>${sanitizar(u.nombre_completo || '—')}</strong></td>
                <td>${DISP_TIPO_LABEL[u.tipo_persona] || sanitizar(u.tipo_persona || '—')}</td>
                <td style="text-align:center;">${u.categoria ? `<span class="badge badge-${u.categoria.toLowerCase()}">${u.categoria}</span>` : '—'}</td>
                <td style="font-size:13px;">${sanitizar(u.asociacion || '—')}</td>
                <td style="font-size:13px;">${sanitizar(u.ciudad || '—')}</td>
                <td style="white-space:nowrap;">${formatFecha(d.fecha)}</td>
                <td style="color:#888; font-size:12px;">${DISP_DIAS_NOMBRE[fechaObj.getDay()]}</td>
                <td>${histHtml}</td>
            </tr>`;
        }).join('')}
        </tbody>
    </table></div></div></div>`);
}

function cambiarVista(vista) {
    vistaActual = vista;
    document.getElementById('tab-fecha').classList.toggle('activo', vista === 'fecha');
    document.getElementById('tab-lista').classList.toggle('activo', vista === 'lista');
    cargar();
}

function limpiar() {
    const hoy = new Date();
    const año = hoy.getFullYear();
    const mes = String(hoy.getMonth() + 1).padStart(2, '0');
    document.getElementById('f-desde').value = `${año}-${mes}-01`;
    const fin = new Date(año, hoy.getMonth() + 1, 0);
    document.getElementById('f-hasta').value = fin.toISOString().split('T')[0];
    document.getElementById('f-tipo').value   = '';
    document.getElementById('f-cat').value    = '';
    document.getElementById('f-nombre').value = '';
    cargar();
}

async function exportar(formato) {
    const params = toQS({
        fecha_desde:  gv('f-desde'),
        fecha_hasta:  gv('f-hasta'),
        tipo_persona: gv('f-tipo'),
        categoria:    gv('f-cat'),
        nombre:       gv('f-nombre'),
        formato,
    });
    const nombre = formato === 'csv' ? 'disponibilidad.csv' : 'disponibilidad.xlsx';
    try {
        await api.descargar(`/admin/disponibilidad/exportar?${params}`, nombre);
    } catch (err) {
        mostrarError(err);
    }
}

// ── Exponer para onclick: botones HTML usan onclick="cargar()" etc. ──
window.cargar       = cargar;
window.limpiar      = limpiar;
window.exportar     = exportar;
window.cambiarVista = cambiarVista;

// Cargar al inicio (catch explícito por si hay error de init no esperado)
cargar().catch(function(err) {
    var divRes = document.getElementById('resultados');
    if (divRes) divRes.innerHTML =
        '<div class="alerta alerta-error" style="margin:0;"><strong>Error al inicializar</strong><br>' +
        (err && err.message ? err.message : String(err)) + '</div>';
});
})();
</script>
</body>
</html>
