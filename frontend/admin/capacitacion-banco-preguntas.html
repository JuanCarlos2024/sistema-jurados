<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banco de Preguntas — Capacitaciones</title>
    <link rel="icon" type="image/png" href="/assets/logo_V2.png">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .banco-card {
            border: 1px solid var(--gris-borde);
            border-radius: 8px;
            padding: 14px 16px;
            margin-bottom: 10px;
            background: #fff;
            position: relative;
        }
        .banco-card:hover { border-color: var(--primario); }
        .banco-acciones { position:absolute; top:12px; right:12px; display:flex; gap:6px; }
        .tipo-badge {
            display:inline-block; padding:2px 8px; border-radius:10px;
            font-size:10px; font-weight:700; background:#eef2ff; color:#3949ab;
        }
        .inactiva-badge {
            display:inline-block; padding:2px 8px; border-radius:10px;
            font-size:10px; font-weight:700; background:#f5f5f5; color:#888;
            margin-left:4px;
        }
        .video-badge {
            display:inline-block; padding:2px 8px; border-radius:10px;
            font-size:10px; font-weight:700; background:#fff3e0; color:#e65100;
            margin-left:4px;
        }
        .alt-lista { list-style:none; padding:0; margin:4px 0 0 0; }
        .alt-lista li { padding:3px 0; font-size:13px; display:flex; align-items:center; gap:8px; }
        .alt-correcta { color:#1e8449; font-weight:600; }
        .alt-incorrecta { color:#555; }
        .alt-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
        .alt-dot.correcta  { background:#1e8449; }
        .alt-dot.incorrecta { background:#ccc; }
        .filtros { display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end; margin-bottom:16px; }
        .filtros input, .filtros select { padding:7px 10px; border:1px solid var(--gris-borde); border-radius:6px; font-size:13px; background:#fff; }
        .meta-info { font-size:11px; color:var(--gris); margin-top:6px; }

        /* Modal alternativas */
        .alt-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
        .alt-row input[type="radio"] { cursor:pointer; }
        .alt-row input[type="text"]  { flex:1; }
        .alt-row .btn-rm { flex-shrink:0; }

        /* Video preview */
        .video-wrapper {
            width:100%; max-width:600px; aspect-ratio:16/9;
            margin:12px auto; background:#000; border-radius:8px; overflow:hidden;
        }
        .video-wrapper iframe { width:100%; height:100%; border:0; display:block; }
        /* Imagen preview */
        .imagen-wrapper {
            width:100%; max-width:600px;
            margin:10px auto 0 auto; text-align:center;
        }
        .imagen-wrapper img {
            max-width:100%; max-height:300px; border-radius:6px; object-fit:contain;
        }
    </style>
</head>
<body>
<div class="layout">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <img src="/assets/logo_V2.png" alt="Federación del Rodeo Chileno" style="width:72px;height:72px;object-fit:contain;margin-bottom:6px;">
            <h2>Sistema de Jurados<br>Rodeo Chileno</h2>
        </div>
        <nav class="sidebar-nav" data-active="/admin/capacitacion-banco-preguntas.html"></nav>
        <div class="sidebar-footer">
            <div class="sidebar-usuario" id="nombre-admin"></div>
            <button class="btn btn-secundario btn-pequeño w-100" onclick="api.cerrarSesion()">Cerrar Sesión</button>
        </div>
    </aside>

    <div class="main-content">
        <div class="topbar">
            <div class="flex items-center gap-12">
                <button class="btn-menu-movil" onclick="document.getElementById('sidebar').classList.toggle('abierto')">☰</button>
                <a href="/admin/capacitaciones.html" class="btn btn-outline btn-pequeño">← Volver</a>
                <h1 style="font-size:16px;">📚 Banco de Preguntas</h1>
            </div>
            <div class="topbar-acciones">
                <button class="btn btn-primario" onclick="abrirModalPregunta(null)">+ Nueva pregunta</button>
            </div>
        </div>

        <div class="page-body">
            <!-- Filtros -->
            <div class="card" style="margin-bottom:16px;">
                <div class="filtros">
                    <input type="text" id="f-buscar" placeholder="Buscar por enunciado…"
                        style="flex:1;min-width:200px;" oninput="filtrarBanco()">
                    <select id="f-tipo" onchange="filtrarBanco()">
                        <option value="">Todos los tipos</option>
                        <option value="alternativa_unica">Alternativas</option>
                        <option value="video_alternativas">Alternativas + video</option>
                        <option value="imagen_alternativas">Imagen + alternativas</option>
                        <option value="verdadero_falso">Verdadero / Falso</option>
                        <option value="verdadero_falso_video">V/F + video</option>
                        <option value="verdadero_falso_imagen">V/F + imagen</option>
                    </select>
                    <select id="f-estado" onchange="filtrarBanco()">
                        <option value="">Activas e inactivas</option>
                        <option value="true" selected>Solo activas</option>
                        <option value="false">Solo inactivas</option>
                    </select>
                    <select id="f-dificultad" onchange="filtrarBanco()">
                        <option value="">Cualquier dificultad</option>
                        <option value="facil">Fácil</option>
                        <option value="media">Media</option>
                        <option value="dificil">Difícil</option>
                    </select>
                    <button class="btn btn-outline btn-pequeño" onclick="limpiarFiltros()">Limpiar</button>
                    <button class="btn btn-outline btn-pequeño" onclick="exportarBanco()" title="Exportar con los filtros actuales">⬇ Exportar CSV/Excel</button>
                </div>
                <div id="contador-banco" style="font-size:12px;color:var(--gris);"></div>
            </div>

            <!-- Lista -->
            <div id="lista-banco">
                <div class="alerta alerta-info" style="font-size:13px;">Cargando banco de preguntas…</div>
            </div>
        </div>
    </div>
</div>

<!-- ═══ Modal pregunta banco ═════════════════════════════════════════════════ -->
<div id="modal-pregunta" class="modal-overlay" style="display:none;" onclick="cerrarModalPregunta()">
    <div class="modal" style="max-width:620px;max-height:90vh;overflow-y:auto;" onclick="event.stopPropagation()">
        <div class="modal-header">
            <h3 id="modal-titulo">Nueva pregunta</h3>
            <button class="modal-cerrar" onclick="cerrarModalPregunta()">✕</button>
        </div>
        <div class="modal-body">

            <div class="form-grupo">
                <label class="form-label">Tipo de pregunta</label>
                <select id="preg-tipo" class="form-control" onchange="onTipoCambio()">
                    <option value="alternativa_unica">Alternativas</option>
                    <option value="video_alternativas">Alternativas + video</option>
                    <option value="imagen_alternativas">Imagen + alternativas</option>
                    <option value="verdadero_falso">Verdadero / Falso</option>
                    <option value="verdadero_falso_video">Verdadero / Falso + video</option>
                    <option value="verdadero_falso_imagen">Verdadero / Falso + imagen</option>
                </select>
            </div>

            <div id="preg-video-grupo" class="form-grupo" style="display:none;">
                <label class="form-label">Video de YouTube (URL)</label>
                <input type="url" id="preg-video" class="form-control"
                    placeholder="https://www.youtube.com/watch?v=…"
                    oninput="actualizarPreviewVideo()">
                <div id="preg-video-preview" class="video-wrapper" style="display:none;">
                    <iframe id="preg-video-iframe" allowfullscreen></iframe>
                </div>
            </div>

            <div id="preg-audio-grupo" class="form-grupo" style="display:none;margin-top:-6px;">
                <label style="display:flex;align-items:center;gap:8px;font-weight:400;font-size:13px;">
                    <input type="checkbox" id="preg-video-sin-audio"> Silenciar video por defecto
                </label>
                <small style="color:var(--gris);font-size:11px;margin-left:22px;">El video inicia sin audio (el jurado puede activarlo)</small>
            </div>

            <div id="preg-imagen-grupo" class="form-grupo" style="display:none;">
                <label class="form-label">Imagen de la pregunta</label>
                <input type="hidden" id="preg-imagen">
                <input type="file" id="preg-imagen-file" accept="image/jpeg,image/png,image/webp" style="display:none;" onchange="subirImagenPregunta()">
                <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:4px;">
                    <button type="button" class="btn btn-outline btn-pequeño" onclick="document.getElementById('preg-imagen-file').click()">📁 Subir imagen</button>
                    <span id="preg-imagen-estado" style="font-size:12px;color:var(--gris);"></span>
                </div>
                <div id="preg-imagen-preview" class="imagen-wrapper" style="display:none;margin-top:10px;">
                    <div style="display:flex;justify-content:flex-end;margin-bottom:4px;">
                        <button type="button" class="btn btn-pequeño" style="background:#fadbd8;color:#922b21;border:none;font-size:11px;" onclick="quitarImagenPregunta()">✕ Quitar imagen</button>
                    </div>
                    <img id="preg-imagen-img" alt="Vista previa" onerror="document.getElementById('preg-imagen-preview').style.display='none'">
                </div>
            </div>

            <div class="form-grupo">
                <label class="form-label">Enunciado <span style="color:red">*</span></label>
                <textarea id="preg-enunciado" class="form-control" rows="3" placeholder="Escribe aquí la pregunta…"></textarea>
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px;">
                <div class="form-grupo" style="margin-bottom:0;">
                    <label class="form-label">Categoría temática</label>
                    <input type="text" id="preg-categoria" class="form-control" placeholder="Ej: Reglamento">
                </div>
                <div class="form-grupo" style="margin-bottom:0;">
                    <label class="form-label">Dificultad</label>
                    <select id="preg-dificultad" class="form-control">
                        <option value="">— Sin especificar —</option>
                        <option value="facil">Fácil</option>
                        <option value="media">Media</option>
                        <option value="dificil">Difícil</option>
                    </select>
                </div>
                <div class="form-grupo" style="margin-bottom:0;">
                    <label class="form-label">Etiquetas</label>
                    <input type="text" id="preg-etiquetas" class="form-control" placeholder="Ej: normas, 2024">
                </div>
            </div>

            <div class="form-grupo">
                <label class="form-label" style="display:flex;align-items:center;gap:8px;">
                    <input type="checkbox" id="preg-activa" checked> Activa (visible para usar en pruebas)
                </label>
            </div>

            <div class="form-grupo">
                <label class="form-label">Comentario / motivo del banco</label>
                <textarea id="preg-comentario" class="form-control" rows="2" maxlength="500"
                    placeholder="Ej: Pregunta útil para evaluaciones sobre atajada…"
                    oninput="document.getElementById('comentario-chars').textContent = this.value.length + ' / 500'"></textarea>
                <small id="comentario-chars" style="color:var(--gris);font-size:11px;float:right;">0 / 500</small>
            </div>

            <div id="preg-alts-seccion" style="margin-top:16px;">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                    <label class="form-label" style="margin:0;">Alternativas</label>
                    <button type="button" id="btn-agregar-alt" class="btn btn-outline btn-pequeño"
                        onclick="agregarAltRow()">+ Alternativa</button>
                </div>
                <div id="alts-container"></div>
                <small style="color:var(--gris);font-size:11px;">Marca el radio para indicar la alternativa correcta.</small>
            </div>

            <div style="margin-top:20px;display:flex;justify-content:flex-end;gap:10px;">
                <button class="btn btn-outline" onclick="cerrarModalPregunta()">Cancelar</button>
                <button class="btn btn-primario" onclick="guardarPregunta()">Guardar pregunta</button>
            </div>
        </div>
    </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/admin-nav.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/sidebar-toggle.js"></script>
<script>
// ─── Estado ───────────────────────────────────────────────────────────────────
var _banco      = [];
var _editId     = null;
var _altCounter = 0;

var TIPO_LABELS = {
    alternativa_unica:      'Alternativas',
    video_alternativas:     'Alternativas + video',
    imagen_alternativas:    'Imagen + alt.',
    verdadero_falso:        'Verdadero / Falso',
    verdadero_falso_video:  'V/F + video',
    verdadero_falso_imagen: 'V/F + imagen',
    sin_video_alternativas: 'Alternativas'
};

// ─── Init ─────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async function () {
    protegerRuta('administrador');
    var u = api.getUsuario();
    if (!u) return api.cerrarSesion();
    document.getElementById('nombre-admin').textContent = u.nombre_completo || u.email || '';
    await cargarBanco();
});

// ─── Carga y filtros ──────────────────────────────────────────────────────────
async function cargarBanco() {
    try {
        var params = construirParams();
        _banco = await api.get('/admin/capacitaciones/banco-preguntas?' + params);
        renderBanco(_banco);
    } catch (err) {
        document.getElementById('lista-banco').innerHTML =
            '<div class="alerta alerta-error">Error al cargar el banco: ' + (err.message || '') + '</div>';
    }
}

function construirParams() {
    var p = [];
    var q    = document.getElementById('f-buscar').value.trim();
    var tipo = document.getElementById('f-tipo').value;
    var est  = document.getElementById('f-estado').value;
    var dif  = document.getElementById('f-dificultad').value;
    if (q)    p.push('q='    + encodeURIComponent(q));
    if (tipo) p.push('tipo=' + encodeURIComponent(tipo));
    if (est)  p.push('activa=' + encodeURIComponent(est));
    if (dif)  p.push('dificultad=' + encodeURIComponent(dif));
    return p.join('&');
}

var _filtrarTimeout;
function filtrarBanco() {
    clearTimeout(_filtrarTimeout);
    _filtrarTimeout = setTimeout(cargarBanco, 300);
}

function limpiarFiltros() {
    document.getElementById('f-buscar').value    = '';
    document.getElementById('f-tipo').value      = '';
    document.getElementById('f-estado').value    = 'true';
    document.getElementById('f-dificultad').value = '';
    cargarBanco();
}

function renderBanco(lista) {
    var div = document.getElementById('lista-banco');
    document.getElementById('contador-banco').textContent = lista.length + ' pregunta(s)';

    if (lista.length === 0) {
        div.innerHTML = '<div class="alerta alerta-info" style="font-size:13px;">No hay preguntas en el banco con esos filtros. Usa <strong>+ Nueva pregunta</strong> para agregar.</div>';
        return;
    }

    div.innerHTML = lista.map(function (p) {
        var alts = (p.alternativas || []).map(function (a) {
            var cls = a.es_correcta ? 'alt-correcta' : 'alt-incorrecta';
            var dot = a.es_correcta ? 'correcta' : 'incorrecta';
            return '<li class="' + cls + '"><span class="alt-dot ' + dot + '"></span>' + sanitizar(a.texto) + '</li>';
        }).join('');
        var tipoLabel   = TIPO_LABELS[p.tipo] || p.tipo;
        var tieneVideo  = (p.tipo === 'video_alternativas'  || p.tipo === 'verdadero_falso_video');
        var tieneImagen = (p.tipo === 'imagen_alternativas' || p.tipo === 'verdadero_falso_imagen');
        var difLabel    = p.dificultad ? ({ facil:'🟢 Fácil', media:'🟡 Media', dificil:'🔴 Difícil' }[p.dificultad] || '') : '';

        var comentarioHtml = p.comentario_banco
            ? '<div style="margin:6px 0 4px;padding:6px 10px;background:#f0f4ff;border-left:3px solid #3949ab;border-radius:0 4px 4px 0;font-size:12px;color:#3949ab;">'
              + '💬 ' + sanitizar(p.comentario_banco)
              + '</div>'
            : '';

        var imagenBancoHtml = (tieneImagen && p.imagen_url)
            ? '<div style="margin:6px 0 4px;"><img src="' + sanitizar(p.imagen_url) + '" alt="Imagen" style="max-width:100%;max-height:160px;border-radius:6px;object-fit:contain;" onerror="this.style.display=\'none\'"></div>'
            : '';

        return '<div class="banco-card">'
            + '<div class="banco-acciones">'
            + '<button class="btn btn-outline btn-pequeño" onclick="abrirModalPregunta(\'' + p.id + '\')">Editar</button>'
            + '<button class="btn btn-pequeño" style="background:' + (p.activa ? '#fadbd8' : '#e8f5e9') + ';color:' + (p.activa ? '#922b21' : '#2e7d32') + ';border:none;"'
            +   ' onclick="toggleActiva(\'' + p.id + '\',' + p.activa + ')">' + (p.activa ? 'Desactivar' : 'Activar') + '</button>'
            + '</div>'
            + '<span class="tipo-badge">' + sanitizar(tipoLabel) + '</span>'
            + (tieneVideo  ? '<span class="video-badge">🎬 Con video' + (p.video_sin_audio ? ' 🔇' : '') + '</span>' : '')
            + (tieneImagen ? '<span class="video-badge" style="background:#e8f5e9;color:#2e7d32;">🖼 Con imagen</span>' : '')
            + (!p.activa ? '<span class="inactiva-badge">Inactiva</span>' : '')
            + '<div style="font-size:14px;font-weight:600;margin:6px 0 4px;">' + sanitizar(p.enunciado) + '</div>'
            + imagenBancoHtml
            + comentarioHtml
            + '<ul class="alt-lista">' + alts + '</ul>'
            + '<div class="meta-info">'
            + (difLabel ? difLabel + ' &nbsp;·&nbsp; ' : '')
            + (p.categoria_tematica ? '📂 ' + sanitizar(p.categoria_tematica) + ' &nbsp;·&nbsp; ' : '')
            + (p.etiquetas ? '🏷 ' + sanitizar(p.etiquetas) + ' &nbsp;·&nbsp; ' : '')
            + 'Creada ' + fmtFecha(p.created_at)
            + '</div>'
            + '</div>';
    }).join('');
}

function fmtFecha(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleDateString('es-CL');
}

async function toggleActiva(id, activa) {
    try {
        await api.put('/admin/capacitaciones/banco-preguntas/' + id, { activa: !activa });
        mostrarToast(activa ? 'Pregunta desactivada' : 'Pregunta activada', 'exito');
        await cargarBanco();
    } catch (err) {
        mostrarToast(err.message || 'Error', 'error');
    }
}

// ─── Modal pregunta ───────────────────────────────────────────────────────────
function abrirModalPregunta(id) {
    _editId = id;
    var preg = id ? _banco.find(function (p) { return p.id === id; }) : null;

    document.getElementById('modal-titulo').textContent = id ? 'Editar pregunta' : 'Nueva pregunta';
    document.getElementById('preg-enunciado').value      = preg ? preg.enunciado : '';
    document.getElementById('preg-categoria').value      = preg ? (preg.categoria_tematica || '') : '';
    document.getElementById('preg-dificultad').value     = preg ? (preg.dificultad || '') : '';
    document.getElementById('preg-etiquetas').value      = preg ? (preg.etiquetas || '') : '';
    document.getElementById('preg-activa').checked       = preg ? preg.activa : true;
    var comentario = preg ? (preg.comentario_banco || '') : '';
    document.getElementById('preg-comentario').value     = comentario;
    document.getElementById('comentario-chars').textContent = comentario.length + ' / 500';

    var tipo = (preg && preg.tipo) ? preg.tipo : 'alternativa_unica';
    if (tipo === 'sin_video_alternativas') tipo = 'alternativa_unica';
    document.getElementById('preg-tipo').value = tipo;

    var tieneVideo  = (tipo === 'video_alternativas'  || tipo === 'verdadero_falso_video');
    var tieneImagen = (tipo === 'imagen_alternativas' || tipo === 'verdadero_falso_imagen');
    var esVF        = (tipo === 'verdadero_falso' || tipo === 'verdadero_falso_video' || tipo === 'verdadero_falso_imagen');

    document.getElementById('preg-video').value                = (preg && preg.video_url) ? preg.video_url : '';
    document.getElementById('preg-video-preview').style.display = 'none';
    document.getElementById('preg-video-iframe').src            = '';
    document.getElementById('preg-video-grupo').style.display   = tieneVideo ? '' : 'none';
    document.getElementById('preg-audio-grupo').style.display   = tieneVideo ? '' : 'none';
    document.getElementById('preg-video-sin-audio').checked     = preg ? !!preg.video_sin_audio : tieneVideo;
    if (preg && preg.video_url && tieneVideo) actualizarPreviewVideo();

    document.getElementById('preg-imagen-grupo').style.display = tieneImagen ? '' : 'none';
    if (tieneImagen && preg && preg.imagen_url) {
        document.getElementById('preg-imagen').value = preg.imagen_url;
        document.getElementById('preg-imagen-estado').textContent = 'Imagen cargada';
        document.getElementById('preg-imagen-img').src = preg.imagen_url;
        document.getElementById('preg-imagen-preview').style.display = '';
    } else {
        quitarImagenPregunta();
    }

    var container = document.getElementById('alts-container');
    container.innerHTML = '';
    var btnAlt = document.getElementById('btn-agregar-alt');

    if (esVF) {
        btnAlt.style.display = 'none';
        var altsVF = preg ? (preg.alternativas || []) : [];
        if (altsVF.length >= 2) {
            altsVF.forEach(function (a) { agregarAltRow(a.texto, a.es_correcta, a.id, true); });
        } else {
            agregarAltRow('Verdadero', false, null, true);
            agregarAltRow('Falso',     false, null, true);
        }
    } else {
        btnAlt.style.display = '';
        var altsN = preg ? (preg.alternativas || []) : [];
        if (altsN.length === 0) {
            agregarAltRow(); agregarAltRow(); agregarAltRow(); agregarAltRow();
        } else {
            altsN.forEach(function (a) { agregarAltRow(a.texto, a.es_correcta, a.id); });
        }
    }

    document.getElementById('modal-pregunta').style.display = 'flex';
    setTimeout(function () { document.getElementById('preg-enunciado').focus(); }, 100);
}

function cerrarModalPregunta() {
    document.getElementById('modal-pregunta').style.display = 'none';
    _editId = null;
}

function onTipoCambio() {
    var tipo        = document.getElementById('preg-tipo').value;
    var videoGrupo  = document.getElementById('preg-video-grupo');
    var audioGrupo  = document.getElementById('preg-audio-grupo');
    var imagenGrupo = document.getElementById('preg-imagen-grupo');
    var btnAlt      = document.getElementById('btn-agregar-alt');
    var container   = document.getElementById('alts-container');

    var tieneVideo  = (tipo === 'video_alternativas'  || tipo === 'verdadero_falso_video');
    var tieneImagen = (tipo === 'imagen_alternativas' || tipo === 'verdadero_falso_imagen');
    var esVF        = (tipo === 'verdadero_falso' || tipo === 'verdadero_falso_video' || tipo === 'verdadero_falso_imagen');

    videoGrupo.style.display  = tieneVideo  ? '' : 'none';
    audioGrupo.style.display  = tieneVideo  ? '' : 'none';
    imagenGrupo.style.display = tieneImagen ? '' : 'none';

    if (tieneVideo) {
        document.getElementById('preg-video-sin-audio').checked = true;
    } else {
        document.getElementById('preg-video').value = '';
        document.getElementById('preg-video-preview').style.display = 'none';
        document.getElementById('preg-video-iframe').src = '';
        document.getElementById('preg-video-sin-audio').checked = false;
    }
    if (!tieneImagen) {
        quitarImagenPregunta();
    }

    if (esVF) {
        container.innerHTML = '';
        agregarAltRow('Verdadero', false, null, true);
        agregarAltRow('Falso',     false, null, true);
        btnAlt.style.display = 'none';
    } else {
        btnAlt.style.display = '';
        var filasReadonly = container.querySelectorAll('.alt-row input[type="text"][readonly]');
        if (filasReadonly.length > 0) {
            container.innerHTML = '';
            agregarAltRow(); agregarAltRow(); agregarAltRow(); agregarAltRow();
        }
    }
}

function agregarAltRow(texto, esCorrecta, altId, soloTexto) {
    _altCounter++;
    var rowId     = 'alt-row-' + _altCounter;
    var container = document.getElementById('alts-container');
    var div       = document.createElement('div');
    div.className = 'alt-row';
    div.id        = rowId;

    var inputId = 'alt-txt-' + _altCounter;
    var radioId = 'alt-rad-' + _altCounter;

    div.innerHTML =
        '<input type="radio" name="alt-correcta" id="' + radioId + '" value="' + rowId + '"'
        + (esCorrecta ? ' checked' : '') + '>'
        + '<input type="text" id="' + inputId + '" class="form-control" value="' + sanitizar(texto || '') + '"'
        + (soloTexto ? ' readonly style="background:#f8f9fa;"' : '') + ' placeholder="Alternativa…">'
        + (soloTexto ? '' : '<button type="button" class="btn btn-pequeño btn-rm" style="background:#fadbd8;color:#922b21;border:none;" onclick="document.getElementById(\'' + rowId + '\').remove()">✕</button>');

    container.appendChild(div);
}

// ─── YouTube helpers ──────────────────────────────────────────────────────────
function youtubeEmbed(url) {
    if (!url) return null;
    url = url.trim();
    var idMatch = url.match(/(?:youtube\.com\/(?:watch\?.*v=|embed\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
    if (!idMatch) return null;
    var videoId  = idMatch[1];
    var startSec = 0;
    var startMatch = url.match(/[?&]start=(\d+)/);
    if (startMatch) {
        startSec = parseInt(startMatch[1], 10);
    } else {
        var tMatch = url.match(/[?&]t=([0-9hms]+)/);
        if (tMatch) {
            var parts = tMatch[1].match(/^(?:(\d+)h)?(?:(\d+)m)?(?:(\d+)s?)?$/);
            if (parts) {
                startSec = (parseInt(parts[1] || 0) * 3600)
                         + (parseInt(parts[2] || 0) * 60)
                         +  parseInt(parts[3] || 0);
            }
        }
    }
    return 'https://www.youtube-nocookie.com/embed/' + videoId
         + (startSec > 0 ? '?start=' + startSec : '');
}

function esUrlYoutubeValida(url) {
    if (!url || typeof url !== 'string') return false;
    url = url.trim();
    var contadorHttp = (url.match(/https?:\/\//g) || []).length;
    if (contadorHttp > 1) return false;
    return /^https?:\/\/(www\.)?(youtube\.com\/(watch\?.*v=|embed\/)|youtu\.be\/)[a-zA-Z0-9_-]{11}/.test(url);
}

function actualizarPreviewVideo() {
    var url = document.getElementById('preg-video').value.trim();
    var src = youtubeEmbed(url);
    var preview = document.getElementById('preg-video-preview');
    var iframe  = document.getElementById('preg-video-iframe');
    if (src) {
        iframe.src = src;
        preview.style.display = '';
    } else {
        iframe.src = '';
        preview.style.display = 'none';
    }
}

async function subirImagenPregunta() {
    var file = document.getElementById('preg-imagen-file').files[0];
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) {
        mostrarToast('La imagen no puede superar 5 MB', 'error');
        document.getElementById('preg-imagen-file').value = '';
        return;
    }
    var estado = document.getElementById('preg-imagen-estado');
    estado.textContent = 'Subiendo…';
    var form = new FormData();
    form.append('imagen', file);
    try {
        var resp = await fetch('/api/admin/capacitaciones/upload-imagen', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + api.getToken() },
            body: form
        });
        var data = await resp.json();
        if (!resp.ok) throw new Error(data.error || 'Error al subir');
        document.getElementById('preg-imagen').value = data.url;
        estado.textContent = file.name;
        document.getElementById('preg-imagen-img').src = data.url;
        document.getElementById('preg-imagen-preview').style.display = '';
    } catch (err) {
        estado.textContent = '';
        mostrarToast(err.message || 'Error al subir imagen', 'error');
    }
    document.getElementById('preg-imagen-file').value = '';
}

function quitarImagenPregunta() {
    document.getElementById('preg-imagen').value = '';
    document.getElementById('preg-imagen-estado').textContent = '';
    document.getElementById('preg-imagen-preview').style.display = 'none';
    document.getElementById('preg-imagen-img').src = '';
}

// ─── Guardar pregunta banco ───────────────────────────────────────────────────
async function guardarPregunta() {
    var enunciado = document.getElementById('preg-enunciado').value.trim();
    if (!enunciado) { mostrarToast('El enunciado es obligatorio', 'error'); return; }

    var tipo          = document.getElementById('preg-tipo').value;
    var tieneVideo    = (tipo === 'video_alternativas'  || tipo === 'verdadero_falso_video');
    var tieneImagen   = (tipo === 'imagen_alternativas' || tipo === 'verdadero_falso_imagen');
    var videoUrl      = tieneVideo  ? (document.getElementById('preg-video').value.trim()  || null) : null;
    var videoSinAudio = tieneVideo  ? document.getElementById('preg-video-sin-audio').checked : false;
    var imagenUrl     = tieneImagen ? (document.getElementById('preg-imagen').value.trim() || null) : null;

    if (tieneVideo && !videoUrl) {
        mostrarToast('Debes ingresar la URL del video de YouTube', 'error'); return;
    }
    if (tieneVideo && videoUrl && !esUrlYoutubeValida(videoUrl)) {
        mostrarToast('El enlace de YouTube no es válido. Revisa que no esté duplicado o mal copiado.', 'error'); return;
    }
    if (tieneImagen && !imagenUrl) {
        mostrarToast('Debes subir una imagen para este tipo de pregunta', 'error'); return;
    }

    var rows = document.querySelectorAll('#alts-container .alt-row');
    if (rows.length < 2) { mostrarToast('Agrega al menos 2 alternativas', 'error'); return; }

    var checked = document.querySelector('#alts-container input[type="radio"]:checked');
    if (!checked) { mostrarToast('Debes marcar la alternativa correcta', 'error'); return; }
    var correctaRowId = checked.value;

    var alts = [];
    var tieneCorrecta = false;
    var vacio = false;
    rows.forEach(function (row) {
        var input  = row.querySelector('input[type="text"]');
        var texto  = input ? input.value.trim() : '';
        if (!texto) { vacio = true; return; }
        var radio  = row.querySelector('input[type="radio"]');
        var esCorrecta = radio && radio.value === correctaRowId;
        if (esCorrecta) tieneCorrecta = true;
        alts.push({ texto: texto, es_correcta: esCorrecta });
    });

    if (vacio)         { mostrarToast('Completa o elimina las alternativas vacías', 'error'); return; }
    if (!tieneCorrecta){ mostrarToast('Debes marcar la alternativa correcta', 'error'); return; }

    var comentarioBanco = document.getElementById('preg-comentario').value.trim();
    if (comentarioBanco.length > 500) {
        mostrarToast('El comentario no puede superar los 500 caracteres.', 'error'); return;
    }

    var payload = {
        tipo:               tipo,
        enunciado:          enunciado,
        video_url:          videoUrl,
        video_sin_audio:    videoSinAudio,
        imagen_url:         imagenUrl,
        activa:             document.getElementById('preg-activa').checked,
        categoria_tematica: document.getElementById('preg-categoria').value.trim() || null,
        dificultad:         document.getElementById('preg-dificultad').value || null,
        etiquetas:          document.getElementById('preg-etiquetas').value.trim() || null,
        comentario_banco:   comentarioBanco || null,
        alternativas:       alts
    };

    try {
        if (_editId) {
            await api.put('/admin/capacitaciones/banco-preguntas/' + _editId, payload);
            mostrarToast('Pregunta actualizada', 'exito');
        } else {
            await api.post('/admin/capacitaciones/banco-preguntas', payload);
            mostrarToast('Pregunta creada en el banco', 'exito');
        }
        cerrarModalPregunta();
        await cargarBanco();
    } catch (err) {
        mostrarToast(err.message || 'Error al guardar', 'error');
    }
}

// ─── Exportar banco ───────────────────────────────────────────────────────────
async function exportarBanco() {
    try {
        var params = construirParams();
        var ts = new Date().toISOString().slice(0, 10);
        await api.descargar(
            '/admin/capacitaciones/banco-preguntas/exportar?' + params,
            'banco_preguntas_' + ts + '.csv'
        );
    } catch (err) {
        mostrarToast(err.message || 'Error al exportar', 'error');
    }
}
