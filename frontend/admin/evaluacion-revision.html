<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bandeja de Revisión — Administrador</title>
    <link rel="icon" type="image/png" href="/assets/logo_V2.png">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .badge-eval { display:inline-block; padding:2px 9px; border-radius:10px; font-size:11px; font-weight:600; }
        .badge-en_proceso           { background:#d6eaf8; color:#1a5276; }
        .badge-pendiente_comision   { background:#fdebd0; color:#784212; }
        .badge-pendiente_aprobacion { background:#fef9e7; color:#7d6608; }
        .badge-devuelto             { background:#fadbd8; color:#922b21; }
        .badge-aprobado             { background:#d5f5e3; color:#1e8449; }

        .badge-caso-pendiente_analista { background:#fdebd0; color:#784212; }
        .badge-caso-derivado_comision  { background:#fef9e7; color:#7d6608; }
        .badge-caso-resuelto           { background:#d5f5e3; color:#1e8449; }
        .badge-caso-consolidado        { background:#d1f2eb; color:#148f77; }

        .badge-tipo-interpretativa { background:#eaf4fb; color:#1a5276; }
        .badge-tipo-reglamentaria  { background:#fef9e7; color:#7d6608; }
        .badge-tipo-informativo    { background:#e9f7ef; color:#1e8449; }

        .badge-decision-acepta  { background:#d5f5e3; color:#1e8449; }
        .badge-decision-rechaza { background:#fadbd8; color:#922b21; }
        .badge-decision-nula    { background:#eaecee; color:#666; }

        .ciclo-header {
            display:flex; justify-content:space-between; align-items:center;
            flex-wrap:wrap; gap:8px; margin-bottom:12px;
        }
        .caso-card {
            border:1px solid var(--gris-borde);
            border-radius:10px;
            margin-bottom:14px;
            background:#fff;
            overflow:hidden;
        }
        .caso-card-header {
            display:flex; justify-content:space-between; align-items:center;
            flex-wrap:wrap; gap:8px;
            padding:12px 16px;
            background:#f8f9fa;
            border-bottom:1px solid var(--gris-borde);
        }
        .caso-card-body { padding:14px 16px; }
        .respuestas-tabla { width:100%; border-collapse:collapse; font-size:13px; margin-top:10px; }
        .respuestas-tabla th {
            text-align:left; font-weight:600; color:var(--gris);
            padding:6px 8px; border-bottom:2px solid var(--gris-borde);
        }
        .respuestas-tabla td { padding:6px 8px; border-bottom:1px solid var(--gris-borde); vertical-align:top; }
        .respuestas-tabla tr:last-child td { border-bottom:none; }
        .decision-ya-tomada {
            background:#f0faf4; border:1px solid #a9dfbf; border-radius:8px;
            padding:10px 14px; margin-top:10px; font-size:13px;
        }
        .decision-ya-tomada strong { color:#1e8449; }
        .descuento-badge {
            display:inline-block; padding:1px 6px; border-radius:4px;
            font-size:11px; font-weight:600; background:#fdebd0; color:#784212;
        }
        .descuento-cero { background:#f0f0f0; color:#aaa; }
        .filtros-bar {
            display:flex; align-items:center; gap:12px; flex-wrap:wrap;
            margin-bottom:18px;
        }
        .info-eval-header {
            margin-bottom:18px;
            padding:14px 16px;
            background:#fff;
            border:1px solid var(--gris-borde);
            border-radius:10px;
        }
        .info-eval-header h2 { margin:0 0 4px; font-size:17px; }
        .info-eval-header p  { margin:0; color:var(--gris); font-size:13px; }
        .sin-casos { text-align:center; color:var(--gris); padding:32px; }
    </style>
</head>
<body>
<div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <img src="/assets/logo_V2.png" alt="Federación del Rodeo Chileno" style="width:72px;height:72px;object-fit:contain;margin-bottom:6px;">
            <h2>Sistema de Jurados<br>Rodeo Chileno</h2>
        </div>
        <nav class="sidebar-nav" data-active="/admin/evaluaciones.html"></nav>
        <div class="sidebar-footer">
            <div class="sidebar-usuario" id="nombre-admin"></div>
            <button class="btn btn-secundario btn-pequeño w-100" onclick="api.cerrarSesion()">Cerrar Sesión</button>
        </div>
    </aside>

    <!-- CONTENIDO -->
    <div class="main-content">
        <div class="topbar">
            <div class="flex items-center gap-12">
                <button class="btn-menu-movil" onclick="document.getElementById('sidebar').classList.toggle('abierto')">☰</button>
                <a id="link-volver-detalle" href="/admin/evaluacion-detalle.html" class="btn btn-secundario btn-pequeño" style="margin-right:8px;">← Volver al detalle</a>
                <h1>Bandeja de Revisión</h1>
            </div>
        </div>

        <div class="page-body">
            <div id="contenido-revision">
                <div class="spinner-wrap"><div class="spinner"></div></div>
            </div>
        </div>
    </div>
</div>

<!-- MODAL: Decisión analista -->
<div class="modal-overlay oculto" id="modal-decision">
    <div class="modal" style="max-width:460px;">
        <div class="modal-header">
            <h3 class="modal-titulo" id="modal-decision-titulo">Registrar decisión</h3>
            <button class="modal-cerrar" onclick="cerrarModalDecision()">✕</button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="decision-caso-id">
            <div class="form-group" style="margin-bottom:14px;">
                <label class="form-label">Decisión</label>
                <select id="decision-valor" class="form-control">
                    <option value="mantener">Mantener — La evaluación del jurado es correcta</option>
                    <option value="revertir">Revertir — Se modifica la evaluación</option>
                    <option value="derivar_comision">Derivar a Comisión — Requiere revisión superior</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Comentario <span style="color:var(--rojo);">*</span></label>
                <textarea id="decision-comentario" class="form-control" rows="4"
                    placeholder="Fundamente la decisión..." maxlength="2000"></textarea>
                <div id="decision-error" class="form-error oculto"></div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secundario" onclick="cerrarModalDecision()">Cancelar</button>
            <button class="btn btn-primario" onclick="guardarDecision()">Guardar decisión</button>
        </div>
    </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/admin-nav.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/sidebar-toggle.js"></script>
<script>
(async function () {
    protegerRuta();
    document.getElementById('nombre-admin').textContent = api.getUsuario()?.nombre_completo || '';

    const params   = getQueryParams();
    const evalId   = params.id;
    const rolEval  = api.getUsuario()?.rol_evaluacion ?? null;
    const esAnalista = rolEval === null || rolEval === 'analista' || rolEval === 'jefe_area';

    if (!evalId) {
        document.getElementById('contenido-revision').innerHTML =
            '<div class="alerta alerta-error">No se especificó una evaluación. Redirigiendo...</div>';
        setTimeout(() => { window.location.href = '/admin/evaluaciones.html'; }, 2000);
        return;
    }

    document.getElementById('link-volver-detalle').href = '/admin/evaluacion-detalle.html?id=' + evalId;

    let _estadoFiltro = 'pendiente_analista';

    // ── Helpers ──────────────────────────────────────────────────────────────
    function badgeEval(estado) {
        return `<span class="badge-eval badge-${estado}">${labelEstado(estado)}</span>`;
    }
    function labelEstado(e) {
        const m = {
            en_proceso:'En proceso', pendiente_comision:'Pend. comisión',
            pendiente_aprobacion:'Pend. aprobación', devuelto:'Devuelto',
            aprobado:'Aprobado', publicado:'Publicado', cerrado:'Cerrado', borrador:'Borrador'
        };
        return m[e] || e;
    }
    function badgeCaso(estado) {
        const m = {
            pendiente_analista:'Pend. analista', derivado_comision:'Deriv. comisión',
            resuelto:'Resuelto', consolidado:'Consolidado'
        };
        return `<span class="badge-eval badge-caso-${estado}">${m[estado] || estado}</span>`;
    }
    function badgeTipo(tipo) {
        const m = { interpretativa:'Interpretativa', reglamentaria:'Reglamentaria', informativo:'Informativo' };
        return `<span class="badge-eval badge-tipo-${tipo}">${m[tipo] || tipo}</span>`;
    }
    function badgeDecision(dec) {
        if (!dec) return '<span style="color:var(--gris);font-size:12px;">—</span>';
        const cfg = {
            acepta:  { cls:'badge-decision-acepta',  label:'Acepta' },
            rechaza: { cls:'badge-decision-rechaza', label:'Rechaza' },
            nula:    { cls:'badge-decision-nula',    label:'Nula' }
        };
        const c = cfg[dec] || { cls:'badge-decision-nula', label: dec };
        return `<span class="badge-eval ${c.cls}">${c.label}</span>`;
    }

    // ── Carga principal ───────────────────────────────────────────────────────
    async function cargar() {
        document.getElementById('contenido-revision').innerHTML =
            '<div class="spinner-wrap"><div class="spinner"></div></div>';
        try {
            const data = await api.get(`/admin/evaluaciones/${evalId}/revision?estado=${_estadoFiltro}`);
            renderRevision(data);
        } catch (e) {
            document.getElementById('contenido-revision').innerHTML =
                `<div class="alerta alerta-error">${sanitizar(e.message || 'Error al cargar la bandeja.')}</div>`;
        }
    }

    function renderRevision(data) {
        const rodeo = data.rodeo || {};
        const ciclos = data.ciclos || [];
        const totalCasos = data.total_casos || 0;

        let html = `
        <div class="info-eval-header">
            <h2>${sanitizar(rodeo.club || 'Club sin nombre')} — ${sanitizar(rodeo.asociacion || '')}</h2>
            <p>
                ${sanitizar(rodeo.fecha || '')}
                ${rodeo.tipo_rodeo_nombre ? ' &middot; ' + sanitizar(rodeo.tipo_rodeo_nombre) : ''}
                &middot; Estado evaluación: ${badgeEval(data.estado || '')}
            </p>
        </div>

        <div class="filtros-bar">
            <label class="form-label" style="margin:0;">Filtrar casos:</label>
            <select id="filtro-estado-caso" class="form-control" style="width:auto;min-width:200px;" onchange="cambiarFiltro(this.value)">
                <option value="pendiente_analista" ${_estadoFiltro==='pendiente_analista'?'selected':''}>Pendiente analista</option>
                <option value="resuelto" ${_estadoFiltro==='resuelto'?'selected':''}>Resuelto</option>
                <option value="derivado_comision" ${_estadoFiltro==='derivado_comision'?'selected':''}>Derivado a comisión</option>
            </select>
            <span style="color:var(--gris);font-size:13px;">${totalCasos} caso(s)</span>
        </div>`;

        if (ciclos.length === 0) {
            html += '<div class="sin-casos">No hay casos con el filtro seleccionado.</div>';
        } else {
            ciclos.forEach(ciclo => {
                const casos = ciclo.casos || [];
                html += `
                <div class="card ciclo-card" style="margin-bottom:20px;">
                    <div class="ciclo-header">
                        <strong>Ciclo ${ciclo.numero_ciclo}</strong>
                        <span style="color:var(--gris);font-size:13px;">${casos.length} caso(s)</span>
                    </div>`;

                if (casos.length === 0) {
                    html += '<p style="color:var(--gris);font-size:13px;margin:0;">Sin casos en este ciclo para el filtro seleccionado.</p>';
                } else {
                    casos.forEach(caso => {
                        html += renderCasoCard(caso, data.estado, esAnalista);
                    });
                }
                html += '</div>';
            });
        }

        document.getElementById('contenido-revision').innerHTML = html;
    }

    function renderCasoCard(caso, estadoEval, puedeDecidir) {
        const respuestas = caso.respuestas || [];
        const yaDecidio  = !!caso.decision_analista;
        const estadosEditables = ['en_proceso', 'pendiente_comision'];
        const puedeEditar = puedeDecidir && estadosEditables.includes(estadoEval);

        let html = `
        <div class="caso-card">
            <div class="caso-card-header">
                <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
                    <strong>Caso #${caso.numero_caso}</strong>
                    ${badgeTipo(caso.tipo_caso)}
                    ${badgeCaso(caso.estado)}
                    <span class="descuento-badge ${caso.descuento_puntos === 0 ? 'descuento-cero' : ''}">
                        ${caso.descuento_puntos === 0 ? 'Sin descuento' : '-' + caso.descuento_puntos + ' pt'}
                    </span>
                </div>
                ${puedeEditar ? `<button class="btn btn-pequeño ${yaDecidio ? 'btn-secundario' : 'btn-primario'}"
                    onclick="abrirModalDecision('${caso.id}', '${caso.numero_caso}', ${yaDecidio ? `'${caso.decision_analista}'` : 'null'}, ${yaDecidio ? `'${sanitizar(caso.comentario_analista || '').replace(/'/g,'&#39;')}'` : 'null'})">
                    ${yaDecidio ? 'Editar decisión' : 'Registrar decisión'}
                </button>` : ''}
            </div>
            <div class="caso-card-body">`;

        if (caso.descripcion) {
            html += `<p style="margin:0 0 10px;font-size:13px;">${sanitizar(caso.descripcion)}</p>`;
        }
        if (caso.video_url) {
            html += `<p style="margin:0 0 10px;font-size:13px;">
                <a href="${sanitizar(caso.video_url)}" target="_blank" rel="noopener" style="color:var(--primario);">Ver video ↗</a>
            </p>`;
        }

        // Tabla de respuestas de jurados
        if (respuestas.length === 0) {
            html += '<p style="color:var(--gris);font-size:13px;">Sin respuestas de jurados registradas.</p>';
        } else {
            html += `
            <table class="respuestas-tabla">
                <thead>
                    <tr>
                        <th>Jurado</th>
                        <th>Categoría</th>
                        <th>Decisión</th>
                        <th>Comentario</th>
                    </tr>
                </thead>
                <tbody>`;
            respuestas.forEach(r => {
                const j = r.jurado || {};
                html += `<tr>
                    <td>${sanitizar(j.nombre_completo || '—')}</td>
                    <td>${sanitizar(j.categoria || '—')}</td>
                    <td>${badgeDecision(r.decision)}</td>
                    <td style="color:var(--gris);">${sanitizar(r.comentario || '—')}</td>
                </tr>`;
            });
            html += '</tbody></table>';

            // Resultado consolidado
            if (caso.estado_consolidado) {
                const iconCon = caso.estado_consolidado === 'acepta' ? '✅' : caso.estado_consolidado === 'rechaza' ? '❌' : '⚠️';
                html += `<p style="margin-top:8px;font-size:12px;color:var(--gris);">
                    Resultado consolidado: ${iconCon} <strong>${caso.estado_consolidado}</strong>
                </p>`;
            }
        }

        // Decisión ya tomada por analista
        if (yaDecidio) {
            const decLabel = { mantener:'Mantener', revertir:'Revertir', derivar_comision:'Derivar a comisión' };
            html += `<div class="decision-ya-tomada">
                <strong>Decisión analista: ${decLabel[caso.decision_analista] || caso.decision_analista}</strong>
                ${caso.comentario_analista ? `<p style="margin:6px 0 0;color:var(--texto);">${sanitizar(caso.comentario_analista)}</p>` : ''}
                ${caso.analista_decidio_en ? `<p style="margin:4px 0 0;font-size:11px;color:var(--gris);">${formatFecha(caso.analista_decidio_en)}</p>` : ''}
            </div>`;
        }

        html += '</div></div>';
        return html;
    }

    // ── Filtro ────────────────────────────────────────────────────────────────
    window.cambiarFiltro = function(val) {
        _estadoFiltro = val;
        cargar();
    };

    // ── Modal decisión ────────────────────────────────────────────────────────
    window.abrirModalDecision = function(casoId, numeroCaso, decisionActual, comentarioActual) {
        document.getElementById('decision-caso-id').value = casoId;
        document.getElementById('modal-decision-titulo').textContent = `Caso #${numeroCaso} — Decisión analista`;
        document.getElementById('decision-valor').value = decisionActual || 'mantener';
        document.getElementById('decision-comentario').value = comentarioActual || '';
        document.getElementById('decision-error').classList.add('oculto');
        document.getElementById('decision-error').textContent = '';
        document.getElementById('modal-decision').classList.remove('oculto');
    };

    window.cerrarModalDecision = function() {
        document.getElementById('modal-decision').classList.add('oculto');
    };

    window.guardarDecision = async function() {
        const casoId     = document.getElementById('decision-caso-id').value;
        const decision   = document.getElementById('decision-valor').value;
        const comentario = document.getElementById('decision-comentario').value.trim();
        const errEl      = document.getElementById('decision-error');

        if (!comentario) {
            errEl.textContent = 'El comentario es obligatorio.';
            errEl.classList.remove('oculto');
            return;
        }
        errEl.classList.add('oculto');

        try {
            const res = await api.post(`/admin/casos/${casoId}/decision-analista`, {
                decision,
                comentario_analista: comentario
            });
            cerrarModalDecision();

            let msg = 'Decisión guardada.';
            if (res.ciclo_cerrado) msg += ' El ciclo ha sido cerrado automáticamente.';
            if (res.evaluacion_actualizada && res.evaluacion_actualizada.estado) {
                msg += ` Evaluación ahora en estado: ${labelEstado(res.evaluacion_actualizada.estado)}.`;
            }
            mostrarToast(msg, res.ciclo_cerrado ? 'warning' : 'exito');
            cargar();
        } catch (e) {
            errEl.textContent = e.message || 'Error al guardar la decisión.';
            errEl.classList.remove('oculto');
        }
    };

    // Cerrar modal al click fuera
    document.getElementById('modal-decision').addEventListener('click', function(e) {
        if (e.target === this) cerrarModalDecision();
    });

    cargar();
})();
</script>
</body>
</html>
