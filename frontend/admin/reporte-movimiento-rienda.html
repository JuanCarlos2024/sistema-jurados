<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte Movimiento de Rienda — Administrador</title>
    <link rel="icon" type="image/png" href="/assets/logo_V2.png">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .filtros-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 14px;
        }
        @media (max-width: 900px) { .filtros-grid { grid-template-columns: 1fr 1fr; } }
        @media (max-width: 560px) { .filtros-grid { grid-template-columns: 1fr; } }

        .tabla-reporte { font-size: 12px; }
        .tabla-reporte th { font-size: 11px; white-space: nowrap; }
        .tabla-reporte td { vertical-align: top; max-width: 200px; word-break: break-word; }

        .badge-enviada  { background: #d5f5e3; color: #1e8449; }
        .badge-borrador { background: #f0f0f0; color: #666; }
        .badge-estado {
            display: inline-block;
            padding: 1px 7px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
        }

        .resumen-bar {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 12px;
            font-size: 13px;
            color: var(--gris);
        }
        .resumen-stat { font-weight: 600; color: var(--oscuro); }
    </style>
</head>
<body>
<div class="layout">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <img src="/assets/logo_V2.png" alt="Federación del Rodeo Chileno" style="width:72px;height:72px;object-fit:contain;margin-bottom:6px;">
            <h2>Sistema de Jurados<br>Rodeo Chileno</h2>
        </div>
        <nav class="sidebar-nav"></nav>
        <div class="sidebar-footer">
            <div class="sidebar-usuario" id="nombre-admin"></div>
            <button class="btn btn-secundario btn-pequeño w-100" onclick="api.cerrarSesion()">Cerrar Sesión</button>
        </div>
    </aside>

    <div class="main-content">
        <div class="topbar">
            <div class="flex items-center gap-12">
                <button class="btn-menu-movil" onclick="document.getElementById('sidebar').classList.toggle('abierto')">☰</button>
                <h1>Reporte Movimiento de Rienda</h1>
            </div>
        </div>

        <div class="page-body">

            <!-- Filtros -->
            <div class="card" style="margin-bottom:20px;">
                <div class="card-titulo">Filtros</div>
                <form id="form-filtros" onsubmit="window.buscar(event)">
                    <div class="filtros-grid">
                        <div class="form-grupo">
                            <label class="form-label">Fecha desde</label>
                            <input type="date" id="f-fecha-desde" name="fecha_desde" class="form-control">
                        </div>
                        <div class="form-grupo">
                            <label class="form-label">Fecha hasta</label>
                            <input type="date" id="f-fecha-hasta" name="fecha_hasta" class="form-control">
                        </div>
                        <div class="form-grupo">
                            <label class="form-label">Club</label>
                            <input type="text" id="f-club" name="club" class="form-control" placeholder="Ej: Club de Huasos…">
                        </div>
                        <div class="form-grupo">
                            <label class="form-label">Asociación</label>
                            <input type="text" id="f-asociacion" name="asociacion" class="form-control" placeholder="Ej: Santiago…">
                        </div>
                        <div class="form-grupo">
                            <label class="form-label">Jurado</label>
                            <input type="text" id="f-jurado" name="jurado" class="form-control" placeholder="Nombre del jurado…">
                        </div>
                        <div class="form-grupo">
                            <label class="form-label">Tipo de rodeo</label>
                            <input type="text" id="f-tipo-rodeo" name="tipo_rodeo" class="form-control" placeholder="Ej: Nacional…">
                        </div>
                        <div class="form-grupo">
                            <label class="form-label">Estado cartilla</label>
                            <select id="f-estado" name="estado" class="form-control">
                                <option value="">Todos</option>
                                <option value="enviada">Enviada</option>
                                <option value="borrador">Borrador</option>
                            </select>
                        </div>
                        <div class="form-grupo">
                            <label class="form-label">Categoría rienda</label>
                            <input type="text" id="f-categoria-rienda" name="categoria_rienda" class="form-control" placeholder="Ej: Adulto masculino…">
                        </div>
                        <div class="form-grupo">
                            <label class="form-label">Sistema</label>
                            <input type="text" id="f-sistema" name="sistema" class="form-control" placeholder="Ej: Sistema A…">
                        </div>
                        <div class="form-grupo">
                            <label class="form-label">Nombre socio</label>
                            <input type="text" id="f-nombre-socio" name="nombre_socio" class="form-control" placeholder="Nombre del socio…">
                        </div>
                        <div class="form-grupo">
                            <label class="form-label">RUT socio</label>
                            <input type="text" id="f-rut-socio" name="rut_socio" class="form-control" placeholder="Ej: 12345678-9">
                        </div>
                        <div class="form-grupo">
                            <label class="form-label">Nombre equino</label>
                            <input type="text" id="f-nombre-equino" name="nombre_equino" class="form-control" placeholder="Nombre del equino…">
                        </div>
                        <div class="form-grupo">
                            <label class="form-label">Puntaje desde</label>
                            <input type="number" id="f-puntaje-desde" name="puntaje_desde" class="form-control" placeholder="Ej: 0" min="0" step="0.5">
                        </div>
                        <div class="form-grupo">
                            <label class="form-label">Puntaje hasta</label>
                            <input type="number" id="f-puntaje-hasta" name="puntaje_hasta" class="form-control" placeholder="Ej: 40" min="0" step="0.5">
                        </div>
                    </div>
                    <div class="form-grupo" style="max-width:500px;">
                        <label class="form-label">Búsqueda libre (socio, equino, jurado, club, RUT)</label>
                        <input type="text" id="f-buscar" name="buscar" class="form-control" placeholder="Ej: Agua Turbia, Rojas Cornejo…">
                    </div>
                    <div class="flex gap-8" style="flex-wrap:wrap;">
                        <button type="submit" class="btn btn-primario">Buscar</button>
                        <button type="button" class="btn btn-outline" onclick="limpiarFiltros()">Limpiar filtros</button>
                        <button type="button" class="btn btn-secundario" onclick="exportar()" id="btn-exportar" disabled>Exportar CSV/Excel</button>
                    </div>
                </form>
            </div>

            <!-- Resultados -->
            <div class="card">
                <div id="resumen-bar" class="resumen-bar" style="display:none;"></div>
                <div id="contenido-tabla">
                    <div class="alerta alerta-info" style="font-size:13px;">
                        Usa los filtros y haz clic en <strong>Buscar</strong> para ver resultados.
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/admin-nav.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/sidebar-toggle.js"></script>
<script>
// ─── Init ─────────────────────────────────────────────────────────────────────

document.addEventListener('DOMContentLoaded', function () {
    protegerRuta('administrador');
    var u = api.getUsuario();
    if (!u) return api.cerrarSesion();
    document.getElementById('nombre-admin').textContent = u.nombre_completo || u.email || '';
});

// ─── Estado ───────────────────────────────────────────────────────────────────

var _ultimosFiltrosRienda = null;

// ─── Buscar ───────────────────────────────────────────────────────────────────

async function buscar(e) {
    if (e) e.preventDefault();

    var form   = document.getElementById('form-filtros');
    var fd     = new FormData(form);
    var params = {};
    fd.forEach(function (v, k) { if (String(v).trim()) params[k] = String(v).trim(); });
    _ultimosFiltrosRienda = params;

    var div = document.getElementById('contenido-tabla');
    div.innerHTML = '<div class="alerta alerta-info" style="font-size:13px;">Cargando registros de movimiento de rienda…</div>';
    document.getElementById('resumen-bar').style.display = 'none';
    document.getElementById('btn-exportar').disabled = true;

    var qs  = new URLSearchParams(params).toString();
    var url = '/admin/reportes/movimiento-rienda' + (qs ? '?' + qs : '');
    console.log('[rienda] GET', url);

    try {
        var datos = await api.get(url);
        console.log('[rienda] respuesta:', Array.isArray(datos) ? (datos.length + ' registros') : datos);
        renderTablaRienda(datos);
    } catch (err) {
        console.error('[rienda] error:', err);
        div.innerHTML = '<div class="alerta alerta-error">No fue posible cargar el reporte de movimiento de rienda. ' + sanitizar(err.message || 'Error desconocido') + '</div>';
    }
}

// ─── Render tabla ─────────────────────────────────────────────────────────────

function renderEstadoRienda(estado) {
    var cls = estado === 'enviada' ? 'badge-enviada' : 'badge-borrador';
    return '<span class="badge-estado ' + cls + '">' + sanitizar(estado) + '</span>';
}

function renderTablaRienda(datos) {
    var div = document.getElementById('contenido-tabla');
    var bar = document.getElementById('resumen-bar');

    if (!datos || !Array.isArray(datos) || datos.length === 0) {
        div.innerHTML = '<div class="alerta alerta-advertencia">No se encontraron registros de movimiento de rienda para los filtros seleccionados.</div>';
        bar.style.display = 'none';
        document.getElementById('btn-exportar').disabled = true;
        return;
    }

    var cartillasUnicas = new Set(datos.map(function (f) { return f.asignacion_id; })).size;
    bar.style.display = 'flex';
    bar.innerHTML = '<span>' + datos.length + ' registro(s) de rienda</span>'
        + '<span>·</span>'
        + '<span class="resumen-stat">' + cartillasUnicas + '</span> cartilla(s) distintas';
    document.getElementById('btn-exportar').disabled = false;

    var filas = datos.map(function (f) {
        return '<tr>'
            + '<td style="white-space:nowrap;">' + sanitizar(f.fecha_rodeo) + '</td>'
            + '<td>' + sanitizar(f.club) + '</td>'
            + '<td>' + sanitizar(f.asociacion) + '</td>'
            + '<td style="white-space:nowrap;">' + sanitizar(f.tipo_rodeo) + '</td>'
            + '<td>' + sanitizar(f.jurado) + '</td>'
            + '<td style="white-space:nowrap;">' + sanitizar(f.categoria_jurado) + '</td>'
            + '<td>' + renderEstadoRienda(f.estado_cartilla) + '</td>'
            + '<td style="white-space:nowrap;font-size:11px;">' + sanitizar(f.fecha_envio) + '</td>'
            + '<td style="white-space:nowrap;font-weight:600;color:#1e8449;">' + sanitizar(f.categoria_rienda) + '</td>'
            + '<td style="white-space:nowrap;">' + sanitizar(f.sistema) + '</td>'
            + '<td>' + sanitizar(f.nombre_socio) + '</td>'
            + '<td style="white-space:nowrap;font-size:11px;">' + sanitizar(f.rut_socio) + '</td>'
            + '<td>' + sanitizar(f.nro_socio) + '</td>'
            + '<td>' + sanitizar(f.nombre_equino) + '</td>'
            + '<td style="font-size:11px;">' + sanitizar(f.nro_inscripcion) + '</td>'
            + '<td style="text-align:right;font-weight:600;">' + sanitizar(f.puntaje) + '</td>'
            + '</tr>';
    }).join('');

    div.innerHTML = '<div style="overflow-x:auto;">'
        + '<table class="tabla tabla-reporte"><thead><tr>'
        + '<th>Fecha rodeo</th>'
        + '<th>Club</th>'
        + '<th>Asociación</th>'
        + '<th>Tipo rodeo</th>'
        + '<th>Jurado</th>'
        + '<th>Cat. Jurado</th>'
        + '<th>Estado</th>'
        + '<th>Fecha envío</th>'
        + '<th>Categoría rienda</th>'
        + '<th>Sistema</th>'
        + '<th>Nombre socio</th>'
        + '<th>RUT socio</th>'
        + '<th>N° socio</th>'
        + '<th>Nombre equino</th>'
        + '<th>N° inscripción</th>'
        + '<th>Puntaje</th>'
        + '</tr></thead>'
        + '<tbody>' + filas + '</tbody>'
        + '</table></div>';
}

// ─── Exportar ─────────────────────────────────────────────────────────────────

function exportar() {
    if (!_ultimosFiltrosRienda) return;
    var qs  = new URLSearchParams(_ultimosFiltrosRienda).toString();
    var url = '/api/admin/reportes/movimiento-rienda/exportar' + (qs ? '?' + qs : '');
    var a   = document.createElement('a');
    a.href  = url;
    a.download = '';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}

// ─── Limpiar filtros ──────────────────────────────────────────────────────────

function limpiarFiltros() {
    document.getElementById('form-filtros').reset();
    _ultimosFiltrosRienda = null;
    document.getElementById('contenido-tabla').innerHTML =
        '<div class="alerta alerta-info" style="font-size:13px;">Usa los filtros y haz clic en <strong>Buscar</strong> para ver resultados.</div>';
    document.getElementById('resumen-bar').style.display = 'none';
    document.getElementById('btn-exportar').disabled = true;
}
</script>
</body>
</html>
