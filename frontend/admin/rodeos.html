<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rodeos — Administrador</title>
    <link rel="icon" type="image/png" href="/assets/logo_V2.png">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="layout">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo"><img src="/assets/logo_V2.png" alt="Federación del Rodeo Chileno" style="width:72px; height:72px; object-fit:contain; margin-bottom:6px;"><h2>Sistema de Jurados<br>Rodeo Chileno</h2></div>
        <nav class="sidebar-nav"></nav>
        <div class="sidebar-footer">
            <div class="sidebar-usuario" id="nombre-admin"></div>
            <button class="btn btn-secundario btn-pequeño w-100" onclick="api.cerrarSesion()">Cerrar Sesión</button>
        </div>
    </aside>

    <div class="main-content">
        <div class="topbar">
            <div class="flex items-center gap-12">
                <button class="btn-menu-movil" onclick="document.getElementById('sidebar').classList.toggle('abierto')">☰</button>
                <h1>Rodeos</h1>
            </div>
            <div class="topbar-acciones">
                <button class="btn btn-secundario" onclick="mostrarCategorias()">Categorías</button>
                <button class="btn btn-secundario" onclick="mostrarTipos()">Tipos de Rodeo</button>
                <button class="btn btn-primario" onclick="abrirNuevoRodeo()">+ Nuevo rodeo</button>
            </div>
        </div>

        <div class="page-body">
            <!-- Filtros básicos -->
            <div class="filtros-barra">
                <div class="form-grupo">
                    <label class="form-label">Mes</label>
                    <select id="f-mes" class="form-control" onchange="cargar()">
                        <option value="">Todos</option>
                        <option value="1">Enero</option><option value="2">Febrero</option>
                        <option value="3">Marzo</option><option value="4">Abril</option>
                        <option value="5">Mayo</option><option value="6">Junio</option>
                        <option value="7">Julio</option><option value="8">Agosto</option>
                        <option value="9">Septiembre</option><option value="10">Octubre</option>
                        <option value="11">Noviembre</option><option value="12">Diciembre</option>
                    </select>
                </div>
                <div class="form-grupo">
                    <label class="form-label">Año</label>
                    <select id="f-año" class="form-control" onchange="cargar()"></select>
                </div>
                <div class="form-grupo" style="flex:2; min-width:180px;">
                    <label class="form-label">Buscar</label>
                    <input type="text" id="f-buscar" class="form-control" placeholder="Club, asociación, jurado o delegado" oninput="debounce(cargar,400)()">
                </div>
                <button class="btn btn-secundario" onclick="toggleFiltros()" id="btn-filtros-avz">Filtros avanzados ▼</button>
                <button class="btn btn-secundario" onclick="limpiar()">Limpiar</button>
                <button class="btn btn-outline" onclick="exportar()">↓ Exportar</button>
            </div>

            <!-- Panel filtros avanzados (colapsable) -->
            <div id="panel-filtros-avz" class="oculto" style="background:#f8f9fa; border:1px solid var(--gris-claro); border-radius:8px; padding:16px; margin-bottom:16px;">
                <div style="display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:12px;">
                    <div class="form-grupo" style="margin-bottom:0;">
                        <label class="form-label">Categoría de rodeo</label>
                        <select id="f-cat" class="form-control" onchange="cargar()">
                            <option value="">Todas</option>
                        </select>
                    </div>
                    <div class="form-grupo" style="margin-bottom:0;">
                        <label class="form-label">Tipo de rodeo</label>
                        <select id="f-tipo" class="form-control" onchange="cargar()">
                            <option value="">Todos</option>
                        </select>
                    </div>
                    <div class="form-grupo" style="margin-bottom:0;">
                        <label class="form-label">Asociación</label>
                        <input type="text" id="f-asoc" class="form-control" placeholder="Nombre asociación" oninput="debounce(cargar,400)()">
                    </div>
                    <div class="form-grupo" style="margin-bottom:0;">
                        <label class="form-label">Club</label>
                        <input type="text" id="f-club" class="form-control" placeholder="Nombre club" oninput="debounce(cargar,400)()">
                    </div>
                    <div class="form-grupo" style="margin-bottom:0;">
                        <label class="form-label">Jurado asignado</label>
                        <select id="f-jurado" class="form-control" onchange="cargar()">
                            <option value="">Todos</option>
                        </select>
                    </div>
                    <div class="form-grupo" style="margin-bottom:0;">
                        <label class="form-label">Delegado asignado</label>
                        <select id="f-delegado" class="form-control" onchange="cargar()">
                            <option value="">Todos</option>
                        </select>
                    </div>
                    <div class="form-grupo" style="margin-bottom:0;">
                        <label class="form-label">Fecha desde</label>
                        <input type="date" id="f-desde" class="form-control" onchange="cargar()">
                    </div>
                    <div class="form-grupo" style="margin-bottom:0;">
                        <label class="form-label">Fecha hasta</label>
                        <input type="date" id="f-hasta" class="form-control" onchange="cargar()">
                    </div>
                    <div class="form-grupo" style="margin-bottom:0;">
                        <label class="form-label">Asistencia Jurado</label>
                        <select id="f-est-j" class="form-control" onchange="cargar()">
                            <option value="">Todos</option>
                            <option value="pendiente">Sin respuesta</option>
                            <option value="aceptado">Aceptó asistir</option>
                            <option value="rechazado">Rechazó asistir</option>
                        </select>
                    </div>
                    <div class="form-grupo" style="margin-bottom:0;">
                        <label class="form-label">Asistencia Delegado</label>
                        <select id="f-est-d" class="form-control" onchange="cargar()">
                            <option value="">Todos</option>
                            <option value="pendiente">Sin respuesta</option>
                            <option value="aceptado">Aceptó asistir</option>
                            <option value="rechazado">Rechazó asistir</option>
                        </select>
                    </div>
                    <div class="form-grupo" style="margin-bottom:0;">
                        <label class="form-label">Cartilla Jurado</label>
                        <select id="f-cj" class="form-control" onchange="cargar()">
                            <option value="">Todos</option>
                            <option value="con">Con cartilla</option>
                            <option value="sin">Sin cartilla</option>
                        </select>
                    </div>
                    <div class="form-grupo" style="margin-bottom:0;">
                        <label class="form-label">Cartilla Delegado</label>
                        <select id="f-cd" class="form-control" onchange="cargar()">
                            <option value="">Todos</option>
                            <option value="con">Con cartilla</option>
                            <option value="sin">Sin cartilla</option>
                        </select>
                    </div>
                    <div class="form-grupo" style="margin-bottom:0;">
                        <label class="form-label">Video YouTube</label>
                        <select id="f-video" class="form-control" onchange="cargar()">
                            <option value="">Todos</option>
                            <option value="con">Con video</option>
                            <option value="sin">Sin video</option>
                        </select>
                    </div>
                    <div class="form-grupo" style="margin-bottom:0;">
                        <label class="form-label">Origen</label>
                        <select id="f-origen" class="form-control" onchange="cargar()">
                            <option value="">Todos</option>
                            <option value="manual">Manual</option>
                            <option value="importado">Importado (Excel)</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="card">
                <div id="tabla-wrap" class="tabla-wrap">
                    <div class="spinner-wrap"><div class="spinner"></div></div>
                </div>
                <div id="paginacion" class="paginacion"></div>
            </div>
        </div>
    </div>
</div>

<!-- Modal Adjuntos -->
<div class="modal-overlay oculto" id="modal-adj-overlay">
<div class="modal" style="max-width:720px;">
    <div class="modal-header">
        <h3 id="modal-adj-titulo">Adjuntos</h3>
        <button class="modal-cerrar" onclick="cerrarModalAdj()">×</button>
    </div>
    <div class="modal-body" id="modal-adj-body"></div>
</div>
</div>

<!-- Modal Preview (video / adjunto) — z-index alto para apilarse sobre modal-adj -->
<div class="modal-overlay oculto" id="modal-preview-overlay" style="z-index:1100;">
<div class="modal" style="max-width:880px; width:96vw; display:flex; flex-direction:column;">
    <div class="modal-header">
        <h3 id="modal-preview-titulo">Vista previa</h3>
        <button class="modal-cerrar" onclick="cerrarPreview()">×</button>
    </div>
    <div id="modal-preview-body" style="flex:1; min-height:300px; overflow:auto; padding:0;"></div>
    <div id="modal-preview-footer" style="padding:12px 20px; border-top:1px solid var(--gris-borde); display:flex; gap:8px; justify-content:flex-end; flex-shrink:0;"></div>
</div>
</div>

<!-- Modal Rodeo -->
<div class="modal-overlay oculto" id="modal-overlay">
<div class="modal" style="max-width:700px;">
    <div class="modal-header">
        <h3 id="modal-titulo">Nuevo rodeo</h3>
        <button class="modal-cerrar" onclick="cerrarModal()">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
</div>
</div>

<script src="/js/api.js"></script>
<script src="/js/admin-nav.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/sidebar-toggle.js"></script>
<script>
protegerRuta('administrador');
document.getElementById('nombre-admin').textContent = api.getUsuario()?.nombre || '';

// Rol del usuario actual
const _rolEvalRodeos = api.getUsuario()?.rol_evaluacion || null;
const esMonitor        = _rolEvalRodeos === 'monitor';
const esDirector       = _rolEvalRodeos === 'director';
const esAnalistaRodeos = _rolEvalRodeos === 'analista';
const esComisionRodeos = _rolEvalRodeos === 'comision_tecnica';

// Monitor / Comisión Técnica: ocultar acciones de admin en el topbar
if (esMonitor || esComisionRodeos) {
    document.querySelectorAll('.topbar-acciones button').forEach(b => b.style.display = 'none');
}

let paginaActual = 1;
const POR_PAGINA = 25;
let tiposRodeo = [];
let categoriasRodeo = [];
let rodeoActual = null;

let debounceTimer;
function debounce(fn, d) { return () => { clearTimeout(debounceTimer); debounceTimer = setTimeout(fn, d); }; }

// Poblar selector de año con JS (no con template literals en HTML)
function poblarAnios() {
    const sel = document.getElementById('f-año');
    const añoActual = new Date().getFullYear();
    sel.innerHTML = '<option value="">Todos</option>';
    for (let y = añoActual; y >= añoActual - 4; y--) {
        const opt = document.createElement('option');
        opt.value = String(y);
        opt.textContent = String(y);
        if (y === añoActual) opt.selected = true;
        sel.appendChild(opt);
    }
}

let todosJurados = [];
let todosDelegados = [];

async function init() {
    poblarAnios();
    try {
        const [tipos, cats, jurados, delegados] = await Promise.all([
            api.get('/admin/rodeos/tipos/lista?activo=true'),
            api.get('/admin/reportes/categorias-rodeo/lista?activo=true'),
            api.get('/admin/usuarios?tipo=jurado&activo=true&limit=500'),
            api.get('/admin/usuarios?tipo=delegado_rentado&activo=true&limit=500')
        ]);
        tiposRodeo      = tipos  || [];
        categoriasRodeo = cats   || [];
        todosJurados    = jurados?.data  || [];
        todosDelegados  = delegados?.data || [];
    } catch(err) {
        console.warn('[Rodeos] No se pudieron cargar datos iniciales:', err.message);
        tiposRodeo = []; categoriasRodeo = [];
        todosJurados = []; todosDelegados = [];
    }
    poblarFiltrosAvanzados();
    cargar();
}

function poblarFiltrosAvanzados() {
    // Categorías
    const fCat = document.getElementById('f-cat');
    categoriasRodeo.forEach(c => {
        const o = document.createElement('option'); o.value = c.id; o.textContent = c.nombre; fCat.appendChild(o);
    });
    // Tipos
    const fTipo = document.getElementById('f-tipo');
    tiposRodeo.forEach(t => {
        const o = document.createElement('option'); o.value = t.id; o.textContent = `${t.nombre} (${t.duracion_dias}d)`; fTipo.appendChild(o);
    });
    // Jurados
    const fJurado = document.getElementById('f-jurado');
    todosJurados.forEach(u => {
        const o = document.createElement('option'); o.value = u.id; o.textContent = u.nombre_completo; fJurado.appendChild(o);
    });
    // Delegados
    const fDeleg = document.getElementById('f-delegado');
    todosDelegados.forEach(u => {
        const o = document.createElement('option'); o.value = u.id; o.textContent = u.nombre_completo; fDeleg.appendChild(o);
    });
}

function toggleFiltros() {
    const panel = document.getElementById('panel-filtros-avz');
    const btn   = document.getElementById('btn-filtros-avz');
    const oculto = panel.classList.toggle('oculto');
    btn.textContent = oculto ? 'Filtros avanzados ▼' : 'Filtros avanzados ▲';
}

function limpiar() {
    ['f-mes','f-año','f-buscar','f-cat','f-tipo','f-asoc','f-club',
     'f-jurado','f-delegado','f-desde','f-hasta','f-est-j','f-est-d',
     'f-cj','f-cd','f-video','f-origen'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = '';
    });
    cargar();
}

function gv(id) { const el = document.getElementById(id); return el ? el.value.trim() : ''; }

async function cargar(pagina = 1) {
    paginaActual = pagina;
    const wrap = document.getElementById('tabla-wrap');
    mostrarSpinner(wrap);
    const p = toQueryString({
        mes:             gv('f-mes'),
        año:             gv('f-año'),
        buscar:          gv('f-buscar'),
        categoria_rodeo_id: gv('f-cat'),
        tipo_rodeo_id:   gv('f-tipo'),
        asociacion:      gv('f-asoc'),
        club:            gv('f-club'),
        jurado_id:       gv('f-jurado'),
        delegado_id:     gv('f-delegado'),
        fecha_desde:     gv('f-desde'),
        fecha_hasta:     gv('f-hasta'),
        estado_jurado:   gv('f-est-j'),
        estado_delegado: gv('f-est-d'),
        cartilla_jurado: gv('f-cj'),
        cartilla_delegado: gv('f-cd'),
        video:           gv('f-video'),
        origen:          gv('f-origen'),
        page:  paginaActual,
        limit: POR_PAGINA
    });
    try {
        const data = await api.get('/admin/rodeos?' + p);
        let indicadores = {};
        if (data.data && data.data.length > 0) {
            const ids = data.data.map(r => r.id).join(',');
            try { indicadores = await api.get('/admin/adjuntos/resumen?rodeo_ids=' + ids); } catch(e) { /* ignorar */ }
        }
        renderTabla(data.data, data.total, indicadores);
        renderPag(data.total);
    } catch(err) {
        wrap.innerHTML = `<div class="alerta alerta-error">${err.message || 'Error al cargar rodeos'}</div>`;
    }
}

function renderTabla(rodeos, total, indicadores = {}) {
    const wrap = document.getElementById('tabla-wrap');
    if (!rodeos || rodeos.length === 0) {
        wrap.innerHTML = '<p class="tabla-vacia">Sin rodeos para los filtros seleccionados</p>';
        return;
    }
    wrap.innerHTML = `<table>
        <thead><tr>
            <th>Fecha</th><th>Club</th><th>Asociación</th><th>Tipo</th><th>Delegado</th><th>Jurados</th>
            <th>Días</th><th>Asistencia J/D</th><th>Total pagos</th><th>Origen</th>
            <th title="CJ=Cartilla Jurado · CD=Cartilla Delegado · VY=Video YouTube">CJ/CD/VY</th>
            <th>Acciones</th>
        </tr></thead>
        <tbody>
        ${rodeos.map(r => {
            // Indicadores circulares por tipo de persona y estado
            function dot(n, color, label) {
                return n > 0 ? `<span style="color:${color}; font-weight:700;" title="${label}">● ${n}</span> ` : '';
            }
            const jStr = (dot(r.j_acept,'#27ae60','Jurado(s) aceptó asistir') +
                          dot(r.j_pend, '#f39c12','Jurado(s) sin respuesta') +
                          dot(r.j_rech, '#e74c3c','Jurado(s) rechazó asistir')).trim();
            const dStr = (dot(r.d_acept,'#27ae60','Delegado(s) aceptó asistir') +
                          dot(r.d_pend, '#f39c12','Delegado(s) sin respuesta') +
                          dot(r.d_rech, '#e74c3c','Delegado(s) rechazó asistir')).trim();
            const estadoHtml = (!r.jurados && !r.delegados)
                ? '<span style="color:#aaa;">—</span>'
                : `<div style="font-size:12px; line-height:1.8;">` +
                  (r.jurados   ? `<span style="color:#888; font-size:11px;">J:</span> ${jStr  || '<span style="color:#aaa; font-size:11px;">—</span>'} ` : '') +
                  (r.delegados ? `<span style="color:#888; font-size:11px;">D:</span> ${dStr  || '<span style="color:#aaa; font-size:11px;">—</span>'}` : '') +
                  `</div>`;
            const ind = indicadores[r.id] || { cj: false, cd: false, vy: false };
            const si = '<span style="color:#27ae60; font-weight:700;">✔</span>';
            const no = '<span style="color:#ccc;">✖</span>';
            const indicHtml = `<span style="font-size:12px; white-space:nowrap;">CJ ${ind.cj?si:no} CD ${ind.cd?si:no} VY ${ind.vy?si:no}</span>`;
            return `<tr>
            <td style="white-space:nowrap;">${formatFecha(r.fecha)}</td>
            <td>${sanitizar(r.club)}</td>
            <td>${sanitizar(r.asociacion)}</td>
            <td>${sanitizar(r.tipo_rodeo_nombre || '—')}</td>
            <td style="font-size:13px;">${r.delegado_nombre ? sanitizar(r.delegado_nombre) : '<span style="color:#aaa;">—</span>'}</td>
            <td style="font-size:13px;">${(() => {
                const nombres = r.jurados_nombres || [];
                if (nombres.length === 0) return '<span style="color:#aaa;">—</span>';
                const visibles = nombres.slice(0, 2).map(n => `<strong>${sanitizar(n)}</strong>`).join('<br>');
                const resto = nombres.length > 2 ? `<br><span style="color:#888; font-size:11px;">+${nombres.length - 2} más</span>` : '';
                return visibles + resto;
            })()}</td>
            <td style="text-align:center;">${r.duracion_dias}</td>
            <td style="text-align:center; font-size:13px;">${estadoHtml}</td>
            <td class="monto-positivo">${formatCLP(r.total_pago_base || 0)}</td>
            <td>${r.origen === 'importado' ? '<span class="badge badge-delegado">Excel</span>' : '<span class="badge">Manual</span>'}</td>
            <td style="text-align:center;">${indicHtml}</td>
            <td>
                <div class="flex gap-8">
                    ${esComisionRodeos ? '' : `<button class="btn btn-pequeño btn-outline" onclick="verDetalle('${r.id}')">Ver</button>`}
                    ${(esMonitor || esAnalistaRodeos || esComisionRodeos) ? '' : `<button class="btn btn-pequeño btn-secundario" onclick="abrirEditar('${r.id}')">Editar</button>`}
                    ${(esAnalistaRodeos || esComisionRodeos) ? '' : `<button class="btn btn-pequeño btn-outline" onclick="abrirAdjuntosAdmin('${r.id}', '${sanitizar(r.club)}')">📎</button>`}
                    ${(esMonitor || esAnalistaRodeos || esComisionRodeos) ? '' : `<button class="btn btn-pequeño btn-peligro" onclick="confirmarEliminar('${r.id}', '${sanitizar(r.club)}', '${formatFecha(r.fecha)}', ${r.total_asignaciones || 0})">Eliminar</button>`}
                </div>
            </td>
        </tr>`;}).join('')}
        </tbody>
    </table><div style="padding:10px 14px; font-size:12px; color:var(--gris); border-top:1px solid var(--gris-claro);">Total: ${total} rodeo(s) &nbsp;·&nbsp; <span style="color:#27ae60;">●</span>=Aceptado <span style="color:#f39c12;">●</span>=Pendiente <span style="color:#e74c3c;">●</span>=Rechazado &nbsp;·&nbsp; J=Jurado D=Delegado &nbsp;·&nbsp; CJ=Cartilla Jurado · CD=Cartilla Delegado · VY=Video YouTube</div>`;
}

function renderPag(total) {
    const totalPags = Math.ceil(total / POR_PAGINA);
    const div = document.getElementById('paginacion');
    if (totalPags <= 1) { div.innerHTML = ''; return; }
    let html = `<button class="pag-btn" onclick="cargar(${paginaActual-1})" ${paginaActual===1?'disabled':''}>‹</button>`;
    for (let i=1; i<=totalPags; i++) {
        if (i===paginaActual || Math.abs(i-paginaActual)<=2 || i===1 || i===totalPags)
            html += `<button class="pag-btn ${i===paginaActual?'activo':''}" onclick="cargar(${i})">${i}</button>`;
    }
    html += `<button class="pag-btn" onclick="cargar(${paginaActual+1})" ${paginaActual===totalPags?'disabled':''}>›</button>`;
    div.innerHTML = html;
}

async function abrirNuevoRodeo() {
    if (categoriasRodeo.length === 0) {
        try { categoriasRodeo = await api.get('/admin/reportes/categorias-rodeo/lista?activo=true'); } catch(e) {}
    }
    rodeoActual = null;
    document.getElementById('modal-titulo').textContent = 'Nuevo rodeo';
    document.getElementById('modal-body').innerHTML = formRodeo(null);
    document.getElementById('modal-overlay').classList.remove('oculto');
}

async function abrirEditar(id) {
    try {
        // Recargar categorías si no están en memoria (ej: fallo en init)
        if (categoriasRodeo.length === 0) {
            try { categoriasRodeo = await api.get('/admin/reportes/categorias-rodeo/lista?activo=true'); } catch(e) {}
        }
        const r = await api.get('/admin/rodeos/' + id);
        rodeoActual = r;
        document.getElementById('modal-titulo').textContent = 'Editar rodeo — ' + r.club;
        document.getElementById('modal-body').innerHTML = formRodeo(r);
        document.getElementById('modal-overlay').classList.remove('oculto');
    } catch(err) { mostrarError(err); }
}

async function verDetalle(id) {
    try {
        const r = await api.get('/admin/rodeos/' + id);
        rodeoActual = r;
        document.getElementById('modal-titulo').textContent = 'Detalle — ' + r.club;
        document.getElementById('modal-body').innerHTML = htmlDetalle(r);
        document.getElementById('modal-overlay').classList.remove('oculto');
    } catch(err) { mostrarError(err); }
}

function htmlDetalle(r) {
    const asigs = r.asignaciones || [];
    const totalBase = asigs.reduce((s,a) => s + (a.pago_base_calculado||0), 0);
    return `
    <div class="form-fila" style="margin-bottom:16px;">
        <div><strong>Club:</strong> ${sanitizar(r.club)}</div>
        <div><strong>Asociación:</strong> ${sanitizar(r.asociacion)}</div>

async function guardarRodeo(e) {
    e.preventDefault();
    const btn = e.target.querySelector('button[type=submit]');
    btn.disabled = true;
    const datos = Object.fromEntries(new FormData(e.target));
    try {
        if (rodeoActual) {
            await api.patch('/admin/rodeos/' + rodeoActual.id, datos);
            mostrarToast('Rodeo actualizado', 'success');
        } else {
            await api.post('/admin/rodeos', datos);
            mostrarToast('Rodeo creado', 'success');
        }
        cerrarModal();
        cargar(paginaActual);
    } catch(err) { mostrarError(err); } finally { btn.disabled = false; }
}

async function guardarDatosMonitor(rodeoId) {
    const REGEX_PUNTAJE = /^\d+(\s*\+\s*\d+)?$/;
    const getTextPuntaje = (id) => {
        const v = document.getElementById(id)?.value.trim();
        return (!v || v === '') ? null : v;
    };
    const p1 = getTextPuntaje('dm-p1');
    const p2 = getTextPuntaje('dm-p2');
    const p3 = getTextPuntaje('dm-p3');
    const invalidos = [['1er lugar', p1], ['2do lugar', p2], ['3er lugar', p3]]
        .filter(([, v]) => v !== null && !REGEX_PUNTAJE.test(v))
        .map(([label]) => label);
    if (invalidos.length > 0) {
        mostrarToast(`El puntaje debe ser un número entero o un puntaje de desempate con formato 30+5 (${invalidos.join(', ')})`, 'error');
        return;
    }
    const body = {
        puntaje_oficial_1er: p1,
        puntaje_oficial_2do: p2,
        puntaje_oficial_3er: p3,
        comentario_monitor:  document.getElementById('dm-monitor')?.value.trim() || null,
    };
    try {
        const promises = [api.put(`/admin/rodeos/${rodeoId}/datos-monitor`, body)];
        const obsEl = document.getElementById('dm-obs');
        if (obsEl !== null) promises.push(api.patch(`/admin/rodeos/${rodeoId}`, { observacion: obsEl.value.trim() || null }));
        await Promise.all(promises);
        mostrarToast('Datos del monitor guardados', 'success');
    } catch (e) {
        mostrarError(e);
    }
}

async function guardarNotasSecundarias(rodeoId) {
    const getNum = (id) => { const v = document.getElementById(id)?.value.trim(); if (!v) return null; const n = parseFloat(v); return isNaN(n) ? null : n; };
    const nota_comision = getNum('ns-comision');
    const nota_delegado = getNum('ns-delegado');
    if (nota_comision !== null && (nota_comision < 1 || nota_comision > 7)) {
        return mostrarError({ message: 'Nota Comisión debe estar entre 1.0 y 7.0' });
    }
    if (nota_delegado !== null && (nota_delegado < 1 || nota_delegado > 7)) {
        return mostrarError({ message: 'Nota Delegado debe estar entre 1.0 y 7.0' });
    }
    try {
        await api.put(`/admin/rodeos/${rodeoId}/notas-secundarias`, { nota_comision, nota_delegado });
        mostrarToast('Notas secundarias guardadas', 'success');
    } catch (e) {
        mostrarError(e);
    }
}

let buscarTimer;
async function buscarPersona(q) {
    clearTimeout(buscarTimer);
    if (q.length < 2) { document.getElementById('resultados-persona').innerHTML = ''; return; }
    buscarTimer = setTimeout(async () => {
        const data = await api.get('/admin/usuarios?buscar=' + encodeURIComponent(q) + '&activo=true&limit=8');
        const div = document.getElementById('resultados-persona');
        if (!data?.data?.length) { div.innerHTML = '<div class="texto-gris">Sin resultados</div>'; return; }
        div.innerHTML = data.data.map(u => `
            <div onclick="seleccionarPersona('${u.id}', '${sanitizar(u.nombre_completo)}', '${u.tipo_persona}', '${u.categoria||''}')"
                 style="padding:8px 12px; cursor:pointer; border:1px solid var(--gris-borde); border-radius:6px; margin-bottom:4px; background:white;">
                <strong>${sanitizar(u.nombre_completo)}</strong>
                <span class="badge badge-${u.tipo_persona==='jurado'?'jurado':'delegado'}" style="margin-left:6px;">${u.tipo_persona==='jurado'?'Jurado':'Delegado'}</span>
                ${u.categoria ? `<span class="badge badge-${u.categoria.toLowerCase()}" style="margin-left:4px;">${u.categoria}</span>` : ''}
            </div>`).join('');
    }, 300);
}

function seleccionarPersona(id, nombre, tipo, cat) {
    document.getElementById('usr-seleccionado').value = id;
    document.getElementById('tipo-seleccionado').value = tipo;
    document.getElementById('buscar-persona').value = nombre;
    document.getElementById('resultados-persona').innerHTML = '';
    const info = document.getElementById('persona-sel');
    info.textContent = `Seleccionado: ${nombre} (${tipo}${cat ? ', cat. '+cat : ''})`;
    info.classList.remove('oculto');
}

async function guardarAsignacion(e, rodeoId) {
    e.preventDefault();
    const usr = document.getElementById('usr-seleccionado').value;
    const tipo = document.getElementById('tipo-seleccionado').value;
    if (!usr) { mostrarToast('Debe seleccionar una persona', 'error'); return; }

    // Validar historial de asociación (solo para jurados)
    if (tipo === 'jurado') {
        try {
            const valResult = await api.post('/admin/asignaciones/validar-historial', {
                usuario_pagado_id: usr,
                rodeo_id: rodeoId
            });
            if (valResult.tiene_historial) {
                const histStr = valResult.historial.slice(0, 3)
                    .map(h => `• ${h.club} (${h.fecha})`)
                    .join('\n');
                const continuar = await confirmar(
                    `⚠️ Este jurado ya fue asignado en la asociación "${valResult.asociacion}".\n\n` +
                    `Rodeos anteriores en esa asociación:\n${histStr}\n\n` +
                    `¿Desea asignarlo igualmente?`
                );
                if (!continuar) return;
            }
        } catch(_) { /* no bloquear si falla la validación */ }
    }

    try {
        await api.post('/admin/asignaciones', {
            rodeo_id: rodeoId,
            personas: [{ usuario_pagado_id: usr, tipo_persona: tipo }]
        });
        mostrarToast('Persona asignada correctamente', 'success');
        verDetalle(rodeoId);
    } catch(err) { mostrarError(err); }
}

    const lista = document.getElementById('dj-lista');
    if (!lista) return;
    const ocultarRepite = document.getElementById('dj-ocultar-repite')?.checked;
    const jurados = ocultarRepite
        ? _juradosDesignacion.filter(j => !j.repite_asociacion)
        : _juradosDesignacion;

    if (jurados.length === 0) {
        lista.innerHTML = '<p class="tabla-vacia" style="padding:16px;">Sin resultados</p>';
        return;
    }

    lista.innerHTML = jurados.map(j => {
        const badgeCat = j.categoria
            ? `<span class="badge badge-${j.categoria.toLowerCase()}" style="margin-left:4px;">${j.categoria}</span>`
            : '';
        const repiteHtml = j.repite_asociacion
            ? `<span style="color:#c0392b; font-size:11px; margin-left:6px;">⚠ repite asociación</span>`
            : '';
        const yaHtml = j.ya_asignado
            ? `<span style="color:var(--gris); font-size:11px; margin-left:6px;">ya asignado</span>`
            : '';
        const histHtml = j.historial.length > 0
            ? `<div style="font-size:11px; color:var(--gris); margin-top:4px; line-height:1.6;">
                <span style="font-weight:600;">Últimos:</span>
                ${j.historial.map(h => {
                    const nota = (h.nota !== null && h.nota !== undefined) ? `Nota: ${h.nota}` : 'Sin nota';
                    const asoc = h.asociacion || '—';
                    return `<br>· ${sanitizar(h.club||'—')} | ${sanitizar(asoc)} | ${h.fecha} | ${nota}`;
                }).join('')}
               </div>`
            : '';
        const btnStyle = j.ya_asignado
            ? `class="btn btn-pequeño btn-outline" disabled`
            : j.repite_asociacion
                ? `class="btn btn-pequeño" style="background:#f39c12;color:white;" onclick="designarJurado('${j.id}','${sanitizar(j.nombre_completo)}','${j.repite_asociacion}')"`
                : `class="btn btn-pequeño btn-primario" onclick="designarJurado('${j.id}','${sanitizar(j.nombre_completo)}',false)"`;
        return `
        <div style="padding:10px 14px; border-bottom:1px solid var(--gris-claro); display:flex; align-items:flex-start; justify-content:space-between; gap:8px;">
            <div style="flex:1; min-width:0;">
                <div style="font-weight:600; font-size:14px;">
                    ${sanitizar(j.nombre_completo)}${badgeCat}${repiteHtml}${yaHtml}
                </div>
                ${histHtml}
            </div>
            <button ${btnStyle}>${j.ya_asignado ? 'Asignado' : 'Designar'}</button>
        </div>`;
    }).join('');
}

async function designarJurado(usuarioId, nombre, repiteAsociacion) {
    if (repiteAsociacion) {
        const ok = await confirmar(`⚠️ ${nombre} ya fue asignado en esta asociación anteriormente.\n¿Desea designarlo igualmente?`);
        if (!ok) return;
    }
    try {
        await api.post('/admin/asignaciones', {
            rodeo_id: _designarRodeoId,
            personas: [{ usuario_pagado_id: usuarioId, tipo_persona: 'jurado' }]
        });
        mostrarToast(`${nombre} designado correctamente`, 'success');
        cerrarModal();
        verDetalle(_designarRodeoId);
    } catch(err) { mostrarError(err); }
}

async function guardarTipo(e, id) {
    e.preventDefault();
    const btn = e.target.querySelector('button[type=submit]');
    btn.disabled = true;
    const datos = Object.fromEntries(new FormData(e.target));
    if (datos.activo) datos.activo = datos.activo === 'true';
    if (!datos.categoria_rodeo_id) datos.categoria_rodeo_id = null;
    try {
        if (id) await api.patch('/admin/rodeos/tipos/' + id, datos);
        else await api.post('/admin/rodeos/tipos', datos);
        mostrarToast('Tipo de rodeo guardado', 'success');
        tiposRodeo = await api.get('/admin/rodeos/tipos/lista?activo=true');
        mostrarTipos();
    } catch(err) { mostrarError(err); } finally { btn.disabled = false; }
}

let eaBuscarTimer;
async function buscarPersonaEditar(q) {
    clearTimeout(eaBuscarTimer);
    const res = document.getElementById('ea-resultados');
    if (q.length < 2) { res.innerHTML = ''; return; }
    eaBuscarTimer = setTimeout(async () => {
        const data = await api.get('/admin/usuarios?buscar=' + encodeURIComponent(q) + '&activo=true&limit=8');
        if (!data?.data?.length) { res.innerHTML = '<div class="texto-gris" style="font-size:13px;">Sin resultados</div>'; return; }
        res.innerHTML = data.data.map(u => `
            <div onclick="seleccionarPersonaEditar('${u.id}','${sanitizar(u.nombre_completo)}','${u.tipo_persona}','${u.categoria||''}')"
                 style="padding:8px 12px; cursor:pointer; border:1px solid var(--gris-borde); border-radius:6px; margin-bottom:4px; background:white;">
                <strong>${sanitizar(u.nombre_completo)}</strong>
                <span class="badge badge-${u.tipo_persona==='jurado'?'jurado':'delegado'}" style="margin-left:6px;">${u.tipo_persona==='jurado'?'Jurado':'Delegado'}</span>
                ${u.categoria ? `<span class="badge badge-${u.categoria.toLowerCase()}" style="margin-left:4px;">${u.categoria}</span>` : ''}
            </div>`).join('');
    }, 300);
}

function seleccionarPersonaEditar(id, nombre, tipo, cat) {
    document.getElementById('ea-usr-id').value = id;
    document.getElementById('ea-buscar').value = nombre;
    document.getElementById('ea-resultados').innerHTML = '';
    document.getElementById('ea-valor-diario').disabled = true;
    document.getElementById('ea-valor-diario').value = '';
    const info = document.getElementById('ea-persona-sel');
    info.textContent = `Nueva persona: ${nombre} (${tipo}${cat ? ', cat. '+cat : ''}) — el pago base se recalculará automáticamente`;
    info.classList.remove('oculto');
}

async function guardarEdicionAsignacion(e, asigId, rodeoId) {
    e.preventDefault();
    const btn = e.target.querySelector('button[type=submit]');
    btn.disabled = true;

    const usrId = document.getElementById('ea-usr-id').value.trim();
    const valorDiario = document.getElementById('ea-valor-diario').value.trim();
    const kmVal = document.getElementById('ea-km').value.trim();
    const obs = document.getElementById('ea-obs').value.trim();

    const asigActual = rodeoActual?.asignaciones?.find(a => a.id === asigId);
    const body = {};
    if (usrId) body.usuario_pagado_id = usrId;
    if (!usrId && valorDiario) body.valor_diario_aplicado = parseFloat(valorDiario);
    if (kmVal && parseInt(kmVal) !== (asigActual?.distancia_km || null)) body.distancia_km = parseInt(kmVal);
    if (obs !== undefined) body.observacion = obs;

    if (!usrId && !valorDiario && !body.distancia_km && obs === (asigActual?.observacion || '')) {
        mostrarToast('No hay cambios para guardar', 'error');
        btn.disabled = false;
        return;
    }

    try {
        const r = await api.patch('/admin/asignaciones/' + asigId, body);
        const msg = r?.mensaje_bono ? `Asignación actualizada. ${r.mensaje_bono}` : 'Asignación actualizada';
        mostrarToast(msg, 'success');
        verDetalle(rodeoId);
    } catch(err) { mostrarError(err); } finally { btn.disabled = false; }
}

    document.getElementById('modal-body').innerHTML = `
        <div class="alerta alerta-info" style="margin-bottom:14px;">
            <strong>${sanitizar(nombre)}</strong> — Estado actual: <strong>${label}</strong>
        </div>
        <p style="font-size:13px; color:var(--gris); margin-bottom:16px;">
            Como administrador puede cambiar la designación en cualquier fecha (pasada, actual o futura).
            El cambio queda registrado en auditoría.
        </p>

        <form onsubmit="ejecutarCambioDesignacion(event,'${asigId}','${rodeoId}')">
            <div class="form-grupo">
                <label class="form-label">Acción</label>
                <select id="gd-accion" class="form-control" onchange="onCambioAccionDesignacion(this.value)">
                    <option value="aceptar">Aceptar designación</option>
                    <option value="rechazar">Rechazar designación</option>
                    <option value="pendiente">Reabrir (volver a pendiente)</option>
                </select>
            </div>

            <div id="gd-km-wrap" class="form-grupo">
                <label class="form-label">Distancia (km) <span style="color:var(--gris); font-weight:400;">(opcional — si corresponde bono)</span></label>
                <input type="number" id="gd-km" class="form-control" min="1" placeholder="Ej: 150">
                <div class="form-hint">Si ingresa km y hay configuración de bono, se creará o actualizará la solicitud de bono.</div>
            </div>

            <div id="gd-motivo-wrap" class="form-grupo oculto">
                <label class="form-label">Motivo del rechazo <span style="color:var(--gris); font-weight:400;">(opcional)</span></label>
                <textarea id="gd-motivo" class="form-control" rows="2" placeholder="Ej: No asistió, fue reemplazado, etc."></textarea>
                <div class="form-hint">Los bonos pendientes de esta asignación quedarán rechazados automáticamente.</div>
            </div>

            <div class="form-acciones">
                <button type="submit" class="btn btn-primario">Confirmar cambio</button>
                <button type="button" class="btn btn-secundario" onclick="verDetalle('${rodeoId}')">Cancelar</button>
            </div>
        </form>`;
}

function onCambioAccionDesignacion(accion) {
    document.getElementById('gd-km-wrap').classList.toggle('oculto', accion !== 'aceptar');
    document.getElementById('gd-motivo-wrap').classList.toggle('oculto', accion !== 'rechazar');
}

async function ejecutarCambioDesignacion(e, asigId, rodeoId) {
    e.preventDefault();
    const btn    = e.target.querySelector('button[type=submit]');
    btn.disabled = true;
    const accion = document.getElementById('gd-accion').value;
    const km     = document.getElementById('gd-km').value.trim();
    const motivo = document.getElementById('gd-motivo').value.trim();

    const body = { accion };
    if (accion === 'aceptar' && km) body.distancia_km = parseInt(km);
    if (accion === 'rechazar' && motivo) body.motivo = motivo;

    try {
        const r = await api.post('/admin/asignaciones/' + asigId + '/estado', body);
        mostrarToast(r.mensaje || 'Designación actualizada', 'success');
        verDetalle(rodeoId);
    } catch(err) { mostrarError(err); } finally { btn.disabled = false; }
}

// Auto-sugerir categoría al cambiar tipo (solo si el campo categoría está vacío)
function sugerirCategoria(sel) {
    const opt = sel.options[sel.selectedIndex];
    const catId = opt?.dataset?.cat || '';
    const catSel = document.getElementById('sel-cat-rodeo');
    const hint   = document.getElementById('hint-cat');
    if (!catSel) return;
    if (catId && !catSel.value) {
        catSel.value = catId;
        const catNombre = categoriasRodeo.find(c => c.id === catId)?.nombre || '';
        if (hint) hint.textContent = `Sugerida por el tipo de rodeo: ${catNombre}`;
    } else {
        if (hint) hint.textContent = '';
    }
}

function _youtubeEmbedUrl(url) {
    const m = url.match(/(?:v=|youtu\.be\/|shorts\/|embed\/|live\/)([a-zA-Z0-9_-]{11})/);
    return m ? `https://www.youtube.com/embed/${m[1]}?autoplay=1&rel=0` : null;
}

function verVideoYoutube(key) {
    const d = _adjPreviewData[key];
    if (!d) return;
    const embedUrl = _youtubeEmbedUrl(d.url);
    if (!embedUrl) {
        _abrirPreviewModal(d.titulo || 'Video',
            `<div style="padding:40px;text-align:center;color:#888;"><div style="font-size:48px;margin-bottom:12px;">⚠️</div><p>No se pudo extraer el ID del video de YouTube.<br>Verifica que la URL sea válida.</p></div>`,
            `<a href="${d.url}" target="_blank" rel="noopener" class="btn btn-secundario btn-pequeño">Abrir en YouTube</a>`);
        return;
    }
    _abrirPreviewModal(
        d.titulo || 'Video',
        `<div style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;background:#000;">
            <iframe src="${embedUrl}" style="position:absolute;top:0;left:0;width:100%;height:100%;border:0;"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen loading="lazy"></iframe>
         </div>`,
        `<a href="${d.url}" target="_blank" rel="noopener" class="btn btn-secundario btn-pequeño">Abrir en YouTube ↗</a>`
    );
}

async function previsualizarAdjunto(key) {
    const d = _adjPreviewData[key];
    if (!d) return;
    _abrirPreviewModal(d.nombre, '<div class="spinner-wrap" style="padding:60px 0;"><div class="spinner"></div></div>', '');
    try {
        const r = await api.get(`/admin/adjuntos/${d.id}/url`);
        const url = r.url;
        const mime = d.mimeType || '';
        const footer = `<a href="${url}" download="${sanitizar(d.nombre)}" class="btn btn-primario btn-pequeño">Descargar</a>`;
        let body;
        if (mime.includes('pdf')) {
            body = `<iframe src="${url}" style="width:100%;height:72vh;border:0;" title="${sanitizar(d.nombre)}"></iframe>`;
        } else if (mime.startsWith('image/')) {
            body = `<div style="text-align:center;padding:20px;background:#f0f0f0;min-height:200px;display:flex;align-items:center;justify-content:center;">
                        <img src="${url}" alt="${sanitizar(d.nombre)}" style="max-width:100%;max-height:70vh;border-radius:6px;object-fit:contain;box-shadow:0 2px 12px rgba(0,0,0,.15);">
                    </div>`;
        } else {
            body = `<div style="padding:52px 32px;text-align:center;color:#888;">
                        <div style="font-size:52px;margin-bottom:16px;">📄</div>
                        <div style="font-size:15px;font-weight:600;margin-bottom:8px;">${sanitizar(d.nombre)}</div>
                        <div style="font-size:13px;">No hay vista previa disponible para este tipo de archivo.<br>Usa el botón Descargar para abrirlo.</div>
                    </div>`;
        }
        document.getElementById('modal-preview-body').innerHTML = body;
        document.getElementById('modal-preview-footer').innerHTML = footer;
    } catch(err) {
        document.getElementById('modal-preview-body').innerHTML =
            `<div class="alerta alerta-error" style="margin:20px;">${sanitizar(err.message || 'Error al cargar la vista previa')}</div>`;
    }
}

function renderGanadoModal(rj) {
    const series = (rj && Array.isArray(rj.ganado_series) && rj.ganado_series.length > 0) ? rj.ganado_series : null;
    if (!series) return '';

    const thS = 'style="background:#1a3c6e;color:#fff;padding:5px 7px;font-size:11px;white-space:nowrap;border:1px solid #14316a;"';
    const thG = 'style="background:#2755a3;color:#fff;padding:5px 7px;font-size:11px;white-space:nowrap;text-align:center;border:1px solid #14316a;"';
    const tdS = 'style="padding:4px 7px;font-size:11px;background:#eaf0f8;border:1px solid #dde3ec;white-space:nowrap;"';
    const tdC = 'style="padding:4px 7px;font-size:11px;text-align:center;border:1px solid #dde3ec;"';
    const tdK = 'style="padding:4px 7px;font-size:11px;text-align:center;border:1px solid #dde3ec;background:#f0f7ec;font-weight:600;"';
    const val = (v) => (v !== undefined && v !== null && String(v).trim() !== '') ? sanitizar(String(v)) : '<span style="color:#ccc;">—</span>';

    // Bloque 1
    let b1rows = series.map(s => `<tr>
        <td ${tdS}>${val(s.nombre)}</td>
        <td ${tdC}>${val(s.c1n)}</td><td ${tdC}>${val(s.c1g)}</td>
        <td ${tdC}>${val(s.c2n)}</td><td ${tdC}>${val(s.c2g)}</td>
        <td ${tdC}>${val(s.c3n)}</td><td ${tdC}>${val(s.c3g)}</td>
        <td ${tdC}>${val(s.c4n)}</td><td ${tdC}>${val(s.c4g)}</td>
    </tr>`).join('');
    const tbl1 = `<table style="border-collapse:collapse;min-width:100%;">
        <thead>
            <tr>
                <th ${thS} rowspan="2">Serie</th>
                <th ${thG} colspan="2">1er animal</th><th ${thG} colspan="2">2do animal</th>
                <th ${thG} colspan="2">3er animal</th><th ${thG} colspan="2">4to animal</th>
            </tr>
            <tr>
                <th ${thS}>N° col.</th><th ${thS}>Ganado</th>
                <th ${thS}>N° col.</th><th ${thS}>Ganado</th>
                <th ${thS}>N° col.</th><th ${thS}>Ganado</th>
                <th ${thS}>N° col.</th><th ${thS}>Ganado</th>
            </tr>
        </thead>
        <tbody>${b1rows}</tbody>
    </table>`;

    // Bloque 2
    let b2rows = series.map(s => `<tr>
        <td ${tdS}>${val(s.nombre)}</td>
        <td ${tdC}>${val(s.v1v)}</td><td ${tdC}>${val(s.v1t)}</td><td ${tdC}>${val(s.v1p)}</td>
        <td ${tdC}>${val(s.v2v)}</td><td ${tdC}>${val(s.v2t)}</td><td ${tdC}>${val(s.v2p)}</td>
        <td ${tdC}>${val(s.v3v)}</td><td ${tdC}>${val(s.v3t)}</td><td ${tdC}>${val(s.v3p)}</td>
        <td ${tdC}>${val(s.v4v)}</td><td ${tdC}>${val(s.v4t)}</td><td ${tdC}>${val(s.v4p)}</td>
    </tr>`).join('');
    const tbl2 = `<table style="border-collapse:collapse;min-width:100%;">
        <thead>
            <tr>
                <th ${thS} rowspan="2">Serie</th>
                <th ${thG} colspan="3">1er animal</th><th ${thG} colspan="3">2do animal</th>
                <th ${thG} colspan="3">3er animal</th><th ${thG} colspan="3">4to animal</th>
            </tr>
            <tr>
                <th ${thS}>Vueltas</th><th ${thS}>Tipo</th><th ${thS}>Peso</th>
                <th ${thS}>Vueltas</th><th ${thS}>Tipo</th><th ${thS}>Peso</th>
                <th ${thS}>Vueltas</th><th ${thS}>Tipo</th><th ${thS}>Peso</th>
                <th ${thS}>Vueltas</th><th ${thS}>Tipo</th><th ${thS}>Peso</th>
            </tr>
        </thead>
        <tbody>${b2rows}</tbody>
    </table>`;

    // Bloque 3
    let b3rows = series.map(s => `<tr>
        <td ${tdS}>${val(s.nombre)}</td>
        <td ${tdC}>${val(s.q1c)}</td><td ${tdC}>${val(s.q1r)}</td><td ${tdK}>${val(s.q1k)}</td>
        <td ${tdC}>${val(s.q2c)}</td><td ${tdC}>${val(s.q2r)}</td><td ${tdK}>${val(s.q2k)}</td>
        <td ${tdC}>${val(s.q3c)}</td><td ${tdC}>${val(s.q3r)}</td><td ${tdK}>${val(s.q3k)}</td>
        <td ${tdC}>${val(s.q4c)}</td><td ${tdC}>${val(s.q4r)}</td><td ${tdK}>${val(s.q4k)}</td>
    </tr>`).join('');
    const tbl3 = `<table style="border-collapse:collapse;min-width:100%;">
        <thead>
            <tr>
                <th ${thS} rowspan="2">Serie</th>
                <th ${thG} colspan="3">1er animal</th><th ${thG} colspan="3">2do animal</th>
                <th ${thG} colspan="3">3er animal</th><th ${thG} colspan="3">4to animal</th>
            </tr>
            <tr>
                <th ${thS}>Corrido</th><th ${thS}>Repetido</th><th ${thS}>Calidad</th>
                <th ${thS}>Corrido</th><th ${thS}>Repetido</th><th ${thS}>Calidad</th>
                <th ${thS}>Corrido</th><th ${thS}>Repetido</th><th ${thS}>Calidad</th>
                <th ${thS}>Corrido</th><th ${thS}>Repetido</th><th ${thS}>Calidad</th>
            </tr>
        </thead>
        <tbody>${b3rows}</tbody>
    </table>`;

    // Bloque 4
    const numP = (v) => { const n = parseFloat(v); return (!isNaN(n) && n >= 0) ? n : 0; };
    let sumTot = 0, sumBaj = 0, sumSob = 0;
    let b4rows = series.map(s => {
        const tot = numP(s.fp_tot), baj = numP(s.fp_baj), sob = numP(s.fp_sob);
        const fuer = baj + sob;
        const pct  = tot > 0 ? ((fuer / tot) * 100).toFixed(1) + '%' : '—';
        sumTot += tot; sumBaj += baj; sumSob += sob;
        return `<tr>
            <td ${tdS}>${val(s.nombre)}</td>
            <td ${tdC}>${tot || '<span style="color:#ccc;">—</span>'}</td>
            <td ${tdC}>${baj || '<span style="color:#ccc;">—</span>'}</td>
            <td ${tdC}>${sob || '<span style="color:#ccc;">—</span>'}</td>
            <td ${tdK}>${fuer > 0 ? fuer : '<span style="color:#ccc;">—</span>'}</td>
            <td ${tdK}>${pct}</td>
        </tr>`;
    }).join('');
    const sumFuer = sumBaj + sumSob;
    const pctTotal = sumTot > 0 ? ((sumFuer / sumTot) * 100).toFixed(1) + '%' : '—';
    const thTot = 'style="background:#1a3c6e;color:#fff;padding:5px 8px;font-size:11px;text-align:center;border:1px solid #14316a;"';
    b4rows += `<tr>
        <td style="background:#1a3c6e;color:#fff;padding:5px 8px;font-size:11px;font-weight:700;border:1px solid #14316a;">TOTAL</td>
        <td ${thTot}>${sumTot || '—'}</td><td ${thTot}>${sumBaj || '—'}</td><td ${thTot}>${sumSob || '—'}</td>
        <td style="background:#14a348;color:#fff;padding:5px 8px;font-size:11px;font-weight:700;text-align:center;border:1px solid #0d8a3c;">${sumFuer || '—'}</td>
        <td style="background:#14a348;color:#fff;padding:5px 8px;font-size:11px;font-weight:700;text-align:center;border:1px solid #0d8a3c;">${pctTotal}</td>
    </tr>`;
    const tbl4 = `<table style="border-collapse:collapse;min-width:100%;">
        <thead>
            <tr>
                <th ${thS}>Serie</th>
                <th ${thS}>Total animales</th><th ${thS}>Bajo peso</th><th ${thS}>Sobre peso</th>
                <th ${thS}>Total fuera peso</th><th ${thS}>% fuera peso</th>
            </tr>
        </thead>
        <tbody>${b4rows}</tbody>
    </table>`;

    const bloqueTitulo = (n, t) => `<div style="font-size:12px;font-weight:700;color:#1a3c6e;text-transform:uppercase;letter-spacing:.3px;margin:16px 0 6px;">${n}. ${t}</div>`;
    const wrapTbl = (t) => `<div style="overflow-x:auto;margin-bottom:4px;">${t}</div>`;

    return `<hr style="margin:20px 0 16px;border:none;border-top:2px solid #e0e8f5;">
        <div style="font-size:13px;font-weight:700;color:#1a3c6e;margin-bottom:12px;">II. Información sobre el ganado utilizado en el Rodeo</div>
        ${bloqueTitulo('1','Colleras participantes y ganado utilizado')}${wrapTbl(tbl1)}
        ${bloqueTitulo('2','Vueltas en apiñadero, tipo y peso')}${wrapTbl(tbl2)}
        ${bloqueTitulo('3','Calidad del ganado')}${wrapTbl(tbl3)}
        ${bloqueTitulo('4','Ganado fuera de peso')}${wrapTbl(tbl4)}`;
}

function renderEtapa3Modal(rj) {
    if (!rj) return '';
    const dj      = rj.desempeno_jurado   || null;
    const disc    = rj.disciplina_informe  || null;
    const recinto = rj.recinto_deportivo   || null;
    const col     = rj.colleras_invitadas  || null;
    const ree     = rj.reemplazo_jinetes   || null;

    if (!dj && !disc && !recinto && !col && !ree) return '';

    const thS  = 'style="background:#1a3c6e;color:#fff;padding:5px 7px;font-size:11px;white-space:nowrap;border:1px solid #14316a;text-align:left;"';
    const tdC  = 'style="padding:4px 8px;font-size:12px;border:1px solid #dde3ec;"';
    const tdH  = 'style="padding:4px 8px;font-size:12px;border:1px solid #dde3ec;background:#eaf0f8;font-weight:700;white-space:nowrap;"';
    const val  = (v) => (v !== undefined && v !== null && String(v).trim() !== '') ? sanitizar(String(v)) : '<span style="color:#ccc;">—</span>';
    const boolTxt = (v) => v === 'si' || v === true ? 'Sí' : v === 'no' || v === false ? 'No' : '—';
    const bloqueTitulo = (t) => `<div style="font-size:13px;font-weight:700;color:#1a3c6e;margin:20px 0 8px;border-top:1px solid #e0e8f5;padding-top:14px;">${sanitizar(t)}</div>`;
    const subTit = (t) => `<div style="font-size:12px;font-weight:700;color:#1a3c6e;text-transform:uppercase;letter-spacing:.3px;margin:12px 0 6px;">${sanitizar(t)}</div>`;
    const wrapTbl = (t) => `<div style="overflow-x:auto;margin-bottom:8px;">${t}</div>`;

    let out = '<hr style="margin:20px 0 4px;border:none;border-top:2px solid #e0e8f5;">';

    // ── III. Desempeño del Jurado ─────────────────────────────────────────
    if (dj) {
        out += bloqueTitulo('III. Informe sobre el desempeño del Jurado');
        out += `<table style="border-collapse:collapse;width:100%;margin-bottom:8px;">
            <tr><td ${tdH}>¿Evaluación realizada?</td><td ${tdC}>${boolTxt(dj.evaluacion_realizada)}</td>
                <td ${tdH}>Fecha de evaluación</td><td ${tdC}>${val(dj.fecha_evaluacion)}</td></tr>
            <tr><td ${tdH}>Cantidad de jurados evaluados</td><td ${tdC}>${val(dj.cantidad_jurados)}</td>
                <td ${tdH}>¿Más de un jurado?</td><td ${tdC}>${boolTxt(dj.mas_de_un_jurado)}</td></tr>
        </table>`;
        if (dj.observaciones) {
            out += `<div style="background:#f7f9fc;border:1px solid #e0e8f5;border-radius:6px;padding:8px 12px;font-size:12px;margin-bottom:8px;"><strong>Observaciones:</strong> ${sanitizar(dj.observaciones)}</div>`;
        }
        if (Array.isArray(dj.jurados) && dj.jurados.length > 0) {
            out += subTit('Lista de jurados evaluados');
            const jRows = dj.jurados.map(j => `<tr>
                <td ${tdC}>${val(j.nombre)}</td>
                <td ${tdC}>${val(j.evaluado)}</td>
                <td ${tdC}>${val(j.observacion)}</td>
            </tr>`).join('');
            out += wrapTbl(`<table style="border-collapse:collapse;width:100%;">
                <thead><tr><th ${thS}>Nombre del jurado</th><th ${thS}>¿Evaluado?</th><th ${thS}>Observación</th></tr></thead>
                <tbody>${jRows}</tbody>
            </table>`);
        }
    }

    // ── IV. Disciplina ────────────────────────────────────────────────────
    if (disc) {
        out += bloqueTitulo('IV. Informe de disciplina');
        out += `<p style="font-size:12px;margin:0 0 8px;"><strong>¿Hubo informe de disciplina?</strong> ${boolTxt(disc.hubo_informe)}</p>`;
        if (Array.isArray(disc.situaciones) && disc.situaciones.length > 0) {
            disc.situaciones.forEach((s, i) => {
                out += `<div style="border:1px solid #dde3ec;border-radius:6px;margin-bottom:8px;overflow:hidden;">
                    <div style="background:#f0f4fb;border-bottom:1px solid #dde3ec;padding:6px 12px;font-size:12px;font-weight:700;color:#1a3c6e;">Situación N° ${i+1}</div>
                    <div style="padding:10px 12px;">
                    <table style="border-collapse:collapse;width:100%;font-size:12px;">
                        <tr><td ${tdH}>Nombre del infractor</td><td ${tdC}>${val(s.nombre_infractor)}</td>
                            <td ${tdH}>RUT</td><td ${tdC}>${val(s.rut)}</td></tr>
                        <tr><td ${tdH}>N° de socio</td><td ${tdC}>${val(s.num_socio)}</td>
                            <td ${tdH}>Tipo de falta</td><td ${tdC}>${val(s.tipo_falta)}</td></tr>
                        <tr><td ${tdH}>Artículo reglamentario</td><td ${tdC}>${val(s.articulo)}</td>
                            <td ${tdH}>Testigos</td><td ${tdC}>${val(s.testigos)}</td></tr>
                    </table>
                    ${s.detalle ? `<div style="margin-top:6px;font-size:12px;"><strong>Detalle:</strong> ${sanitizar(s.detalle)}</div>` : ''}
                    ${s.observaciones ? `<div style="margin-top:4px;font-size:12px;"><strong>Observaciones:</strong> ${sanitizar(s.observaciones)}</div>` : ''}
                    </div>
                </div>`;
            });
        } else if (disc.hubo_informe === 'si') {
            out += `<p style="font-size:12px;color:#888;font-style:italic;">Sin situaciones registradas.</p>`;
        }
    }

    // ── V. Recinto Deportivo ─────────────────────────────────────────────
    if (recinto && Object.keys(recinto).length > 0) {
        const ASPECTOS = [
            {key:'piso',                   label:'Piso'},
            {key:'riego',                  label:'Riego de la cancha'},
            {key:'lineas_sentencia',       label:'Líneas de sentencia'},
            {key:'banderas_salida',        label:'Banderas de salida'},
            {key:'apinladero',             label:'Apiñadero'},
            {key:'iluminacion',            label:'Iluminación de la cancha'},
            {key:'atajadas',               label:'Atajadas'},
            {key:'toril',                  label:'Toril'},
            {key:'corrales',               label:'Corrales'},
            {key:'picadero',               label:'Picadero'},
            {key:'caseta_jurado',          label:'Caseta del Jurado'},
            {key:'caseta_filmacion',       label:'Caseta de filmación'},
            {key:'casinos',               label:'Casinos'},
            {key:'banhos',                 label:'Baños'},
            {key:'duchas_petiseros',       label:'Duchas para petiseros'},
            {key:'graderias',              label:'Graderías'},
            {key:'accesos_discapacitados', label:'Accesos para discapacitados'},
            {key:'stands_artesanos',       label:'Stands de artesanos'}
        ];
        out += bloqueTitulo('V. Estado del recinto deportivo');
        const recRows = ASPECTOS.filter(a => recinto[a.key+'_estado']).map(a => `<tr>
            <td ${tdH}>${sanitizar(a.label)}</td>
            <td ${tdC}>${val(recinto[a.key+'_estado'])}</td>
            <td ${tdC}>${val(recinto[a.key+'_obs'])}</td>
        </tr>`).join('');
        if (recRows) {
            out += wrapTbl(`<table style="border-collapse:collapse;width:100%;font-size:12px;">
                <thead><tr><th ${thS}>Aspecto</th><th ${thS}>Estado</th><th ${thS}>Observación</th></tr></thead>
                <tbody>${recRows}</tbody>
            </table>`);
        }
        if (recinto.otros) {
            out += `<div style="background:#f7f9fc;border:1px solid #e0e8f5;border-radius:6px;padding:8px 12px;font-size:12px;margin-top:4px;"><strong>Otros aspectos:</strong> ${sanitizar(recinto.otros)}</div>`;
        }
    }

    // ── VI. Colleras Invitadas ────────────────────────────────────────────
    if (col) {
        out += bloqueTitulo('VI. Colleras invitadas');
        if (col.no_hubo) {
            out += `<p style="font-size:12px;color:#555;">No hubo colleras invitadas en este rodeo.</p>`;
        } else if (Array.isArray(col.items) && col.items.length > 0) {
            const cRows = col.items.map(ci => `<tr>
                <td ${tdC}>${val(ci.jinete1)}</td>
                <td ${tdC}>${val(ci.jinete2)}</td>
                <td ${tdC}>${val(ci.club)}</td>
                <td ${tdC}>${val(ci.asociacion)}</td>
                <td ${tdC}>${val(ci.observaciones)}</td>
            </tr>`).join('');
            out += wrapTbl(`<table style="border-collapse:collapse;width:100%;font-size:12px;">
                <thead><tr><th ${thS}>Jinete 1</th><th ${thS}>Jinete 2</th><th ${thS}>Club</th><th ${thS}>Asociación</th><th ${thS}>Observaciones</th></tr></thead>
                <tbody>${cRows}</tbody>
            </table>`);
        } else {
            out += `<p style="font-size:12px;color:#888;font-style:italic;">Sin colleras invitadas registradas.</p>`;
        }
    }

    // ── VII. Reemplazo de Jinetes ─────────────────────────────────────────
    if (ree) {
        out += bloqueTitulo('VII. Reemplazo de jinetes');
        out += `<p style="font-size:12px;margin:0 0 8px;"><strong>¿Hubo reemplazo de jinetes?</strong> ${boolTxt(ree.hubo)}</p>`;
        if (Array.isArray(ree.items) && ree.items.length > 0) {
            const rRows = ree.items.map(re => `<tr>
                <td ${tdC}>${val(re.nombre_reemplazado)}</td>
                <td ${tdC}>${val(re.rut_reemplazado)}</td>
                <td ${tdC}>${val(re.nombre_reemplazante)}</td>
                <td ${tdC}>${val(re.rut_reemplazante)}</td>
                <td ${tdC}>${val(re.motivo)}</td>
                <td ${tdC}>${val(re.serie)}</td>
                <td ${tdC}>${val(re.detalle)}</td>
                <td ${tdC}>${val(re.observaciones)}</td>
            </tr>`).join('');
            out += wrapTbl(`<table style="border-collapse:collapse;min-width:100%;font-size:12px;">
                <thead><tr>
                    <th ${thS}>Reemplazado</th><th ${thS}>RUT/Socio</th>
                    <th ${thS}>Reemplazante</th><th ${thS}>RUT/Socio</th>
                    <th ${thS}>Motivo</th><th ${thS}>Serie</th>
                    <th ${thS}>Detalle</th><th ${thS}>Observaciones</th>
                </tr></thead>
                <tbody>${rRows}</tbody>
            </table>`);
        }
    }

    return out;
}

// ETAPA 4 — Vista modal admin (solo lectura)
// ═══════════════════════════════════════════════════════════════════
function renderEtapa4Modal(rj) {
    if (!rj) return '';
    const acc  = rj.accidentes_informe   || null;
    const ba   = rj.bienestar_animal      || null;
    const vet  = rj.informe_veterinario   || null;
    const recs = rj.reclamos_sugerencias  || null;
    if (!acc && !ba && !vet && !recs) return '';

    const thS  = 'style="background:#1a3c6e;color:#fff;padding:5px 7px;font-size:11px;white-space:nowrap;border:1px solid #14316a;text-align:left;"';
    const tdC  = 'style="padding:4px 8px;font-size:12px;border:1px solid #dde3ec;"';
    const tdH  = 'style="padding:4px 8px;font-size:12px;border:1px solid #dde3ec;background:#eaf0f8;font-weight:700;white-space:nowrap;"';
    const val  = function(v){ return (v !== undefined && v !== null && String(v).trim() !== '') ? sanitizar(String(v)) : '<span style="color:#ccc;">—</span>'; };
    const boolTxt = function(v){ return v === 'si' || v === true ? 'Sí' : (v === 'no' || v === false ? 'No' : '—'); };
    const bloqueTitulo = function(t){ return `<div style="font-size:13px;font-weight:700;color:#1a3c6e;margin:20px 0 8px;border-top:1px solid #e0e8f5;padding-top:14px;">${sanitizar(t)}</div>`; };
    const wrapTbl = function(t){ return `<div style="overflow-x:auto;margin-bottom:8px;">${t}</div>`; };
    const BA_LABELS = [
        { key:'sombra_ganado',  label:'Sombra para ganado en corrales' },
        { key:'sombra_equinos', label:'Sombra para equinos' },
        { key:'agua_ganado',    label:'Agua para ganado en corrales' },
        { key:'agua_equinos',   label:'Agua para equinos' },
        { key:'comida_ganado',  label:'Comida para ganado' },
        { key:'comida_equinos', label:'Comida para equinos' },
    ];

    let out = '';

    // ── VIII. Accidentes ──────────────────────────────────────────────────
    if (acc) {
        out += bloqueTitulo('VIII. Informe de accidentes');
        out += `<table style="border-collapse:collapse;width:100%;font-size:12px;margin-bottom:8px;">
            <tr><td ${tdH}>¿Hubo accidentes?</td><td ${tdC}>${boolTxt(acc.hubo_accidentes)}</td>
                <td ${tdH}>¿Se revisó protocolo de rescate?</td><td ${tdC}>${boolTxt(acc.reviso_protocolo)}</td></tr>
            <tr><td ${tdH}>Médico / paramédico</td><td ${tdC}>${val(acc.medico_nombre)}</td>
                <td ${tdH}>Teléfono médico</td><td ${tdC}>${val(acc.medico_telefono)}</td></tr>
        </table>`;
        if (acc.medico_email) out += `<p style="font-size:12px;margin:0 0 4px;"><strong>Correo médico:</strong> ${sanitizar(acc.medico_email)}</p>`;
        if (acc.observaciones_generales) out += `<div style="background:#f7f9fc;border:1px solid #e0e8f5;border-radius:6px;padding:8px 12px;font-size:12px;margin-bottom:8px;"><strong>Observaciones:</strong> ${sanitizar(acc.observaciones_generales)}</div>`;
        if (Array.isArray(acc.items) && acc.items.length > 0) {
            acc.items.forEach(function(a, i) {
                out += `<div style="border:1px solid #dde3ec;border-radius:6px;margin-bottom:8px;overflow:hidden;">
                    <div style="background:#f0f4fb;border-bottom:1px solid #dde3ec;padding:6px 12px;font-size:12px;font-weight:700;color:#1a3c6e;">Accidente N° ${i+1}</div>

                    <table style="border-collapse:collapse;width:100%;font-size:12px;">
                        <tr><td ${tdH}>Tipo</td><td ${tdC}>${val(a.tipo)}</td>

                        <tr><td ${tdH}>Persona</td><td ${tdC}>${val(a.persona)}</td>
                            <td ${tdH}>RUT/Socio</td><td ${tdC}>${val(a.rut)}</td></tr>
                        <tr><td ${tdH}>Categoría</td><td ${tdC}>${val(a.categoria)}</td>

                    ${a.atencion   ? `<div style="margin-top:3px;font-size:12px;"><strong>Atención:</strong> ${sanitizar(a.atencion)}</div>` : ''}

    if (ba) {
        out += bloqueTitulo('IX. Informe condiciones de Bienestar Animal');

            <td ${tdH}>${sanitizar(f.label)}</td>
            <td ${tdC}>${boolTxt(vet[f.key])}</td>

            recs.items.forEach(function(r, i) {
                out += `<div style="border:1px solid #dde3ec;border-radius:6px;margin-bottom:8px;overflow:hidden;">

                    <table style="border-collapse:collapse;width:100%;font-size:12px;">
                        <tr><td ${tdH}>Nombre</td><td ${tdC}>${val(r.nombre)}</td>

        if (recs.sugerencias) out += `<div style="background:#f7f9fc;border:1px solid #e0e8f5;border-radius:6px;padding:8px 12px;font-size:12px;margin-top:6px;"><strong>Sugerencias del delegado:</strong> ${sanitizar(recs.sugerencias)}</div>`;
        if (recs.observaciones_generales) out += `<div style="background:#f7f9fc;border:1px solid #e0e8f5;border-radius:6px;padding:8px 12px;font-size:12px;margin-top:6px;"><strong>Observaciones:</strong> ${sanitizar(recs.observaciones_generales)}</div>`;
    }

    return out;
}

// ─── Adjuntos cartilla delegado (admin, async) ──────────────────────────────
async function renderAdjuntosModalCd(rodeoId) {
    const cont = document.getElementById('adj-cd-modal-cont');
    if (!cont || !rodeoId) return;
    try {
        const r = await api.get(`/admin/adjuntos?rodeo_id=${rodeoId}`);
        const adjuntos = (r.adjuntos || []).filter(function(a){ return a.tipo_adjunto === 'cartilla_delegado'; });
        if (adjuntos.length === 0) {
            cont.innerHTML = '<p style="font-size:12px;color:#888;font-style:italic;">Sin adjuntos subidos.</p>';
            return;
        }
        cont.innerHTML = '<div style="border:1px solid #e0e8f5;border-radius:6px;padding:0 12px;">' +
            adjuntos.map(function(a) {
                const ico = a.mime_type && a.mime_type.startsWith('image/') ? '🖼️' : '📄';
                const tam = a.tamano_bytes ? (a.tamano_bytes / 1024).toFixed(0) + ' KB' : '';
                return `<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid #f0f0f0;flex-wrap:wrap;">
                    <span style="font-size:18px;">${ico}</span>
                    <div style="flex:1;min-width:100px;">
                        <div style="font-size:12px;font-weight:600;">${sanitizar(a.nombre_archivo)}</div>
                        ${tam ? `<div style="font-size:11px;color:#888;">${tam}</div>` : ''}
                    </div>
                    <button class="btn btn-pequeño btn-outline" onclick="verAdjuntoAdmin('${a.id}')">Ver</button>
                </div>`;
            }).join('') + '</div>';
    } catch(e) {
        cont.innerHTML = `<p style="font-size:12px;color:#c0392b;">Error al cargar adjuntos: ${sanitizar(e.message)}</p>`;
    }
}

async function verAdjuntoAdmin(id) {
    try {
        const r = await api.get(`/admin/adjuntos/${id}/url`);
        window.open(r.url, '_blank');
    } catch(e) {
        mostrarToast(e.message || 'Error al obtener URL', 'error');
    }
}

// ─── Historial de observaciones (render sincrónico) ──────────────────────────
function renderHistorialObsCd(c) {
    const hist = Array.isArray(c.historial_observaciones) ? c.historial_observaciones : [];
    if (!hist.length) return '';
    const tipoLabel = { observacion: '👁 Observación', reenvio: '↩ Reenvío delegado', aprobacion: '✔ Aprobación' };
    const items = hist.map(function(h) {
        const fecha = h.fecha ? new Date(h.fecha).toLocaleString('es-CL') : '—';
        const label = tipoLabel[h.tipo] || h.tipo;
        const motivo = h.motivo ? `<div style="font-size:12px;color:#555;margin-top:3px;padding:5px 8px;background:#fff;border-radius:4px;border:1px solid #e0e0e0;">${sanitizar(h.motivo)}</div>` : '';
        return `<div style="padding:8px 0;border-bottom:1px solid #f0f0f0;">
            <div style="font-size:12px;font-weight:700;color:#1a3c6e;">${label}</div>
            <div style="font-size:11px;color:#888;">${fecha}${h.por ? ' — ' + sanitizar(h.por) : ''}</div>
            ${motivo}
        </div>`;
    }).join('');
    return `<hr style="margin:20px 0 4px;border:none;border-top:2px solid #e0e8f5;">
        <div style="font-size:13px;font-weight:700;color:#1a3c6e;margin-bottom:8px;">Historial de revisiones</div>

}

// ─── Acciones administrativas sobre cartilla delegado ───────────────────────
function renderAccionesCartillaDelegado(c) {
    const cont = document.getElementById('cd-admin-acciones');
    if (!cont) return;

    const estado = c.estado || '';
    const puedeObservar = ['enviada', 'reenviada'].includes(estado);
    const puedeAprobar  = ['enviada', 'reenviada', 'observada'].includes(estado);
    const hayCartilla   = ['enviada', 'reenviada', 'observada', 'aprobada'].includes(estado);

    if (!hayCartilla) { cont.innerHTML = ''; return; }

    let botonesHtml = '';
    if (puedeObservar) {
        botonesHtml += `<button class="btn btn-pequeño" style="background:#fff3cd;color:#856404;border:1px solid #ffc107;" onclick="abrirModalObservarCd('${c.id}')">👁 Observar</button> `;
    }
    if (puedeAprobar) {
        botonesHtml += `<button class="btn btn-pequeño" style="background:#d4efdf;color:#1e8449;border:1px solid #52be80;" onclick="aprobarCartillaDelegado('${c.id}')">✔ Aprobar</button> `;
    }
    botonesHtml += `<button class="btn btn-pequeño btn-outline" onclick="descargarPdfCartillaDelegado('${c.id}')">📄 Exportar PDF</button> `;

    const emailDelegado = c.delegado?.email || '';
    botonesHtml += `<button class="btn btn-pequeño btn-outline" onclick="abrirModalCorreoCd('${c.id}', '${sanitizar(emailDelegado)}')">✉ Preparar correo</button>`;

    cont.innerHTML = `<div style="font-size:13px;font-weight:700;color:#1a3c6e;margin-bottom:8px;">Acciones administrativas</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">${botonesHtml}</div>`;
}

async function confirmarObservarCd() {
    const m      = document.getElementById('modal-observar-cd');
    const motivo = (document.getElementById('obs-cd-motivo')?.value || '').trim();
    if (!motivo) { mostrarToast('El motivo de observación es obligatorio', 'error'); return; }
    const btn = document.getElementById('btn-confirmar-observar-cd');
    if (btn) { btn.disabled = true; btn.textContent = 'Guardando...'; }
    try {
        await api.post('/admin/cartillas-delegado/' + m._cartillaId + '/observar', { motivo });
        m.style.display = 'none';
        mostrarToast('Cartilla marcada como observada. El delegado puede corregir y reenviar.', 'exito');
        await verCartillaDelegadoDigital(m._cartillaId);
        if (rodeoActual?.id) verDetalle(rodeoActual.id);
    } catch(e) {
        mostrarToast(e.message || 'Error al observar cartilla', 'error');
    } finally {
        if (btn) { btn.disabled = false; btn.textContent = 'Guardar observación'; }
    }
}

async function aprobarCartillaDelegado(cartillaId) {
    if (!confirm('¿Confirma la aprobación de esta cartilla del delegado?\n\nEl estado cambiará a "Aprobada" y el delegado no podrá editarla.')) return;
    try {
        await api.post('/admin/cartillas-delegado/' + cartillaId + '/aprobar', {});
        mostrarToast('Cartilla aprobada correctamente.', 'exito');
        await verCartillaDelegadoDigital(cartillaId);
        if (rodeoActual?.id) verDetalle(rodeoActual.id);
    } catch(e) {
        mostrarToast(e.message || 'Error al aprobar cartilla', 'error');
    }
}

async function descargarPdfCartillaDelegado(cartillaId) {
    try {
        await api.descargar('/admin/cartillas-delegado/' + cartillaId + '/pdf', 'cartilla-delegado.pdf');
    } catch(e) {
        mostrarToast(e.message || 'Error al generar PDF', 'error');
    }
}

async function enviarCorreoCd() {
    const m = document.getElementById('modal-correo-cd');
    const to      = (document.getElementById('correo-cd-to')?.value || '').trim();
    const subject = (document.getElementById('correo-cd-subject')?.value || '').trim();
    const body    = (document.getElementById('correo-cd-body')?.value || '').trim();
    if (!to)      { mostrarToast('Ingrese el correo del destinatario', 'advertencia'); return; }
    if (!subject) { mostrarToast('Ingrese el asunto del correo', 'advertencia'); return; }
    const btn = document.getElementById('btn-enviar-correo-cd');
    if (btn) { btn.disabled = true; btn.textContent = 'Enviando...'; }
    try {
        await api.post('/admin/cartillas-delegado/' + m._cartillaId + '/enviar-correo', { to, subject, body });
        m.style.display = 'none';
        mostrarToast('Correo enviado correctamente.', 'exito');
    } catch(e) {
        mostrarToast(e.message || 'Error al enviar correo', 'error');
    } finally {
        if (btn) { btn.disabled = false; btn.textContent = 'Enviar correo'; }
    }
}

async function confirmarReabrir() {
    const motivo = (document.getElementById('reabrir-motivo')?.value || '').trim();
    if (!motivo) { mostrarToast('El motivo de reapertura es obligatorio', 'error'); return; }
    const btn = document.getElementById('btn-confirmar-reabrir');
    if (btn) { btn.disabled = true; btn.textContent = 'Procesando...'; }

    let exito = false;
    try {
        await api.post('/admin/cartillas-jurado/' + _reabrirCartillaId + '/reabrir', { motivo });
        exito = true;
    } catch(e) {
        // Si el servidor devolvió 502 la operación pudo haberse completado igual.
        // Informamos al usuario con un mensaje orientador.
        const esSinRespuesta = !e.status || e.status === 502 || e.status === 503 || e.status === 0;
        const msg = esSinRespuesta
            ? 'No se recibió respuesta del servidor. Cierra y vuelve a abrir el rodeo para verificar si la cartilla quedó reabierta.'
            : (e.message || 'Error al reabrir cartilla');
        mostrarToast(msg, 'error');
    } finally {
        if (btn) { btn.disabled = false; btn.textContent = 'Solicitar corrección'; }
    }

    if (exito) {
        cerrarModalReabrir();
        mostrarToast('Cartilla reabierta correctamente. El jurado puede enviar una nueva versión.', 'success');
        // Refrescar panel de adjuntos en background — error de refresh no debe
        // sobreescribir el mensaje de éxito ni afectar al usuario.
        renderAdjuntosAdmin().catch(() => {});
    }
}

        // ── Versiones Cartilla Digital ─────────────────────────────────────

                    const estadoColor = v.estado === 'enviada' ? '#27ae60' : v.estado === 'reabierta' ? '#e67e22' : '#f39c12';
                    const estadoText  = v.estado === 'enviada' ? 'Enviada' : v.estado === 'reabierta' ? 'Reabierta' : 'Borrador';
