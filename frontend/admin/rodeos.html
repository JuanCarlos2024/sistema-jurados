                    ${videoId
                        ? `<img src="https://img.youtube.com/vi/${videoId}/mqdefault.jpg" style="width:72px;height:54px;object-fit:cover;border-radius:5px;flex-shrink:0;" onerror="this.style.display='none'">`
                        : `<span style="font-size:20px;">▶️</span>`}
                    <div style="flex:1; min-width:0;">
                        <div style="font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${sanitizar(lnk.descripcion || lnk.url)}</div>
                        <div style="font-size:12px; color:#888;">${sanitizar(lnk.url)} · ${persona} ${tipo}</div>
                    </div>
                    ${videoId
                        ? `<button class="btn btn-pequeño btn-primario" onclick="verVideoYoutube('${lKey}')">▶ Ver</button>`
                        : `<a href="${lnk.url}" target="_blank" rel="noopener" class="btn btn-pequeño btn-outline">Abrir ↗</a>`}
                    <button class="btn btn-pequeño btn-peligro" onclick="eliminarLinkAdmin('${lnk.id}')">Eliminar</button>
                </div>`;
            });
            html += '</div>';
        }

        document.getElementById('modal-adj-body').innerHTML = html;
    } catch(err) {
        document.getElementById('modal-adj-body').innerHTML = `<div class="alerta alerta-error">${sanitizar(err.message || 'Error al cargar adjuntos')}</div>`;
    }
}

function extraerVideoIdAdmin(url) {
    try {
        const m = url.match(/(?:v=|youtu\.be\/|shorts\/|embed\/)([a-zA-Z0-9_-]{11})/);
        return m ? m[1] : null;
    } catch { return null; }
}

async function subirAdjuntoAdmin(e) {
    e.preventDefault();
    const btn = e.target.querySelector('button[type=submit]');
    btn.disabled = true; btn.textContent = 'Subiendo...';
    const file = document.getElementById('adj-adm-file').files[0];
    const tipo = document.getElementById('adj-adm-tipo').value;
    const form = new FormData();
    form.append('rodeo_id', adjAdminRodeoId);
    form.append('tipo_adjunto', tipo);
    form.append('archivo', file);
    try {
        await api.upload('/admin/adjuntos', form);
        mostrarToast('Archivo subido correctamente', 'success');
        await renderAdjuntosAdmin();
    } catch(err) { mostrarError(err); } finally { btn.disabled = false; btn.textContent = 'Subir archivo'; }
}

async function descargarAdjuntoAdmin(id, nombre) {
    try {
        const r = await api.get(`/admin/adjuntos/${id}/url`);
        const a = document.createElement('a');
        a.href = r.url; a.download = r.nombre || nombre; a.target = '_blank';
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
    } catch(err) { mostrarError(err); }
}

async function eliminarAdjuntoAdmin(id) {
    if (!confirm('¿Eliminar este adjunto?')) return;
    try {
        await api.delete(`/admin/adjuntos/${id}`);
        mostrarToast('Adjunto eliminado', 'success');
        await renderAdjuntosAdmin();
    } catch(err) { mostrarError(err); }
}

async function agregarLinkAdmin(e) {
    e.preventDefault();
    const btn = e.target.querySelector('button[type=submit]');
    btn.disabled = true;
    const url = document.getElementById('link-adm-url').value.trim();
    const desc = document.getElementById('link-adm-desc').value.trim();
    try {
        await api.post('/admin/adjuntos/link', { rodeo_id: adjAdminRodeoId, url, descripcion: desc || undefined });
        mostrarToast('Link agregado', 'success');
        document.getElementById('link-adm-url').value = '';
        document.getElementById('link-adm-desc').value = '';
        await renderAdjuntosAdmin();
    } catch(err) { mostrarError(err); } finally { btn.disabled = false; }
}

async function eliminarLinkAdmin(id) {
    if (!confirm('¿Eliminar este link?')) return;
    try {
        await api.delete(`/admin/adjuntos/link/${id}`);
        mostrarToast('Link eliminado', 'success');
        await renderAdjuntosAdmin();
    } catch(err) { mostrarError(err); }
}

init();

// ── COMENTARIO ADMIN POR ASIGNACIÓN ────────────────────────────────────────────

let _comentarioAsigId   = null;
let _comentarioRodeoId  = null;

function abrirComentarioAdmin(asigId, nombre, rodeoId) {
    _comentarioAsigId  = asigId;
    _comentarioRodeoId = rodeoId;

    const asig = (rodeoActual?.asignaciones || []).find(a => a.id === asigId);
    const texto = asig?.comentario_admin || '';

    document.getElementById('modal-titulo').textContent = 'Comentario Jefe Deportivo';
    document.getElementById('modal-body').innerHTML = `
        <p style="font-size:13px; color:var(--gris); margin-bottom:12px;">
            Jurado: <strong>${sanitizar(nombre)}</strong><br>
            ${rodeoActual ? `Rodeo: ${sanitizar(rodeoActual.club)} · ${formatFecha(rodeoActual.fecha)}` : ''}
        </p>
        <div class="form-grupo">
            <label class="form-label">Comentario Jefe Deportivo</label>
            <textarea id="textarea-comentario-admin" class="form-control" rows="5" placeholder="Observaciones sobre este jurado en este rodeo…" style="resize:vertical;">${sanitizar(texto)}</textarea>
        </div>
        <p style="font-size:11px; color:var(--gris); margin-top:4px;">Este comentario aparece en la Hoja de Vida del jurado.</p>
        <div class="form-acciones" style="margin-top:16px;">
            <button class="btn btn-primario" onclick="guardarComentarioAdmin()">Guardar</button>
            ${texto ? `<button class="btn btn-outline" style="color:#c0392b;" onclick="guardarComentarioAdmin(true)">Borrar comentario</button>` : ''}
            <button class="btn btn-secundario" onclick="cerrarModal()">Cancelar</button>
        </div>`;
    document.getElementById('modal-overlay').classList.remove('oculto');
    setTimeout(() => document.getElementById('textarea-comentario-admin')?.focus(), 80);
}

async function guardarComentarioAdmin(borrar = false) {
    if (!_comentarioAsigId) return;
    const texto = borrar ? '' : (document.getElementById('textarea-comentario-admin')?.value || '');
    try {
        await api.patch(`/admin/asignaciones/${_comentarioAsigId}/comentario-admin`, { comentario_admin: texto });
        mostrarToast(texto ? 'Comentario guardado' : 'Comentario eliminado', 'success');
        cerrarModal();
        verDetalle(_comentarioRodeoId);
    } catch(err) { mostrarError(err); }
}
