<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Capacitaciones — Sistema de Jurados</title>
    <link rel="icon" type="image/png" href="/assets/logo_V2.png">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .prueba-card {
            border: 1px solid var(--gris-borde);
            border-radius: 10px;
            background: #fff;
            padding: 16px 18px;
            margin-bottom: 14px;
        }
        .prueba-card:hover { border-color: var(--primario); }
        .prueba-titulo { font-size: 16px; font-weight: 700; margin: 0 0 4px; }
        .prueba-desc   { font-size: 13px; color: var(--gris); margin: 0 0 10px; }
        .prueba-meta   { display:flex; gap:16px; flex-wrap:wrap; font-size:12px; color:var(--gris); margin-bottom:12px; }
        .prueba-meta span { display:flex; align-items:center; gap:4px; }
        .prueba-acciones { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }

        .estado-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
        }
        .estado-pendiente  { background:#f0f0f0; color:#888; }
        .estado-en_curso   { background:#d6eaf8; color:#1a5276; }
        .estado-aprobado   { background:#d5f5e3; color:#1e8449; }
        .estado-reprobado  { background:#fadbd8; color:#922b21; }

        .disp-vencida    { background:#fdebd0; color:#784212; }
        .disp-no_iniciada { background:#eaf0fb; color:#1a3a6c; }
        .prueba-card.vencida   { border-color:#e5c27a; background:#fffdf6; }
        .prueba-card.no_iniciada { border-color:#a9c4e8; background:#f4f8fd; }

        .sin-pruebas {
            text-align:center;
            color:var(--gris);
            padding:40px 24px;
            font-size:14px;
        }
        .mat-item-row {
            display:flex; align-items:center; gap:10px;
            padding:8px 12px; border-bottom:1px solid var(--gris-borde);
            font-size:13px;
        }
        .mat-item-row:last-child { border-bottom:none; }
        .mc-overlay {
            position:fixed; inset:0; background:rgba(0,0,0,.55);
            z-index:1100; display:flex; align-items:center;
            justify-content:center; padding:20px;
        }
    </style>
</head>
<body>
<div class="layout">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <img src="/assets/logo_V2.png" alt="Federación del Rodeo Chileno" style="width:72px;height:72px;object-fit:contain;margin-bottom:6px;">
            <h2>Sistema de Jurados</h2>
        </div>
        <nav class="sidebar-nav">
            <a href="/usuario/dashboard.html" class="nav-item"><span class="icon">🏠</span> Mi Panel</a>
            <a href="/usuario/resumen.html" class="nav-item"><span class="icon">💵</span> Mis Pagos</a>
            <a href="/usuario/perfil.html" class="nav-item"><span class="icon">👤</span> Mi Perfil</a>
            <a href="/usuario/evaluaciones.html" class="nav-item"><span class="icon">📋</span> Mis Evaluaciones</a>
            <a href="/usuario/capacitaciones.html" class="nav-item activo"><span class="icon">🎓</span> Mis Capacitaciones</a>
            <a href="/usuario/material-complementario.html" class="nav-item"><span class="icon">📂</span> Material complementario</a>
        </nav>
        <div class="sidebar-footer">
            <div class="sidebar-usuario" id="nombre-usr"></div>
            <button class="btn btn-secundario btn-pequeño w-100" onclick="api.cerrarSesion()">Cerrar Sesión</button>
        </div>
    </aside>

    <div class="main-content">
        <div class="topbar">
            <div class="flex items-center gap-12">
                <button class="btn-menu-movil" onclick="document.getElementById('sidebar').classList.toggle('abierto')">☰</button>
                <h1>Mis Capacitaciones</h1>
            </div>
        </div>

        <div class="page-body">
            <div id="contenido">
                <div class="alerta alerta-info" style="font-size:13px;">Cargando…</div>
            </div>
        </div>
    </div>
</div>

<!-- ─── Modal preview material ──────────────────────────────────────────────── -->
<div id="mc-overlay" class="mc-overlay" style="display:none;" onclick="cerrarMcModal()">
    <div id="mc-dialog" style="background:#fff;border-radius:12px;max-width:860px;width:100%;max-height:88vh;display:flex;flex-direction:column;overflow:hidden;" onclick="event.stopPropagation()">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--gris-borde);flex-shrink:0;">
            <div style="flex:1;min-width:0;">
                <div id="mc-nombre" style="font-weight:700;font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></div>
                <div id="mc-desc"   style="font-size:12px;color:var(--gris);margin-top:2px;"></div>
            </div>
            <button onclick="cerrarMcModal()" style="background:none;border:none;font-size:20px;cursor:pointer;padding:4px 8px;margin-left:10px;line-height:1;">✕</button>
        </div>
        <div id="mc-preview-area" style="flex:1;overflow:auto;min-height:180px;"></div>
        <div id="mc-footer" style="padding:12px 20px;border-top:1px solid var(--gris-borde);display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end;flex-shrink:0;"></div>
    </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/sidebar-toggle.js"></script>
<script>
protegerRuta('usuario_pagado');
document.getElementById('nombre-usr').textContent = api.getUsuario()?.nombre || '';

async function cargar() {
    var div = document.getElementById('contenido');
    try {
        var lista = await api.get('/usuario/capacitaciones');
        if (lista === undefined || lista === null) return; // 401 → cerrarSesion en curso
        render(lista);
    } catch (err) {
        console.error('[Mis Capacitaciones]', err);
        div.innerHTML = '<div class="alerta alerta-error">' +
            sanitizar((err && err.message) || 'No fue posible cargar tus capacitaciones.') +
            '</div>';
    }
}

cargar();

var _matCargado  = {}; // asignacionId → boolean
var _matDatos    = {}; // materialId → { id, titulo, descripcion, tipo }

function render(lista) {
    var div = document.getElementById('contenido');
    if (!lista || lista.length === 0) {
        div.innerHTML = '<div class="sin-pruebas">No tienes pruebas de capacitación asignadas por el momento.</div>';
        return;
    }

    div.innerHTML = lista.map(function (item) {
        var p    = item.prueba;
        var disp = item.disponibilidad || 'disponible';
        var estado = item.estado_jurado;
        var badgeCls = 'estado-' + estado;
        var badgeTxt = { pendiente:'Pendiente', en_curso:'En curso', aprobado:'Aprobado', reprobado:'Reprobado' }[estado] || estado;

        var dispBadge = '';
        if (disp === 'vencida' && !item.ultimo_completado) {
            dispBadge = ' <span class="estado-badge disp-vencida">No contestada dentro del plazo</span>';
        } else if (disp === 'vencida' && item.ultimo_completado) {
            dispBadge = ' <span class="estado-badge disp-vencida">Plazo vencido</span>';
        } else if (disp === 'no_iniciada') {
            dispBadge = ' <span class="estado-badge disp-no_iniciada">No disponible aún</span>';
        }

        var metaItems = [];
        if (p.tiempo_por_pregunta_segundos) metaItems.push('⏱ Tiempo por pregunta: ' + p.tiempo_por_pregunta_segundos + ' segundos');
        metaItems.push('✔ Aprobación: ' + p.puntaje_minimo_aprobacion + '%');
        metaItems.push('🔄 Intentos: ' + item.total_intentos + ' / ' + (p.intentos_maximos || '∞'));
        if (p.fecha_inicio) metaItems.push('📅 Desde: ' + fmtFechaChile(p.fecha_inicio));
        if (p.fecha_fin)    metaItems.push('📅 Hasta: ' + fmtFechaChile(p.fecha_fin));
        if (item.ultimo_completado && item.ultimo_completado.nota != null)
            metaItems.push('🏅 Nota: ' + parseFloat(item.ultimo_completado.nota).toFixed(1));

        var acciones = '';
        if (disp === 'vencida' && !item.ultimo_completado) {
            var fVen = p.fecha_fin ? ' Venció el: ' + fmtFechaChile(p.fecha_fin) + '.' : '';
            acciones = '<span style="font-size:13px;color:#784212;">No contestada dentro del plazo.' + fVen + '</span>';
        } else if (disp === 'no_iniciada') {
            var fIni = p.fecha_inicio ? fmtFechaChile(p.fecha_inicio) : '';
            acciones = '<span style="font-size:13px;color:#1a3a6c;">Disponible desde: ' + sanitizar(fIni) + '.</span>';
        } else if (item.intento_en_curso) {
            acciones = '<a href="/usuario/capacitacion-rendir.html?id=' + item.asignacion_id + '" class="btn btn-primario btn-pequeño">Continuar prueba</a>';
        } else if (item.puede_rendir) {
            acciones = '<a href="/usuario/capacitacion-rendir.html?id=' + item.asignacion_id + '" class="btn btn-primario btn-pequeño">Iniciar prueba</a>';
        }
        if (item.ultimo_completado) {
            acciones += ' <a href="/usuario/capacitacion-resultado.html?id=' + item.ultimo_completado.id + '" class="btn btn-outline btn-pequeño">Ver resultado</a>';
        }
        if (!acciones) {
            acciones = '<span style="font-size:13px;color:var(--gris);">Sin intentos disponibles.</span>';
        }

        var limiteHtml = item.fecha_limite
            ? '<div style="font-size:12px;color:#e67e22;margin-bottom:8px;">Fecha límite: ' + sanitizar(fmtFechaChile(item.fecha_limite)) + '</div>'
            : '';

        var cardCls = 'prueba-card' + (disp !== 'disponible' ? ' ' + disp : '');

        return '<div class="' + cardCls + '">'
            + '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;">'
            + '<h3 class="prueba-titulo">' + sanitizar(p.titulo) + '</h3>'
            + '<div style="display:flex;gap:6px;flex-wrap:wrap;">'
            + '<span class="estado-badge ' + badgeCls + '">' + badgeTxt + '</span>'
            + dispBadge
            + '</div>'
            + '</div>'
            + (p.descripcion ? '<p class="prueba-desc">' + sanitizar(p.descripcion) + '</p>' : '')
            + '<div class="prueba-meta">' + metaItems.map(function (m) { return '<span>' + sanitizar(m) + '</span>'; }).join('') + '</div>'
            + limiteHtml
            + '<div class="prueba-acciones">' + acciones + '</div>'
            + '<div style="margin-top:10px;border-top:1px solid var(--gris-borde);padding-top:10px;">'
            + '<button class="btn btn-outline btn-pequeño" onclick="toggleMatSec(\'' + item.asignacion_id + '\',this)">📚 Material de estudio</button>'
            + '<div id="mat-sec-' + item.asignacion_id + '" style="display:none;margin-top:10px;"></div>'
            + '</div>'
            + '</div>';
    }).join('');
}

// ─── Material de estudio por prueba ──────────────────────────────────────────

function toggleMatSec(asignacionId, btn) {
    var sec = document.getElementById('mat-sec-' + asignacionId);
    if (!sec) return;
    var abierto = sec.style.display !== 'none';
    sec.style.display = abierto ? 'none' : '';
    btn.textContent = abierto ? '📚 Material de estudio' : '📚 Ocultar material';
    if (!abierto && !_matCargado[asignacionId]) {
        _matCargado[asignacionId] = true;
        cargarMatDePrueba(asignacionId, sec);
    }
}

async function cargarMatDePrueba(asignacionId, sec) {
    sec.innerHTML = '<div style="font-size:13px;color:var(--gris);padding:6px 0;">Cargando…</div>';
    try {
        var lista = await api.get('/usuario/capacitaciones/' + asignacionId + '/materiales');
        if (!lista || lista.length === 0) {
            sec.innerHTML = '<div style="font-size:13px;color:var(--gris);">Esta capacitación no tiene material de estudio.</div>';
            return;
        }
        var ICONO = { pdf:'📄', word:'📝', excel:'📊', imagen:'🖼️', youtube:'▶', link_externo:'🔗', video_externo:'🎬' };
        var rows = lista.map(function (cm) {
            var m = cm.material;
            _matDatos[m.id] = { id: m.id, titulo: m.titulo, descripcion: m.descripcion || '', tipo: m.tipo_material };
            var icono = ICONO[m.tipo_material] || '📁';
            var oblig = cm.obligatorio ? '<span style="color:#e67e22;font-size:11px;margin-left:4px;">★ Obligatorio</span>' : '';
            return '<div class="mat-item-row">'
                + '<span style="flex:1;">' + icono + ' ' + sanitizar(m.titulo) + oblig + '</span>'
                + '<button class="btn btn-outline btn-pequeño" onclick="abrirMatPreview(\'' + m.id + '\',\'' + asignacionId + '\')">Ver</button>'
                + '</div>';
        }).join('');
        sec.innerHTML = '<div style="border:1px solid var(--gris-borde);border-radius:8px;overflow:hidden;">' + rows + '</div>';
    } catch (err) {
        sec.innerHTML = '<div style="font-size:13px;color:#922b21;">Error: ' + sanitizar(err.message || '') + '</div>';
    }
}

// ─── Preview modal ────────────────────────────────────────────────────────────

async function abrirMatPreview(materialId, asignacionId) {
    var meta = _matDatos[materialId];
    if (!meta) return;

    document.getElementById('mc-nombre').textContent = meta.titulo;
    document.getElementById('mc-desc').textContent   = meta.descripcion || '';
    document.getElementById('mc-preview-area').innerHTML = '<div style="padding:30px;text-align:center;color:var(--gris);">Cargando…</div>';
    document.getElementById('mc-footer').innerHTML = '';
    document.getElementById('mc-overlay').style.display = 'flex';

    window._mcMatId   = materialId;
    window._mcAsigId  = asignacionId;

    try {
        var datos = await api.get('/usuario/material-complementario/' + materialId + '/abrir');
        construirMatPreview(datos, meta, materialId, asignacionId);
        registrarMatInteraccion(materialId, 'visualizacion');
    } catch (err) {
        document.getElementById('mc-preview-area').innerHTML =
            '<div style="padding:20px;color:#922b21;">' + sanitizar(err.message || 'Error al cargar') + '</div>';
    }
}

function construirMatPreview(datos, meta, materialId, asignacionId) {
    var area   = document.getElementById('mc-preview-area');
    var footer = document.getElementById('mc-footer');
    area.innerHTML   = '';
    footer.innerHTML = '';

    if (datos.tipo === 'archivo') {
        var url  = datos.url;
        var tipo = meta.tipo;

        if (tipo === 'pdf') {
            var ifr = document.createElement('iframe');
            ifr.style.cssText = 'width:100%;height:520px;border:none;';
            ifr.src = url;
            area.appendChild(ifr);
        } else if (tipo === 'imagen') {
            var img = document.createElement('img');
            img.style.cssText = 'max-width:100%;max-height:500px;display:block;margin:16px auto;border-radius:8px;object-fit:contain;';
            img.alt = meta.titulo;
            img.src = url;
            area.appendChild(img);
        } else if (tipo === 'word' || tipo === 'excel') {
            var viewerUrl = 'https://view.officeapps.live.com/op/embed.aspx?src=' + encodeURIComponent(url);
            var ifr2 = document.createElement('iframe');
            ifr2.style.cssText = 'width:100%;height:520px;border:none;';
            ifr2.src = viewerUrl;
            area.appendChild(ifr2);
        } else {
            area.innerHTML = '<div style="padding:24px;text-align:center;"><p style="font-size:14px;color:var(--gris);">Vista previa no disponible. Usa el botón de descarga.</p></div>';
        }

        window._mcUrlDescarga = url;
        var btnD = document.createElement('button');
        btnD.className = 'btn btn-primario btn-pequeño';
        btnD.textContent = '⬇ Descargar';
        btnD.onclick = function () { mcDescargar(materialId); };
        footer.appendChild(btnD);

    } else if (datos.tipo === 'externo') {
        var urlExt = datos.url;
        var tipo   = meta.tipo;

        if (tipo === 'youtube') {
            var embedUrl = mcYoutubeEmbed(urlExt);
            if (embedUrl) {
                var ifr3 = document.createElement('iframe');
                ifr3.style.cssText = 'width:100%;height:420px;border:none;';
                ifr3.src = embedUrl;
                ifr3.setAttribute('allowfullscreen', '');
                ifr3.setAttribute('allow', 'autoplay; encrypted-media');
                area.appendChild(ifr3);
            } else {
                area.innerHTML = '<div style="padding:24px;text-align:center;"><p style="color:var(--gris);">URL de YouTube inválida.</p></div>';
            }
        } else if (tipo === 'video_externo') {
            var vid = document.createElement('video');
            vid.style.cssText = 'width:100%;max-height:420px;background:#000;';
            vid.controls = true;
            vid.src = urlExt;
            area.appendChild(vid);
        } else {
            area.innerHTML = '<div style="padding:24px;text-align:center;">'
                + '<div style="font-size:36px;margin-bottom:12px;">🔗</div>'
                + '<p style="font-size:14px;color:var(--gris);">Este enlace se abrirá en una nueva pestaña.</p>'
                + '</div>';
        }

        window._mcUrlExterna = urlExt;
        var btnE = document.createElement('button');
        btnE.className = 'btn btn-primario btn-pequeño';
        btnE.textContent = '🔗 Abrir enlace';
        btnE.onclick = function () { mcAbrirExterno(materialId); };
        footer.appendChild(btnE);
    }
}

function mcDescargar(materialId) {
    if (window._mcUrlDescarga) {
        window.open(window._mcUrlDescarga, '_blank');
        registrarMatInteraccion(materialId, 'descarga');
    }
}

function mcAbrirExterno(materialId) {
    if (window._mcUrlExterna) {
        window.open(window._mcUrlExterna, '_blank', 'noopener,noreferrer');
        registrarMatInteraccion(materialId, 'apertura_link');
    }
}

function cerrarMcModal() {
    document.getElementById('mc-overlay').style.display = 'none';
    document.getElementById('mc-preview-area').innerHTML = '';
    window._mcUrlDescarga = null;
    window._mcUrlExterna  = null;
}

function registrarMatInteraccion(materialId, tipo) {
    api.post('/usuario/material-complementario/' + materialId + '/interaccion', {
        tipo_interaccion: tipo
    }).catch(function () {}); // fire-and-forget, no bloquea
}

function mcYoutubeEmbed(url) {
    if (!url) return null;
    var m = url.trim().match(/(?:youtube\.com\/(?:watch\?.*v=|embed\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
    if (!m) return null;
    return 'https://www.youtube-nocookie.com/embed/' + m[1];
}

document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && document.getElementById('mc-overlay').style.display !== 'none') {
        cerrarMcModal();
    }
});
</script>
</body>
</html>
