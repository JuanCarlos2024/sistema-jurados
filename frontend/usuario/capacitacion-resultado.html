<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultado de Prueba — Sistema de Jurados</title>
    <link rel="icon" type="image/png" href="/assets/logo_V2.png">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .resultado-hero {
            text-align: center;
            padding: 28px 20px 20px;
            border-radius: 12px;
            margin-bottom: 24px;
            background: #f8f9fb;
            border: 1px solid var(--gris-borde);
        }
        .resultado-puntaje {
            font-size: 52px;
            font-weight: 800;
            line-height: 1;
            margin: 8px 0 4px;
            color: var(--primario);
        }
        .resultado-titulo-prueba {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .resultado-stats {
            display: flex;
            justify-content: center;
            gap: 24px;
            flex-wrap: wrap;
            margin-top: 14px;
            font-size: 14px;
        }
        .resultado-stat { display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .stat-num { font-size: 22px; font-weight: 800; }
        .stat-num.correcta   { color: #1e8449; }
        .stat-num.incorrecta { color: #922b21; }
        .stat-num.sin-resp   { color: #888; }
        .stat-lbl { font-size: 11px; color: var(--gris); font-weight: 600; text-transform: uppercase; }

        .preg-resultado {
            border: 1px solid var(--gris-borde);
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 12px;
        }
        .preg-resultado.correcta   { border-left: 4px solid #1e8449; }
        .preg-resultado.incorrecta { border-left: 4px solid #922b21; }
        .preg-resultado.sin-resp   { border-left: 4px solid #ccc; }

        .alt-detalle {
            padding: 6px 10px;
            border-radius: 6px;
            margin-bottom: 4px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .alt-detalle.correcta          { background: #d5f5e3; }
        .alt-detalle.elegida-incorrecta { background: #fadbd8; }
        .alt-detalle.normal            { background: #f8f9fa; }
        .alt-icono { font-size: 14px; }

        .imagen-resultado {
            width: 100%;
            max-width: 540px;
            margin: 0 auto 14px auto;
            border-radius: 8px;
            overflow: hidden;
            background: #f3f4f6;
            border: 1px solid var(--gris-borde);
        }
        .imagen-resultado img {
            width: 100%;
            max-height: 320px;
            object-fit: contain;
            display: block;
        }
    </style>
</head>
<body>
<div class="layout">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <img src="/assets/logo_V2.png" alt="Federación del Rodeo Chileno" style="width:72px;height:72px;object-fit:contain;margin-bottom:6px;">
            <h2>Sistema de Jurados</h2>
        </div>
        <nav class="sidebar-nav">
            <a href="/usuario/dashboard.html"     class="nav-item"><span class="icon">🏠</span> Mi Panel</a>
            <a href="/usuario/resumen.html"        class="nav-item"><span class="icon">💵</span> Mis Pagos</a>
            <a href="/usuario/perfil.html"         class="nav-item"><span class="icon">👤</span> Mi Perfil</a>
            <a href="/usuario/evaluaciones.html"   class="nav-item"><span class="icon">📋</span> Mis Evaluaciones</a>
            <a href="/usuario/capacitaciones.html" class="nav-item activo"><span class="icon">🎓</span> Mis Capacitaciones</a>
        </nav>
        <div class="sidebar-footer">
            <div class="sidebar-usuario" id="nombre-usr"></div>
            <button class="btn btn-secundario btn-pequeño w-100" onclick="api.cerrarSesion()">Cerrar Sesión</button>
        </div>
    </aside>

    <div class="main-content">
        <div class="topbar">
            <div class="flex items-center gap-12">
                <button class="btn-menu-movil" onclick="document.getElementById('sidebar').classList.toggle('abierto')">☰</button>
                <a href="/usuario/capacitaciones.html" class="btn btn-outline btn-pequeño">← Volver</a>
                <h1>Resultado de prueba</h1>
            </div>
        </div>
        <div class="page-body">
            <div id="contenido">
                <div class="alerta alerta-info">Cargando resultado…</div>
            </div>
        </div>
    </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/sidebar-toggle.js"></script>
<script>
protegerRuta('usuario_pagado');
document.getElementById('nombre-usr').textContent = api.getUsuario()?.nombre || '';

var params = new URLSearchParams(window.location.search);
var id = params.get('id');
if (!id) { window.location.href = '/usuario/capacitaciones.html'; }
else { cargar(id); }

async function cargar(id) {
    var div = document.getElementById('contenido');
    try {
        var data = await api.get('/usuario/capacitaciones/intentos/' + id + '/resultado');
        render(data);
    } catch (err) {
        div.innerHTML = '<div class="alerta alerta-error">' + sanitizar(err.message || 'Error') + '</div>';
    }
}

function render(data) {
    var div      = document.getElementById('contenido');
    var puntaje  = data.puntaje_obtenido;
    var nota     = data.nota;
    var aprobado = data.aprobado;
    var detalle  = data.detalle || [];

    var correctas    = detalle.filter(function (d) { return d.es_correcta === true; }).length;
    var incorrectas  = detalle.filter(function (d) { return d.es_correcta === false; }).length;
    var sinResp      = detalle.filter(function (d) { return d.es_correcta === null && !d.alternativa_elegida; }).length;

    var notaColor = nota != null ? (aprobado ? '#1e8449' : '#922b21') : 'var(--primario)';

    var heroPrimary;
    if (nota != null) {
        heroPrimary = '<div class="resultado-puntaje" style="color:' + notaColor + ';">' + nota + '</div>'
            + '<div style="font-size:13px;color:var(--gris);">Nota obtenida</div>'
            + '<div style="font-size:15px;font-weight:700;margin-top:6px;color:' + notaColor + ';">'
            + (aprobado ? 'Aprobado' : 'Reprobado') + '</div>'
            + '<div style="font-size:13px;color:var(--gris);margin-top:2px;">' + puntaje + '% de respuestas correctas</div>';
    } else {
        heroPrimary = '<div class="resultado-puntaje">' + puntaje + '%</div>'
            + '<div style="font-size:13px;color:var(--gris);">Puntaje obtenido</div>';
    }

    var hero = '<div class="resultado-hero">'
        + '<div class="resultado-titulo-prueba">' + sanitizar(data.prueba?.titulo || '') + '</div>'
        + heroPrimary
        + '<div class="resultado-stats">'
        + '<div class="resultado-stat"><span class="stat-num correcta">'   + correctas   + '</span><span class="stat-lbl">Correctas</span></div>'
        + '<div class="resultado-stat"><span class="stat-num incorrecta">' + incorrectas + '</span><span class="stat-lbl">Incorrectas</span></div>'
        + (sinResp > 0
            ? '<div class="resultado-stat"><span class="stat-num sin-resp">' + sinResp + '</span><span class="stat-lbl">Sin responder</span></div>'
            : '')
        + '<div class="resultado-stat"><span class="stat-num" style="color:var(--texto);">' + detalle.length + '</span><span class="stat-lbl">Total</span></div>'
        + '</div>'
        + '</div>';

    var letras = ['A','B','C','D','E','F','G','H'];
    var detHtml = detalle.map(function (d, idx) {
        var clsCard = d.es_correcta === true ? 'correcta' : d.es_correcta === false ? 'incorrecta' : 'sin-resp';
        var icono   = d.es_correcta === true ? '✔' : d.es_correcta === false ? '✖' : '–';
        var color   = d.es_correcta === true ? '#1e8449' : d.es_correcta === false ? '#922b21' : '#888';

        var altsHtml = (d.alternativas || []).map(function (a, i) {
            var elegida = a.id === d.alternativa_elegida;
            var cls, icono3;
            if (a.es_correcta) {
                cls = 'correcta'; icono3 = '✔';
            } else if (elegida) {
                cls = 'elegida-incorrecta'; icono3 = '✖';
            } else {
                cls = 'normal'; icono3 = '';
            }
            return '<div class="alt-detalle ' + cls + '">'
                + (icono3 ? '<span class="alt-icono">' + icono3 + '</span>' : '<span class="alt-icono" style="width:14px;"></span>')
                + '<strong>' + letras[i] + '.</strong> ' + sanitizar(a.texto)
                + (elegida && !a.es_correcta ? ' <em style="color:#922b21;font-size:11px;">(tu respuesta)</em>' : '')
                + (a.es_correcta && elegida   ? ' <em style="color:#1e8449;font-size:11px;">(tu respuesta)</em>' : '')
                + '</div>';
        }).join('');

        var tieneImagen = (d.tipo === 'imagen_alternativas' || d.tipo === 'verdadero_falso_imagen');
        var imagenHtml  = (tieneImagen && d.imagen_url)
            ? '<div class="imagen-resultado"><img src="' + sanitizar(d.imagen_url) + '" alt="Imagen de la pregunta" onerror="this.parentElement.style.display=\'none\'"></div>'
            : '';

        return '<div class="preg-resultado ' + clsCard + '">'
            + '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">'
            + '<span style="font-size:18px;color:' + color + ';">' + icono + '</span>'
            + '<span style="font-size:13px;font-weight:700;color:var(--gris);">Pregunta ' + (idx + 1) + '</span>'
            + '</div>'
            + imagenHtml
            + '<div style="font-size:14px;font-weight:600;margin-bottom:12px;">' + sanitizar(d.enunciado) + '</div>'
            + altsHtml
            + '</div>';
    }).join('');

    div.innerHTML = hero
        + '<div class="card">'
        + '<div class="card-titulo">Revisión de respuestas</div>'
        + detHtml
        + '</div>';
}
</script>
</body>
</html>
