<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informe del Delegado Oficial — Sistema de Jurados</title>
    <link rel="icon" type="image/png" href="/assets/logo_V2.png">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .cartilla-form { max-width: 820px; margin: 0 auto; }
        .bloque { background:#fff; border:1px solid #ddd; border-radius:10px; margin-bottom:16px; overflow:hidden; }
        .bloque-header { background:#1a3c6e; color:#fff; padding:11px 18px; font-size:13px; font-weight:700; letter-spacing:.3px; display:flex; justify-content:space-between; align-items:center; }
        .bloque-header .badge-pendiente { font-size:10px; font-weight:600; background:rgba(255,255,255,.2); padding:2px 8px; border-radius:10px; }
        .bloque-body { padding:18px; }
        .campo-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
        @media(max-width:580px){ .campo-grid { grid-template-columns:1fr; } }
        .form-label { font-size:12px; font-weight:600; color:#555; margin-bottom:4px; display:block; }
        .req { color:#e74c3c; }
        .form-control { width:100%; padding:8px 10px; border:1px solid #ccc; border-radius:6px; font-size:14px; box-sizing:border-box; background:#fff; }
        .form-control:focus { outline:none; border-color:#1a3c6e; box-shadow:0 0 0 2px #d5e6ff; }
        .form-control[readonly], .form-control:disabled { background:#f5f5f5; color:#555; cursor:default; }
        .radio-grupo { display:flex; gap:16px; align-items:center; margin-top:4px; }
        .radio-grupo label { display:flex; align-items:center; gap:6px; font-size:14px; cursor:pointer; }
        .checkbox-grupo { display:flex; flex-direction:column; gap:10px; }
        .checkbox-item { display:flex; align-items:flex-start; gap:10px; }
        .checkbox-item input[type=checkbox] { margin-top:3px; width:16px; height:16px; cursor:pointer; flex-shrink:0; }
        .checkbox-item label { font-size:14px; cursor:pointer; line-height:1.4; }
        .barra-acciones { position:sticky; bottom:0; background:#fff; border-top:1px solid #ddd; padding:12px 18px; display:flex; gap:10px; justify-content:flex-end; z-index:100; box-shadow:0 -2px 8px rgba(0,0,0,.07); }
        .estado-badge { display:inline-block; padding:4px 12px; border-radius:20px; font-size:12px; font-weight:700; }
        .estado-borrador { background:#fff3cd; color:#856404; border:1px solid #ffc107; }
        .estado-enviada  { background:#d1f2eb; color:#145a32; border:1px solid #27ae60; }
        .enviada-notice  { background:#d1f2eb; border:1px solid #27ae60; border-radius:8px; padding:14px 18px; margin-bottom:16px; font-size:14px; color:#145a32; }
        .enviada-notice strong { display:block; font-size:15px; margin-bottom:4px; }
        .rodeo-info-card { background:#eaf4fb; border:1px solid #aed6f1; border-radius:8px; padding:14px 18px; margin-bottom:16px; }
        .rodeo-info-card .titulo { font-weight:700; font-size:16px; color:#1a3c6e; margin-bottom:6px; }
        .rodeo-info-card .meta   { font-size:13px; color:#555; display:flex; flex-wrap:wrap; gap:10px; }
        .rodeo-info-card .meta span { background:#fff; border:1px solid #d6eaf8; border-radius:4px; padding:2px 8px; }
        .bloque-futuro { opacity:.6; }
        .bloque-futuro .bloque-body { display:flex; align-items:center; gap:10px; padding:14px 18px; font-size:13px; color:#777; font-style:italic; }
        #alerta-global { margin-bottom:14px; }
        .spinner-wrap { text-align:center; padding:40px; }

        /* ── Tablas de ganado (ETAPA 2) ────────────────────────────────────── */
        .sub-titulo-ganado { font-size:12px; font-weight:700; color:#1a3c6e; text-transform:uppercase; letter-spacing:.4px; margin-bottom:10px; padding-bottom:6px; border-bottom:2px solid #e0e8f5; }
        .tabla-wrap-ganado { overflow-x:auto; margin-bottom:18px; }
        .tbl-ganado { border-collapse:collapse; font-size:12px; min-width:100%; }
        .tbl-ganado th { background:#1a3c6e; color:#fff; padding:6px 8px; text-align:center; font-size:11px; font-weight:700; border:1px solid #14316a; white-space:nowrap; }
        .tbl-ganado th.th-grupo { background:#2755a3; }
        .tbl-ganado th.th-serie { background:#0f2347; text-align:left; min-width:130px; }
        .tbl-ganado td { padding:3px 4px; border:1px solid #dde3ec; vertical-align:middle; background:#fff; }
        .tbl-ganado tr:nth-child(even) td { background:#f7f9fc; }
        .tbl-ganado td.td-serie { background:#eaf0f8; font-size:12px; }
        .tbl-ganado td.td-calc { background:#f0f7ec; text-align:center; font-weight:600; color:#1a6e2b; font-size:12px; padding:4px 8px; }
        .tbl-ganado td.td-total { background:#1a3c6e; color:#fff; font-weight:700; text-align:center; font-size:12px; padding:5px 8px; }
        .tbl-ganado td.td-total-calc { background:#14a348; color:#fff; font-weight:700; text-align:center; font-size:12px; padding:5px 8px; }
        .inp-ganado { width:100%; border:none; background:transparent; font-size:12px; padding:4px 6px; box-sizing:border-box; text-align:center; }
        .inp-ganado:focus { outline:2px solid #2755a3; border-radius:3px; background:#fff; }
        .inp-ganado[readonly], .inp-ganado:disabled { color:#555; cursor:default; background:transparent; }
        .inp-ganado-serie { text-align:left; }
        .sel-ganado { width:100%; border:none; background:transparent; font-size:12px; padding:3px 4px; box-sizing:border-box; }
        .sel-ganado:focus { outline:2px solid #2755a3; border-radius:3px; background:#fff; }
        .sel-ganado:disabled { color:#555; cursor:default; }
        .btn-quitar-serie { background:none; border:none; color:#c0392b; cursor:pointer; font-size:16px; padding:2px 6px; line-height:1; border-radius:4px; }
        .btn-quitar-serie:hover { background:#fdecea; }
        .btn-agregar-serie { margin-top:8px; font-size:12px; padding:5px 14px; }
        .aviso-ganado-bajo-peso { background:#fff8e1; border:1px solid #ffc107; border-radius:6px; padding:8px 12px; font-size:12px; color:#795800; margin-bottom:10px; display:none; }

        /* ── ETAPA 3 ─────────────────────────────────────────────────────────── */
        .sec-sub { font-size:12px; font-weight:700; color:#1a3c6e; text-transform:uppercase; letter-spacing:.3px; margin:14px 0 8px; padding-bottom:5px; border-bottom:1px solid #e0e8f5; }
        .link-externo { display:inline-flex; align-items:center; gap:6px; background:#eaf4fb; border:1px solid #aed6f1; border-radius:6px; padding:8px 14px; font-size:13px; color:#1a3c6e; text-decoration:none; font-weight:600; margin-bottom:12px; }
        .link-externo:hover { background:#d6eaf8; }
        .aviso-relacion { background:#fff8e1; border:1px solid #ffc107; border-radius:6px; padding:8px 12px; font-size:12px; color:#795800; margin-bottom:10px; }
        /* situaciones disciplinarias */
        .sit-card { border:1px solid #dde3ec; border-radius:8px; margin-bottom:10px; overflow:hidden; }
        .sit-card-hdr { background:#f0f4fb; border-bottom:1px solid #dde3ec; padding:7px 14px; display:flex; justify-content:space-between; align-items:center; font-size:12px; font-weight:700; color:#1a3c6e; }
        .sit-card-body { padding:12px 14px; display:grid; grid-template-columns:1fr 1fr; gap:10px; }
        @media(max-width:580px){ .sit-card-body { grid-template-columns:1fr; } }
        .sit-card-full { grid-column:1/-1; }
        /* aspectos recinto */
        .aspectos-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
        @media(max-width:600px){ .aspectos-grid { grid-template-columns:1fr; } }
        .aspecto-card { border:1px solid #e0e8f5; border-radius:6px; padding:10px 12px; background:#fafcff; }
        .aspecto-label { font-size:12px; font-weight:700; color:#333; margin-bottom:6px; display:block; }
        .sel-estado { width:100%; padding:5px 8px; border:1px solid #ccc; border-radius:5px; font-size:13px; background:#fff; box-sizing:border-box; }
        .sel-estado:focus { outline:none; border-color:#1a3c6e; }
        .sel-estado:disabled { background:#f5f5f5; color:#555; }
        .inp-obs-asp { width:100%; padding:4px 7px; border:1px solid #e0e0e0; border-radius:4px; font-size:12px; margin-top:5px; box-sizing:border-box; }
        .inp-obs-asp:disabled, .inp-obs-asp[readonly] { background:#f5f5f5; color:#555; }
        /* tablas dinámicas coleras/reemplazos */
        .tbl-din { border-collapse:collapse; width:100%; font-size:13px; }
        .tbl-din th { background:#2755a3; color:#fff; padding:7px 10px; font-size:12px; font-weight:700; white-space:nowrap; text-align:left; }
        .tbl-din td { border:1px solid #e0e8f5; padding:4px 6px; vertical-align:middle; }
        .tbl-din tr:nth-child(even) td { background:#f7f9fc; }
        .inp-din { width:100%; border:none; background:transparent; font-size:13px; padding:3px 5px; box-sizing:border-box; min-width:80px; }
        .inp-din:focus { outline:2px solid #2755a3; border-radius:3px; background:#fff; }
        .inp-din:disabled { color:#555; cursor:default; }
        .sel-din { width:100%; border:none; background:transparent; font-size:12px; padding:3px 4px; }
        .sel-din:focus { outline:2px solid #2755a3; border-radius:3px; background:#fff; }
        .sel-din:disabled { color:#555; }
        .btn-q { background:none; border:none; color:#c0392b; cursor:pointer; font-size:16px; padding:2px 6px; border-radius:4px; }
        .btn-q:hover { background:#fdecea; }
        .campo-form-sm label { font-size:12px; font-weight:600; color:#555; display:block; margin-bottom:3px; }
        .campo-form-sm input, .campo-form-sm select, .campo-form-sm textarea { width:100%; padding:6px 9px; border:1px solid #ccc; border-radius:5px; font-size:13px; box-sizing:border-box; }
        .campo-form-sm input:disabled, .campo-form-sm select:disabled, .campo-form-sm textarea:disabled,
        .campo-form-sm input[readonly], .campo-form-sm textarea[readonly] { background:#f5f5f5; color:#555; }

        /* ── ETAPA 5 — estados y banners ─────────────────────────────────────── */
        .estado-observada { background:#fdebd0; color:#784212; border:1px solid #e67e22; }
        .estado-reenviada { background:#d5f5e3; color:#1e8449; border:1px solid #52be80; }
        .estado-aprobada  { background:#d6eaf8; color:#1a5276; border:1px solid #2e86c1; }
        .observada-banner { background:#fef9e7; border:1px solid #f39c12; border-radius:8px; padding:14px 18px; margin-bottom:16px; }
        .observada-banner strong { display:block; font-size:15px; color:#784212; margin-bottom:6px; }
        .observada-banner .motivo-obs { background:#fff; border:1px solid #f39c12; border-radius:5px; padding:8px 12px; font-size:13px; color:#333; margin-top:6px; white-space:pre-wrap; }
        .aprobada-notice  { background:#d6eaf8; border:1px solid #2e86c1; border-radius:8px; padding:14px 18px; margin-bottom:16px; }
        .aprobada-notice strong { display:block; font-size:15px; color:#1a5276; margin-bottom:4px; }
        .plazo-vencido { background:#fdecea; border:1px solid #e74c3c; border-radius:8px; padding:10px 14px; margin-bottom:12px; font-size:13px; color:#c0392b; font-weight:600; }
        .plazo-proximo { background:#fff8e1; border:1px solid #ffc107; border-radius:8px; padding:10px 14px; margin-bottom:12px; font-size:13px; color:#795800; }
    </style>
</head>
<body>
<div class="layout">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <img src="/assets/logo_V2.png" alt="Federación del Rodeo Chileno" style="width:72px; height:72px; object-fit:contain; margin-bottom:6px;">
            <h2>Sistema de Jurados</h2>
        </div>
        <nav class="sidebar-nav">
            <a href="/usuario/dashboard.html" class="nav-item"><span class="icon">🏠</span> Mi Panel</a>
            <a href="/usuario/resumen.html"   class="nav-item"><span class="icon">💵</span> Mis Pagos</a>
            <a href="/usuario/perfil.html"    class="nav-item"><span class="icon">👤</span> Mi Perfil</a>
            <a href="/usuario/capacitaciones.html" class="nav-item"><span class="icon">🎓</span> Mis Capacitaciones</a>
            <a href="/usuario/material-complementario.html" class="nav-item"><span class="icon">📂</span> Material complementario</a>
        </nav>
        <div class="sidebar-footer">
            <div class="sidebar-usuario" id="nombre-usr"></div>
            <button class="btn btn-secundario btn-pequeño w-100" onclick="api.cerrarSesion()">Cerrar Sesión</button>
        </div>
    </aside>

    <div class="main-content">
        <div class="topbar">
            <div class="flex items-center gap-12">
                <button class="btn-menu-movil" onclick="document.getElementById('sidebar').classList.toggle('abierto')">☰</button>
                <h1>Informe del Delegado Oficial del Rodeo</h1>
            </div>
            <a href="/usuario/dashboard.html" class="btn btn-secundario btn-pequeño">← Mi Panel</a>
        </div>

        <div class="page-body">
            <div class="cartilla-form">
                <div id="alerta-global"></div>
                <div id="cuerpo-cartilla">
                    <div class="spinner-wrap"><div class="spinner"></div></div>
                </div>
            </div>
        </div>
    </div>
</div>

<datalist id="series-sugeridas">
    <option value="Primera libre A">
    <option value="Primera libre B">
    <option value="Primera libre C">
    <option value="Serie criaderos">
    <option value="Serie yeguas">
    <option value="Serie caballos jóvenes">
    <option value="Serie campeones">
    <option value="Serie apertura">
</datalist>

<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script>
protegerRuta('usuario_pagado');

const _usr = api.getUsuario();
if (_usr?.tipo_persona !== 'delegado_rentado') {
    window.location.href = '/usuario/dashboard.html';
}
document.getElementById('nombre-usr').textContent = _usr?.nombre || '';

const params   = new URLSearchParams(location.search);
const RODEO_ID = params.get('rodeo_id');

// ── Globals ETAPA 1 ──────────────────────────────────────────────────────────
let _cartillaId    = null;
let _estado        = null;
let _guardando     = false;

// ── Globals ETAPA 2 ──────────────────────────────────────────────────────────
let _seriesGanado   = [];
let _respuestasJson = {};

// ── Globals ETAPA 3 ──────────────────────────────────────────────────────────
let _dj      = {};  // desempeño jurado
let _disc    = {};  // disciplina
let _recinto = {};  // recinto deportivo
let _col     = {};  // colleras invitadas
let _ree     = {};  // reemplazo jinetes

// ── Globals ETAPA 4 ──────────────────────────────────────────────────────────
let _acc  = {};  // accidentes
let _ba   = {};  // bienestar animal
let _vet  = {};  // veterinario
let _recs = {};  // reclamos/sugerencias

if (!RODEO_ID) {
    document.getElementById('cuerpo-cartilla').innerHTML =
        '<div class="alerta alerta-error">Falta el parámetro rodeo_id en la URL.</div>';
} else {
    init();
}

async function init() {
    try {
        const r = await api.get(`/usuario/cartilla-delegado/rodeo/${RODEO_ID}`);
        renderCartilla(r);
    } catch (err) {
        document.getElementById('cuerpo-cartilla').innerHTML =
            `<div class="alerta alerta-error">${sanitizar(err.message || 'Error al cargar la cartilla')}</div>`;
    }
}

// ═════════════════════════════════════════════════════════════════════════════
// RENDER PRINCIPAL
// ═════════════════════════════════════════════════════════════════════════════
function renderCartilla(r) {
    const { rodeo, perfil, cartilla } = r;
    _estado     = cartilla ? cartilla.estado : 'nueva';
    _cartillaId = cartilla ? cartilla.id     : null;
    const ya    = ['enviada', 'reenviada', 'aprobada'].includes(_estado);

    _respuestasJson = cartilla?.respuestas_json || {};
    _seriesGanado   = Array.isArray(_respuestasJson.ganado_series)
        ? _respuestasJson.ganado_series.map(s => ({ ...s }))
        : [];

    const fechaRodeo = rodeo?.fecha
        ? new Date(rodeo.fecha + 'T12:00:00').toLocaleDateString('es-CL', { weekday:'long', year:'numeric', month:'long', day:'numeric' })
        : '—';

    let html = '';

    // ── Indicador de plazo de 3 días desde el rodeo ──────────────────────
    if (rodeo?.fecha && (_estado === 'borrador' || _estado === 'nueva' || _estado === 'observada')) {
        const fechaLimite = new Date(rodeo.fecha + 'T12:00:00');
        fechaLimite.setDate(fechaLimite.getDate() + 3);
        const diasRestantes = Math.ceil((fechaLimite - new Date()) / (1000 * 60 * 60 * 24));
        if (diasRestantes < 0) {
            html += `<div class="plazo-vencido">⚠ El plazo de envío venció hace ${Math.abs(diasRestantes)} día(s) (${fechaLimite.toLocaleDateString('es-CL')}). Envíe el informe a la brevedad.</div>`;
        } else if (diasRestantes <= 1) {
            html += `<div class="plazo-proximo">⏰ El plazo de envío vence el ${fechaLimite.toLocaleDateString('es-CL')} — en ${diasRestantes} día(s).</div>`;
        }
    }

    // ── Banners de estado ─────────────────────────────────────────────────
    if (_estado === 'enviada' || _estado === 'reenviada') {
        const fechaEnv = cartilla.enviada_en ? new Date(cartilla.enviada_en).toLocaleString('es-CL') : '—';
        const label = _estado === 'reenviada' ? 'Informe reenviado' : 'Informe enviado';
        html += `<div class="enviada-notice">
            <strong>${label}</strong>
            Esta cartilla fue enviada el ${fechaEnv}. Solo puede ser reabierta por el Administrador.
        </div>`;
    } else if (_estado === 'observada') {
        const motivo = sanitizar(cartilla.observacion_admin || '');
        const obsEn  = cartilla.observada_en ? new Date(cartilla.observada_en).toLocaleString('es-CL') : '—';
        html += `<div class="observada-banner">
            <strong>⚠ Cartilla bajo revisión — Requiere correcciones</strong>
            El Administrador ha revisado tu informe y solicita ajustes (${obsEn}).
            ${motivo ? `<div class="motivo-obs">${motivo}</div>` : ''}
            <div style="margin-top:8px;font-size:13px;color:#555;">Puedes editar y reenviar el informe a continuación.</div>
        </div>`;
    } else if (_estado === 'aprobada') {
        const aprobadaEn = cartilla.aprobada_en ? new Date(cartilla.aprobada_en).toLocaleString('es-CL') : '—';
        html += `<div class="aprobada-notice">
            <strong>✔ Informe aprobado</strong>
            Tu cartilla fue aprobada el ${aprobadaEn}. Ya no puede ser modificada.
        </div>`;
    }

    // ── Estado badges ─────────────────────────────────────────────────────
    const _estadoBadgeMap = { enviada:'estado-enviada', reenviada:'estado-reenviada', observada:'estado-observada', aprobada:'estado-aprobada', borrador:'estado-borrador' };
    const _estadoLabelMap = { enviada:'Enviada', reenviada:'Reenviada', observada:'Observada', aprobada:'Aprobada', borrador:'Borrador', nueva:'Nueva' };
    const _badgeClass = _estadoBadgeMap[_estado] || 'estado-borrador';
    const _badgeLabel = _estadoLabelMap[_estado] || _estado;

    html += `<div class="rodeo-info-card">
        <div class="titulo">${sanitizar(rodeo?.club || '—')} — ${sanitizar(rodeo?.asociacion || '—')}</div>
        <div class="meta">
            <span>📅 ${fechaRodeo}</span>
            ${rodeo?.tipo_rodeo_nombre ? `<span>🏆 ${sanitizar(rodeo.tipo_rodeo_nombre)}</span>` : ''}
            ${rodeo?.categoria_rodeo_nombre ? `<span>${sanitizar(rodeo.categoria_rodeo_nombre)}</span>` : ''}
            <span class="estado-badge ${_badgeClass}">${_badgeLabel}</span>
        </div>
    </div>`;

    // ─── SECCIÓN I — Identificación del Rodeo (ETAPA 1) ─────────────────────
    const c = cartilla || {};
    const fld = (campo, fallback) => {
        const v = c[campo];
        return (v !== undefined && v !== null) ? v : (fallback || '');
    };
    const bool2radio = (campo) => {
        if (c[campo] === true)  return 'si';
        if (c[campo] === false) return 'no';
        return '';
    };
    const bool2check = (campo) => c[campo] === true;

    html += `<div class="bloque">
        <div class="bloque-header">I. Identificación del Rodeo</div>
        <div class="bloque-body">
            <div class="campo-grid" style="margin-bottom:14px;">
                <div>
                    <label class="form-label">Temporada <span class="req">*</span></label>
                    <input type="text" id="f-temporada" class="form-control" placeholder="Ej: 2026" value="${sanitizar(fld('temporada'))}" ${ya ? 'readonly' : ''}>
                </div>
                <div>
                    <label class="form-label">Fecha del Rodeo <span class="req">*</span></label>
                    <input type="date" id="f-fecha_rodeo" class="form-control" value="${fld('fecha_rodeo')}" ${ya ? 'readonly' : ''}>
                </div>
            </div>
            <div class="campo-grid" style="margin-bottom:14px;">
                <div>
                    <label class="form-label">Delegado Oficial <span class="req">*</span></label>
                    <input type="text" id="f-delegado_nombre" class="form-control" value="${sanitizar(fld('delegado_nombre', perfil?.nombre_completo || ''))}" ${ya ? 'readonly' : ''}>
                </div>
                <div>
                    <label class="form-label">Teléfono</label>
                    <input type="tel" id="f-delegado_telefono" class="form-control" placeholder="Ej: +56 9 1234 5678" value="${sanitizar(fld('delegado_telefono', perfil?.telefono || ''))}" ${ya ? 'readonly' : ''}>
                </div>
            </div>
            <div class="campo-grid" style="margin-bottom:14px;">
                <div>
                    <label class="form-label">Secretario del Jurado</label>
                    <input type="text" id="f-secretario_jurado" class="form-control" placeholder="Nombre completo" value="${sanitizar(fld('secretario_jurado'))}" ${ya ? 'readonly' : ''}>
                </div>
                <div>
                    <label class="form-label">N° de Socio (Secretario)</label>

function renderBloqueGanado(ya) {
    const cont = document.getElementById('ganado-cuerpo');
    if (!cont) return;
    const haySeries = _seriesGanado.length > 0;
    const btnAgregar = ya ? '' : `<button class="btn btn-outline btn-agregar-serie" onclick="agregarSerie()">+ Agregar serie</button>`;
    let html = '';
    if (!haySeries && !ya) {
        html += `<div class="alerta alerta-info" style="font-size:13px;margin-bottom:12px;">No hay series registradas. Haga clic en <strong>+ Agregar serie</strong> para comenzar.</div>`;
    }
    html += `<div class="sub-titulo-ganado">1. Colleras participantes y ganado utilizado</div>`;
    html += `<div class="tabla-wrap-ganado">${renderTablaColleras(ya)}</div>`;
    html += `<div class="sub-titulo-ganado">2. Vueltas en apiñadero, tipo y peso del ganado</div>`;
    html += `<div class="tabla-wrap-ganado">${renderTablaVueltas(ya)}</div>`;
    html += `<div class="sub-titulo-ganado">3. Calidad del ganado</div>`;
    html += `<div class="tabla-wrap-ganado">${renderTablaCalidad(ya)}</div>`;
    html += `<div class="sub-titulo-ganado">4. Ganado fuera de peso</div>`;
    html += `<p style="font-size:12px;color:#666;margin:-4px 0 10px;">En caso de existir ganado fuera de peso en cualquier serie, indique la cantidad y el porcentaje (Art. 242).</p>`;
    html += `<div id="aviso-ganado-bajo-peso" class="aviso-ganado-bajo-peso">⚠ Ha ingresado datos de ganado fuera de peso. Se recomienda marcar "Sí" en "¿Incluye informe de ganado bajo peso?" (Sección I).</div>`;
    html += `<div class="tabla-wrap-ganado">${renderTablaFueraPeso(ya)}</div>`;
    html += btnAgregar;
    cont.innerHTML = html;
    calcTotalesB4();
}

            <td><input class="inp-ganado" value="${esc(s.c1g||'')}" ${dis} oninput="setCelda(${i},'c1g',this.value)" placeholder="Tipo"></td>
            <td><input type="number" min="0" class="inp-ganado" value="${esc(s.c2n||'')}" ${dis} oninput="setCelda(${i},'c2n',this.value)"></td>

function renderTablaFueraPeso(ya) {
    if (_seriesGanado.length === 0) return '<p style="font-size:12px;color:#888;font-style:italic;">Sin series registradas.</p>';
    const dis = ya ? 'disabled' : '';
    let rows = _seriesGanado.map(function(s, i) {
        const tot = numPos(s.fp_tot), baj = numPos(s.fp_baj), sob = numPos(s.fp_sob);
        const fuer = baj + sob, pct = tot > 0 ? ((fuer/tot)*100).toFixed(1) : '—';
        return `<tr>
            <td class="td-serie" style="font-size:12px;padding:4px 8px;background:#eaf0f8;">${esc(s.nombre||'—')}</td>
            <td><input type="number" min="0" class="inp-ganado" id="fp_tot_${i}" value="${esc(s.fp_tot||'')}" ${dis} oninput="setCelda(${i},'fp_tot',this.value);calcTotalesB4()"></td>
            <td><input type="number" min="0" class="inp-ganado" id="fp_baj_${i}" value="${esc(s.fp_baj||'')}" ${dis} oninput="setCelda(${i},'fp_baj',this.value);calcTotalesB4()"></td>
            <td><input type="number" min="0" class="inp-ganado" id="fp_sob_${i}" value="${esc(s.fp_sob||'')}" ${dis} oninput="setCelda(${i},'fp_sob',this.value);calcTotalesB4()"></td>
            <td class="td-calc" id="fp_fuer_${i}">${fuer > 0 ? fuer : '—'}</td>
            <td class="td-calc" id="fp_pct_${i}">${pct !== '—' ? pct+'%' : '—'}</td>
        </tr>`;
    }).join('');
    return `<table class="tbl-ganado"><thead><tr>
        <th class="th-serie">Serie</th><th>Total animales utilizados</th><th>Ganado bajo peso</th>
        <th>Ganado sobre peso</th><th>Total fuera de peso</th><th>% fuera de peso</th>
    </tr></thead><tbody>${rows}</tbody>
    <tfoot><tr>
        <td class="td-total">TOTAL</td>
        <td class="td-total" id="fp-total-tot">—</td><td class="td-total" id="fp-total-baj">—</td>
        <td class="td-total" id="fp-total-sob">—</td><td class="td-total" id="fp-total-fuer">—</td>
        <td class="td-total-calc" id="fp-total-pct">—</td>
    </tr></tfoot></table>`;
}

function calcTotalesB4() {
    let sumTot=0, sumBaj=0, sumSob=0, hayDatos=false;
    _seriesGanado.forEach(function(s,i){
        const tot=numPos(s.fp_tot), baj=numPos(s.fp_baj), sob=numPos(s.fp_sob), fuer=baj+sob;
        const pct=tot>0?((fuer/tot)*100).toFixed(1):null;
        sumTot+=tot; sumBaj+=baj; sumSob+=sob;
        if(tot>0||baj>0||sob>0) hayDatos=true;
        const elFuer=document.getElementById('fp_fuer_'+i), elPct=document.getElementById('fp_pct_'+i);
        if(elFuer) elFuer.textContent = fuer>0?fuer:'—';
        if(elPct)  elPct.textContent  = pct!==null?pct+'%':'—';
    });
    const sumFuer=sumBaj+sumSob, pctTotal=sumTot>0?((sumFuer/sumTot)*100).toFixed(1):null;
    setText('fp-total-tot', hayDatos?sumTot:'—');
    setText('fp-total-baj', hayDatos?sumBaj:'—');
    setText('fp-total-sob', hayDatos?sumSob:'—');
    setText('fp-total-fuer',hayDatos?sumFuer:'—');
    setText('fp-total-pct', pctTotal!==null?pctTotal+'%':'—');
    const aviso=document.getElementById('aviso-ganado-bajo-peso');
    if(aviso){ const radioSi=document.getElementById('r-ganado-bajo-si'); aviso.style.display=((sumBaj>0||sumSob>0)&&!(radioSi&&radioSi.checked))?'block':'none'; }
}

function _initSecciones4(cartilla) {

        <div class="sec-sub">Reclamos recibidos</div>
        <div id="recs-items-cont"></div>
        ${ya ? '' : `<button class="btn btn-outline btn-agregar-serie" onclick="agregarReclamo()">+ Agregar reclamo</button>`}
    </div>

    <div style="margin-top:14px;margin-bottom:12px;">
        <label class="form-label">Sugerencias del delegado</label>
        <textarea class="form-control" rows="3" ${ro} oninput="setRecsCampo('sugerencias',this.value)" placeholder="Sugerencias para mejorar la organización del rodeo...">${esc(_recs.sugerencias||'')}</textarea>
    </div>
    <div>
        <label class="form-label">Observaciones generales</label>
        <textarea class="form-control" rows="3" ${ro} oninput="setRecsCampo('observaciones_generales',this.value)" placeholder="Observaciones generales del delegado...">${esc(_recs.observaciones_generales||'')}</textarea>
    </div>`;

    renderReclamosItems(ya);
}

function renderReclamosItems(ya) {
    const cont = document.getElementById('recs-items-cont');
    if (!cont) return;
    if (!_recs.items || _recs.items.length === 0) {
        cont.innerHTML = '<p style="font-size:12px;color:#888;font-style:italic;margin:4px 0 8px;">Sin reclamos registrados.</p>';
        return;
    }
    const dis = ya ? 'disabled' : '';
    const ro  = ya ? 'readonly' : '';
    const optsT = (v) => ['Reglamentario','Conducta','Instalaciones','Organización','Otro'].map(t =>
        `<option value="${t}" ${v===t?'selected':''}>${t}</option>`).join('');

    cont.innerHTML = _recs.items.map(function(r,i){ return `
    <div class="sit-card" style="margin-bottom:10px;">
        <div class="sit-card-hdr">
            Reclamo N° ${i+1}
            ${ya ? '' : `<button class="btn-q" onclick="quitarReclamo(${i})">✕ Eliminar</button>`}
        </div>
        <div class="sit-card-body">
            <div class="campo-form-sm">
                <label>Nombre de quien reclama</label>
                <input type="text" value="${esc(r.nombre||'')}" ${ro} oninput="setReclamoItem(${i},'nombre',this.value)" placeholder="Si se conoce">
            </div>
            <div class="campo-form-sm">
                <label>RUT o N° de socio</label>
                <input type="text" value="${esc(r.rut||'')}" ${ro} oninput="setReclamoItem(${i},'rut',this.value)" placeholder="Si se conoce">
            </div>
            <div class="campo-form-sm">
                <label>Tipo de reclamo</label>
                <select ${dis} onchange="setReclamoItem(${i},'tipo',this.value)"><option value="">—</option>${optsT(r.tipo)}</select>
            </div>
            <div class="campo-form-sm">
                <label>Respuesta entregada</label>
                <input type="text" value="${esc(r.respuesta||'')}" ${ro} oninput="setReclamoItem(${i},'respuesta',this.value)" placeholder="Respuesta al momento">
            </div>
            <div class="campo-form-sm sit-card-full">
                <label>Detalle del reclamo</label>
                <textarea rows="2" ${ro} oninput="setReclamoItem(${i},'detalle',this.value)">${esc(r.detalle||'')}</textarea>
            </div>
            <div class="campo-form-sm sit-card-full">
                <label>Observaciones / Evidencias</label>
                <textarea rows="2" ${ro} oninput="setReclamoItem(${i},'observaciones',this.value)">${esc(r.observaciones||'')}</textarea>
            </div>
        </div>
    </div>`; }).join('');
}

function toggleRecsTabla() {
    const w = document.getElementById('recs-tabla-wrap');
    if (w) w.style.display = _recs.hubo_reclamos === 'si' ? 'block' : 'none';
    renderReclamosItems(_estado === 'enviada');
}

function setRecsCampo(campo, valor) { _recs[campo] = valor; }
function setReclamoItem(idx, campo, valor) { if (_recs.items[idx]) _recs.items[idx][campo] = valor; }

function agregarReclamo() {
    _recs.items.push({ nombre:'', rut:'', tipo:'', detalle:'', respuesta:'', observaciones:'' });
    renderReclamosItems(false);
}

function quitarReclamo(idx) {
    if (!confirm('¿Eliminar este reclamo?')) return;
    _recs.items.splice(idx, 1);
    renderReclamosItems(false);
}

// ═════════════════════════════════════════════════════════════════════════════
// ADJUNTOS DE LA CARTILLA (ETAPA 4) — reutiliza rodeo_adjuntos + /api/usuario/adjuntos
// ═════════════════════════════════════════════════════════════════════════════

function renderSeccionAdjuntos(ya) {
    const cont = document.getElementById('sec-adjuntos-cd');
    if (!cont) return;
    cont.innerHTML = `
    <p style="font-size:13px;color:#555;margin:0 0 10px;">Adjunte documentos, fotos u otros respaldos relacionados con esta cartilla.</p>
    <p style="font-size:12px;color:#888;margin:0 0 12px;">Tipos permitidos: PDF, Word, JPG, PNG, WebP — máximo 20 MB por archivo.</p>
    ${!ya ? `
    <div style="padding:12px 14px;background:#f7f9fc;border:1px solid #e0e8f5;border-radius:8px;margin-bottom:14px;">
        <div class="campo-grid" style="margin-bottom:10px;">
            <div>
                <label class="form-label">Archivo</label>
                <input type="file" id="adj-cd-file" class="form-control" accept=".pdf,.doc,.docx,.jpg,.jpeg,.png,.webp">
            </div>
            <div>
                <label class="form-label">Descripción (opcional)</label>
                <input type="text" id="adj-cd-desc" class="form-control" placeholder="Ej: Informe disciplinario firmado">
            </div>
        </div>
        <button class="btn btn-secundario btn-pequeño" onclick="subirAdjuntoCd()">Subir adjunto</button>
        <span id="adj-cd-subiendo" style="display:none;font-size:12px;color:#555;margin-left:10px;">Subiendo...</span>
    </div>` : ''}
    <div id="adj-cd-lista"><p style="font-size:13px;color:#888;font-style:italic;">Cargando adjuntos...</p></div>`;
    cargarAdjuntosCd();
}

async function cargarAdjuntosCd() {
    const cont = document.getElementById('adj-cd-lista');
    if (!cont) return;
    try {
        const lista = await api.get(`/usuario/adjuntos?rodeo_id=${RODEO_ID}`);
        const propios = (lista || []).filter(function(a){ return a.tipo_adjunto === 'cartilla_delegado'; });
        if (propios.length === 0) {
            cont.innerHTML = '<p style="font-size:13px;color:#888;font-style:italic;">Sin adjuntos subidos aún.</p>';
            return;
        }
        const ya = ['enviada', 'reenviada', 'aprobada'].includes(_estado);
        cont.innerHTML = '<div style="border:1px solid #e0e8f5;border-radius:6px;padding:0 12px;">' +
            propios.map(function(a) {
                const ico = a.mime_type && a.mime_type.startsWith('image/') ? '🖼️' : '📄';
                const tam = a.tamano_bytes ? (a.tamano_bytes / 1024).toFixed(0) + ' KB' : '';
                return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f0f0f0;flex-wrap:wrap;">
                    <span style="font-size:20px;">${ico}</span>
                    <div style="flex:1;min-width:100px;">
                        <div style="font-size:13px;font-weight:600;">${sanitizar(a.nombre_archivo)}</div>
                        ${tam ? `<div style="font-size:11px;color:#888;">${tam}</div>` : ''}
                    </div>
                    <button class="btn btn-pequeño btn-outline" onclick="verAdjuntoCd('${a.id}')">Ver / Descargar</button>
                    ${!ya ? `<button class="btn btn-pequeño" style="background:#fdecea;color:#c0392b;border:1px solid #f5c6cb;" onclick="eliminarAdjuntoCd('${a.id}')">Eliminar</button>` : ''}
                </div>`;
            }).join('') + '</div>';
    } catch(e) {
        const es403 = e.status === 403 || (e.message && e.message.includes('Sin asignación'));
        cont.innerHTML = es403
            ? '<p style="font-size:13px;color:#888;font-style:italic;">No se pueden cargar adjuntos para esta cartilla.</p>'
            : `<p style="font-size:13px;color:#c0392b;">Error al cargar adjuntos: ${sanitizar(e.message)}</p>`;
    }
}

async function subirAdjuntoCd() {
    const fileInput = document.getElementById('adj-cd-file');
    const descInput = document.getElementById('adj-cd-desc');
    const spn       = document.getElementById('adj-cd-subiendo');
    if (!fileInput || !fileInput.files || !fileInput.files[0]) {
        mostrarToast('Seleccione un archivo primero', 'advertencia');
        return;
    }
    if (!_cartillaId) {
        mostrarToast('Guarde el borrador primero antes de adjuntar archivos', 'advertencia');
        return;
    }
    const fd = new FormData();
    fd.append('archivo',      fileInput.files[0]);
    fd.append('rodeo_id',     RODEO_ID);
    fd.append('tipo_adjunto', 'cartilla_delegado');
    if (descInput && descInput.value.trim()) fd.append('descripcion', descInput.value.trim());

    if (spn) spn.style.display = 'inline';
    try {
        await api.upload('/usuario/adjuntos', fd);
        mostrarToast('Archivo subido correctamente', 'exito');
        fileInput.value = '';
        if (descInput) descInput.value = '';
        cargarAdjuntosCd();
    } catch(e) {
        mostrarToast(e.message || 'Error al subir archivo', 'error');
    } finally {
        if (spn) spn.style.display = 'none';
    }
}

async function verAdjuntoCd(id) {
    try {
        const r = await api.get(`/usuario/adjuntos/${id}/url`);
        window.open(r.url, '_blank');
    } catch(e) {
        mostrarToast(e.message || 'Error al obtener URL', 'error');
    }
}

async function eliminarAdjuntoCd(id) {
    if (!confirm('¿Eliminar este adjunto? Esta acción no se puede deshacer.')) return;
    try {
        await api.delete(`/usuario/adjuntos/${id}`);
        mostrarToast('Adjunto eliminado', 'exito');
        cargarAdjuntosCd();
    } catch(e) {
        mostrarToast(e.message || 'Error al eliminar', 'error');
    }
}

// ═════════════════════════════════════════════════════════════════════════════
// RECOLECTAR DATOS (ETAPA 1 + 2 + 3)
// ═════════════════════════════════════════════════════════════════════════════
function recolectarDatos() {
    const radio = (name) => {
        const sel = document.querySelector(`input[name="${name}"]:checked`);
        if (!sel) return null;
        return sel.value === 'si';
    };
    const respuestasActualizadas = Object.assign({}, _respuestasJson, {
        ganado_series:        _seriesGanado,
        desempeno_jurado:     _dj,
        disciplina_informe:   _disc,
        recinto_deportivo:    _recinto,
        colleras_invitadas:   _col,
        reemplazo_jinetes:    _ree,
        accidentes_informe:   _acc,
        bienestar_animal:     _ba,
        informe_veterinario:  _vet,
        reclamos_sugerencias: _recs
    });
    return {
        temporada:                           document.getElementById('f-temporada')?.value.trim() || null,
        fecha_rodeo:                         document.getElementById('f-fecha_rodeo')?.value || null,
        delegado_nombre:                     document.getElementById('f-delegado_nombre')?.value.trim() || null,
        delegado_telefono:                   document.getElementById('f-delegado_telefono')?.value.trim() || null,
        secretario_jurado:                   document.getElementById('f-secretario_jurado')?.value.trim() || null,
        secretario_numero_socio:             document.getElementById('f-secretario_numero_socio')?.value.trim() || null,
        club_asociacion_organizador:         document.getElementById('f-club_asociacion_organizador')?.value.trim() || null,
        tipo_rodeo:                          document.getElementById('f-tipo_rodeo')?.value.trim() || null,
        publico_serie_campeones:             document.getElementById('f-publico_serie_campeones')?.value ? parseInt(document.getElementById('f-publico_serie_campeones').value) : null,
        serie_campeones_dos_vueltas:         radio('serie_campeones_dos_vueltas'),
        incluye_informe_disciplinario:       radio('incluye_informe_disciplinario'),
        incluye_informe_ganado_bajo_peso:    radio('incluye_informe_ganado_bajo_peso'),
        certificacion_medialuna_comuna:      document.getElementById('f-cert_medialuna')?.checked   ?? false,
        certificacion_mas_200_personas:      document.getElementById('f-cert_200')?.checked         ?? false,
        certificacion_mas_250_personas:      document.getElementById('f-cert_250')?.checked         ?? false,
        certificacion_vinculacion_comunidad: document.getElementById('f-cert_vinculacion')?.checked ?? false,
        respuestas_json: respuestasActualizadas
    };
}

// ═════════════════════════════════════════════════════════════════════════════
// GUARDAR BORRADOR
// ═════════════════════════════════════════════════════════════════════════════
async function guardarBorrador() {
    if (_guardando) return;
    _guardando = true;
    const btn = document.getElementById('btn-borrador');
    if (btn) { btn.disabled = true; btn.textContent = 'Guardando…'; }
    try {
        const datos = recolectarDatos();
        if (!_cartillaId) {
            const r = await api.post(`/usuario/cartilla-delegado/rodeo/${RODEO_ID}`, {});
            _cartillaId = r.cartilla.id;
        }
        await api.patch(`/usuario/cartilla-delegado/${_cartillaId}`, datos);
        _respuestasJson = datos.respuestas_json;
        mostrarToast('Borrador guardado correctamente', 'exito');
    } catch (err) {
        mostrarToast(err.message || 'Error al guardar', 'error');
    } finally {
        _guardando = false;
        if (btn) { btn.disabled = false; btn.textContent = 'Guardar borrador'; }
    }
}

// ═════════════════════════════════════════════════════════════════════════════
// ENVIAR CARTILLA
// ═════════════════════════════════════════════════════════════════════════════
async function enviarCartilla() {
    if (_guardando) return;

    const datos = recolectarDatos();

    // Campos obligatorios sección I
    const requeridos = {
        temporada:                   'Temporada',
        fecha_rodeo:                 'Fecha del Rodeo',
        delegado_nombre:             'Delegado Oficial',
        club_asociacion_organizador: 'Club / Asociación organizador',
        tipo_rodeo:                  'Tipo de Rodeo'
    };
    const faltantes = Object.entries(requeridos)
        .filter(([k]) => !datos[k] || String(datos[k]).trim() === '')
        .map(([, label]) => label);

    if (faltantes.length > 0) {
        mostrarToast('Complete los campos obligatorios: ' + faltantes.join(', '), 'advertencia');
        return;
    }

    // Validación ganado: series sin nombre
    const seriesSinNombre = _seriesGanado.filter(s => !s.nombre || !s.nombre.trim());
    if (seriesSinNombre.length > 0) {
        mostrarToast('Todas las series de ganado deben tener nombre antes de enviar.', 'advertencia');
        return;
    }

    // Validación ETAPA 3 — disciplina
    if (_disc.hubo_informe === 'si' && (!_disc.situaciones || _disc.situaciones.length === 0)) {
        mostrarToast('Ha indicado que hubo informe de disciplina. Debe agregar al menos una situación disciplinaria.', 'advertencia');
        return;
    }

    // Validación ETAPA 3 — reemplazo de jinetes
    if (_ree.hubo === 'si' && (!_ree.items || _ree.items.length === 0)) {
        mostrarToast('Ha indicado que hubo reemplazo de jinetes. Debe agregar al menos un registro.', 'advertencia');
        return;
    }

    // Validaciones ETAPA 4 — accidentes
    if (_acc.hubo_accidentes === 'si' && (!_acc.items || _acc.items.length === 0) && !(_acc.observaciones_generales || '').trim()) {
        mostrarToast('Ha indicado que hubo accidentes. Agregue al menos un accidente o complete el campo de observaciones generales.', 'advertencia');
        return;
    }
    const accConCentroSinNombre = (_acc.items || []).some(function(a){ return a.derivado === 'si' && !a.centro_asistencial && !a.observaciones; });
    if (accConCentroSinNombre) {
        mostrarToast('Hay accidentes derivados a centro asistencial sin nombre del centro ni observaciones. Complete esa información.', 'advertencia');
        return;
    }

    // Validaciones ETAPA 4 — bienestar animal
    if ((_ba.hubo_lesiones_equinos === 'si' || _ba.hubo_lesiones_bovinos === 'si') && !(_ba.detalle_lesiones || '').trim() && !(_ba.observaciones || '').trim()) {
        mostrarToast('Ha indicado lesiones en animales. Ingrese el detalle o las observaciones de bienestar animal.', 'advertencia');
        return;
    }

    // Validaciones ETAPA 4 — veterinario
    if (_vet.preparacion === 'tecnico' && !(_vet.especifica_tecnico || '').trim()) {
        mostrarToast('Ha seleccionado "Técnico" en preparación del veterinario. Especifique el tipo de técnico.', 'advertencia');
        return;
    }
    if (_vet.preparacion === 'otro' && !(_vet.especifica_otro || '').trim()) {
        mostrarToast('Ha seleccionado "Otro" en preparación del veterinario. Especifique el tipo de personal.', 'advertencia');
        return;
    }

    // Validaciones ETAPA 4 — reclamos
    if (_recs.hubo_reclamos === 'si' && (!_recs.items || _recs.items.length === 0)) {
        mostrarToast('Ha indicado que hubo reclamos. Agregue al menos un reclamo registrado.', 'advertencia');
        return;
    }

    // Avisos (confirm, no bloquean)
    const sumBaj = _seriesGanado.reduce((acc, s) => acc + numPos(s.fp_baj), 0);
    const sumSob = _seriesGanado.reduce((acc, s) => acc + numPos(s.fp_sob), 0);
    if ((sumBaj > 0 || sumSob > 0) && datos.incluye_informe_ganado_bajo_peso !== true) {
        if (!confirm('Ha ingresado ganado bajo/sobre peso pero no marcó "Sí" en "¿Incluye informe de ganado bajo peso?". ¿Desea continuar de todas formas?')) return;
    }

    const esReenvio = _estado === 'observada';
    const confirmMsg = esReenvio
        ? '¿Confirma el reenvío del Informe del Delegado?\n\nEl informe volverá a revisión del Administrador.'
        : '¿Confirma el envío del Informe del Delegado?\n\nUna vez enviado no podrá editarlo sin autorización del Administrador.';
    if (!confirm(confirmMsg)) return;

    _guardando = true;
    const btn = document.getElementById('btn-enviar');
    if (btn) { btn.disabled = true; btn.textContent = esReenvio ? 'Reenviando…' : 'Enviando…'; }
    try {
        if (!_cartillaId) {
            const r = await api.post(`/usuario/cartilla-delegado/rodeo/${RODEO_ID}`, {});
            _cartillaId = r.cartilla.id;
        }
        await api.post(`/usuario/cartilla-delegado/${_cartillaId}/enviar`, datos);
        mostrarToast(esReenvio ? 'Informe reenviado correctamente' : 'Informe enviado correctamente', 'exito');
        setTimeout(() => init(), 1200);
    } catch (err) {
        mostrarToast(err.message || 'Error al enviar', 'error');
        _guardando = false;
        if (btn) { btn.disabled = false; btn.textContent = esReenvio ? 'Reenviar informe' : 'Enviar informe'; }
    }
}
</script>
