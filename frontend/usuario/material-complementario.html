<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Material Complementario — Sistema de Jurados</title>
    <link rel="icon" type="image/png" href="/assets/logo_V2.png">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        /* ── Filtros ── */
        .filtros-bar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .filtros-bar input,
        .filtros-bar select {
            padding: 8px 12px;
            border: 1px solid var(--gris-borde);
            border-radius: 6px;
            font-size: 13px;
            background: #fff;
            color: var(--texto);
        }
        .filtros-bar input  { flex: 1; min-width: 200px; }
        .filtros-bar select { min-width: 160px; }

        /* ── Grilla de tarjetas ── */
        .materiales-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .material-card {
            border: 1px solid var(--gris-borde);
            border-radius: 10px;
            background: #fff;
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: border-color .15s, box-shadow .15s;
        }
        .material-card:hover        { border-color: var(--primario); box-shadow: 0 2px 8px rgba(0,0,0,.07); }
        .material-card.obligatorio  { border-left: 4px solid #e74c3c; }

        .card-titulo {
            font-size: 15px;
            font-weight: 700;
            margin: 0;
            color: var(--texto);
            line-height: 1.3;
        }
        .card-desc {
            font-size: 13px;
            color: var(--gris);
            margin: 0;
            line-height: 1.4;
        }
        .card-meta { display: flex; gap: 6px; flex-wrap: wrap; }

        /* ── Badges ── */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 9px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
        }
        .badge-pdf           { background: #fde8e8; color: #c0392b; }
        .badge-word          { background: #dbeafe; color: #1e40af; }
        .badge-excel         { background: #d1fae5; color: #065f46; }
        .badge-imagen        { background: #fef3c7; color: #92400e; }
        .badge-youtube       { background: #fee2e2; color: #b91c1c; }
        .badge-link_externo  { background: #ede9fe; color: #5b21b6; }
        .badge-video_externo { background: #e0f2fe; color: #0369a1; }
        .badge-obligatorio   { background: #fee2e2; color: #991b1b; }
        .badge-categoria     { background: #f0f4ff; color: #3730a3; }

        .card-footer {
            margin-top: auto;
            padding-top: 10px;
            border-top: 1px solid #f0f0f0;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        /* ── Estado vacío ── */
        .estado-vacio {
            text-align: center;
            padding: 48px 24px;
            color: var(--gris);
        }
        .estado-vacio .icono-grande { font-size: 48px; display: block; margin-bottom: 12px; }
        .estado-vacio p             { font-size: 14px; margin: 0; }

        /* ── Modal de previsualización ── */
        #mc-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 900;
            background: rgba(0,0,0,.6);
            overflow-y: auto;
            padding: 24px 16px;
        }
        #mc-overlay.visible { display: flex; align-items: flex-start; justify-content: center; }

        #mc-dialog {
            background: #fff;
            border-radius: 12px;
            width: 100%;
            max-width: 920px;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 32px rgba(0,0,0,.25);
        }

        #mc-header {
            padding: 20px 24px 14px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
        }
        #mc-header-info h2  { font-size: 17px; margin: 0 0 6px; color: var(--azul); }
        #mc-header-meta     { display: flex; gap: 6px; flex-wrap: wrap; }

        #mc-desc {
            padding: 12px 24px 0;
            font-size: 13px;
            color: var(--gris);
            line-height: 1.5;
        }

        #mc-preview-area {
            flex: 1;
            padding: 16px 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        #mc-preview-area iframe,
        #mc-preview-area video,
        #mc-preview-area img {
            width: 100%;
            border-radius: 6px;
            border: 1px solid #eee;
        }
        #mc-preview-area iframe { height: 62vh; min-height: 360px; }
        #mc-preview-area video  { max-height: 65vh; background: #000; }
        #mc-preview-area img    { max-height: 65vh; object-fit: contain; background: #f8f8f8; }

        .mc-aviso {
            background: #f4f8fd;
            border: 1px solid #c3d9f5;
            border-radius: 8px;
            padding: 14px 18px;
            font-size: 13px;
            color: #1a3a6c;
            line-height: 1.5;
        }

        #mc-footer {
            padding: 14px 24px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .btn-cerrar-modal {
            background: none;
            border: 1px solid var(--gris-borde);
            border-radius: 6px;
            width: 32px;
            height: 32px;
            font-size: 18px;
            line-height: 1;
            cursor: pointer;
            color: var(--gris);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-cerrar-modal:hover { background: #f5f5f5; color: var(--texto); }

        @media (max-width: 768px) {
            .materiales-grid { grid-template-columns: 1fr; }
            #mc-dialog       { border-radius: 8px; }
            #mc-preview-area iframe { height: 50vh; min-height: 240px; }
        }
    </style>
</head>
<body>
<div class="layout">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <img src="/assets/logo_V2.png" alt="Federación del Rodeo Chileno" style="width:72px;height:72px;object-fit:contain;margin-bottom:6px;">
            <h2>Sistema de Jurados</h2>
        </div>
        <nav class="sidebar-nav">
            <a href="/usuario/dashboard.html"             class="nav-item"><span class="icon">🏠</span> Mi Panel</a>
            <a href="/usuario/resumen.html"               class="nav-item"><span class="icon">💵</span> Mis Pagos</a>
            <a href="/usuario/perfil.html"                class="nav-item"><span class="icon">👤</span> Mi Perfil</a>
            <a href="/usuario/evaluaciones.html"          class="nav-item"><span class="icon">📋</span> Mis Evaluaciones</a>
            <a href="/usuario/capacitaciones.html"        class="nav-item"><span class="icon">🎓</span> Mis Capacitaciones</a>
            <a href="/usuario/material-complementario.html" class="nav-item activo"><span class="icon">📂</span> Material complementario</a>
        </nav>
        <div class="sidebar-footer">
            <div class="sidebar-usuario" id="nombre-usr"></div>
            <button class="btn btn-secundario btn-pequeño w-100" onclick="api.cerrarSesion()">Cerrar Sesión</button>
        </div>
    </aside>

    <div class="main-content">
        <div class="topbar">
            <div class="flex items-center gap-12">
                <button class="btn-menu-movil" onclick="document.getElementById('sidebar').classList.toggle('abierto')">☰</button>
                <h1>Material Complementario</h1>
            </div>
            <p id="subtitulo-audiencia" style="margin:2px 0 0 0;font-size:13px;color:var(--gris);"></p>
        </div>

        <div class="page-body">
            <div class="filtros-bar">
                <input type="text" id="filtro-texto" placeholder="Buscar por título o descripción..." oninput="aplicarFiltros()">
                <select id="filtro-tipo" onchange="aplicarFiltros()">
                    <option value="">Todos los tipos</option>
                    <option value="pdf">PDF</option>
                    <option value="word">Word</option>
                    <option value="excel">Excel</option>
                    <option value="imagen">Imagen</option>
                    <option value="youtube">YouTube</option>
                    <option value="link_externo">Enlace externo</option>
                    <option value="video_externo">Video externo</option>
                </select>
                <select id="filtro-categoria" onchange="aplicarFiltros()">
                    <option value="">Todas las categorías</option>
                </select>
            </div>

            <div id="contenedor-materiales">
                <div class="alerta alerta-info" style="font-size:13px;">Cargando materiales…</div>
            </div>
        </div>
    </div>
</div>

<!-- ── Modal de previsualización ── -->
<div id="mc-overlay" role="dialog" aria-modal="true" aria-labelledby="mc-titulo">
    <div id="mc-dialog">
        <div id="mc-header">
            <div id="mc-header-info">
                <h2 id="mc-titulo"></h2>
                <div id="mc-header-meta"></div>
            </div>
            <button class="btn-cerrar-modal" onclick="cerrarModal()" title="Cerrar">✕</button>
        </div>
        <div id="mc-desc"></div>
        <div id="mc-preview-area"></div>
        <div id="mc-footer"></div>
    </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/sidebar-toggle.js"></script>
<script>
protegerRuta('usuario_pagado');

(function () {
    var _materiales    = [];
    var _materialesMap = {};

    var ICONOS = {
        pdf: '📄', word: '📝', excel: '📊', imagen: '🖼️',
        youtube: '▶️', link_externo: '🔗', video_externo: '🎥'
    };
    var LABELS = {
        pdf: 'PDF', word: 'Word', excel: 'Excel', imagen: 'Imagen',
        youtube: 'YouTube', link_externo: 'Enlace externo', video_externo: 'Video externo'
    };

    function esTipoArchivo(tipo) {
        return ['pdf', 'word', 'excel', 'imagen', 'video_externo'].includes(tipo);
    }

    function formatearFecha(iso) {
        if (!iso) return '';
        return new Date(iso).toLocaleDateString('es-CL', { day: '2-digit', month: '2-digit', year: 'numeric' });
    }

    // ── Init ──────────────────────────────────────────────────────────────────
    async function init() {
        var usuario = api.getUsuario();
        if (!usuario) return;

        document.getElementById('nombre-usr').textContent = usuario.nombre_completo || usuario.rut || '';

        var sub = document.getElementById('subtitulo-audiencia');
        if (usuario.tipo_persona === 'jurado')           sub.textContent = 'Recursos de estudio para jurados';
        else if (usuario.tipo_persona === 'delegado_rentado') sub.textContent = 'Recursos de estudio para delegados';
        else sub.textContent = 'Recursos de estudio disponibles para ti';

        var cont = document.getElementById('contenedor-materiales');
        try {
            _materiales = await api.get('/usuario/material-complementario/mis-materiales');
            _materiales.forEach(function (m) { _materialesMap[m.id] = m; });
            poblarFiltroCategoria();
            renderMateriales(_materiales, false);
        } catch (err) {
            cont.innerHTML = '<div class="alerta alerta-error">' +
                sanitizar((err && (err.error || err.message)) || 'Error al cargar los materiales') + '</div>';
        }
    }

    function poblarFiltroCategoria() {
        var cats = [];
        _materiales.forEach(function (m) {
            if (m.categoria && !cats.includes(m.categoria)) cats.push(m.categoria);
        });
        cats.sort();
        var sel = document.getElementById('filtro-categoria');
        cats.forEach(function (c) {
            var opt = document.createElement('option');
            opt.value = c; opt.textContent = c;
            sel.appendChild(opt);
        });
    }

    window.aplicarFiltros = function () {
        var texto = document.getElementById('filtro-texto').value.trim().toLowerCase();
        var tipo  = document.getElementById('filtro-tipo').value;
        var cat   = document.getElementById('filtro-categoria').value;

        var filtrados = _materiales.filter(function (m) {
            if (tipo && m.tipo_material !== tipo) return false;
            if (cat  && m.categoria    !== cat)   return false;
            if (texto) {
                var ok = (m.titulo      || '').toLowerCase().includes(texto) ||
                         (m.descripcion || '').toLowerCase().includes(texto) ||
                         (m.categoria   || '').toLowerCase().includes(texto);
                if (!ok) return false;
            }
            return true;
        });
        renderMateriales(filtrados, _materiales.length > 0 && filtrados.length === 0);
    };

    // ── Render tarjetas ───────────────────────────────────────────────────────
    function renderMateriales(lista, esFiltroVacio) {
        var cont = document.getElementById('contenedor-materiales');

        if (!lista || lista.length === 0) {
            cont.innerHTML = esFiltroVacio
                ? '<div class="estado-vacio"><span class="icono-grande">🔍</span><p>No se encontraron materiales con los filtros aplicados.</p></div>'
                : '<div class="estado-vacio"><span class="icono-grande">📂</span><p>No hay material complementario disponible por el momento.</p></div>';
            return;
        }

        var html = '<div class="materiales-grid">';
        lista.forEach(function (m) {
            var icono      = ICONOS[m.tipo_material] || '📄';
            var label      = LABELS[m.tipo_material]  || m.tipo_material;
            var badgeTipo  = '<span class="badge badge-' + m.tipo_material + '">' + icono + ' ' + sanitizar(label) + '</span>';
            var badgeCat   = m.categoria  ? '<span class="badge badge-categoria">'  + sanitizar(m.categoria) + '</span>' : '';
            var badgeOblig = m.obligatorio ? '<span class="badge badge-obligatorio">⚠ Obligatorio</span>' : '';
            var desc       = m.descripcion ? '<p class="card-desc">' + sanitizar(m.descripcion) + '</p>' : '';

            var btnDescargar = esTipoArchivo(m.tipo_material)
                ? '<button class="btn btn-outline btn-pequeño" onclick="descargarMaterial(\'' + m.id + '\')">⬇ Descargar</button>'
                : '';

            html +=
                '<div class="material-card' + (m.obligatorio ? ' obligatorio' : '') + '">' +
                    '<p class="card-titulo">' + sanitizar(m.titulo) + '</p>' +
                    desc +
                    '<div class="card-meta">' + badgeTipo + badgeCat + badgeOblig + '</div>' +
                    '<div style="font-size:11px;color:var(--gris);">Publicado: ' + formatearFecha(m.created_at) + '</div>' +
                    '<div class="card-footer">' +
                        '<button class="btn btn-primario btn-pequeño" onclick="previsualizarMaterial(\'' + m.id + '\')">👁 Previsualizar</button>' +
                        btnDescargar +
                    '</div>' +
                '</div>';
        });
        html += '</div>';
        cont.innerHTML = html;
    }

    // ── Previsualización ──────────────────────────────────────────────────────
    window.previsualizarMaterial = async function (id) {
        var mat = _materialesMap[id];
        if (!mat) return;
        abrirModalCargando(mat);

        try {
            var data = await api.get('/usuario/material-complementario/' + id + '/abrir');
            rellenarPreview(mat, data);
        } catch (err) {
            document.getElementById('mc-preview-area').innerHTML =
                '<div class="alerta alerta-error">' +
                sanitizar((err && (err.error || err.message)) || 'No se pudo cargar el material') + '</div>';
        }
    };

    window.descargarMaterial = async function (id) {
        try {
            var data = await api.get('/usuario/material-complementario/' + id + '/abrir');
            if (data.url) window.open(data.url, '_blank', 'noopener,noreferrer');
        } catch (err) {
            alert((err && (err.error || err.message)) || 'No se pudo descargar el material');
        }
    };

    function abrirModalCargando(mat) {
        var icono = ICONOS[mat.tipo_material] || '📄';
        var label = LABELS[mat.tipo_material]  || mat.tipo_material;

        document.getElementById('mc-titulo').textContent    = mat.titulo || '';
        document.getElementById('mc-header-meta').innerHTML =
            '<span class="badge badge-' + mat.tipo_material + '">' + icono + ' ' + sanitizar(label) + '</span>' +
            (mat.categoria  ? ' <span class="badge badge-categoria">'  + sanitizar(mat.categoria) + '</span>' : '') +
            (mat.obligatorio ? ' <span class="badge badge-obligatorio">⚠ Obligatorio</span>' : '');

        document.getElementById('mc-desc').innerHTML = mat.descripcion
            ? '<p style="padding:12px 24px 0;font-size:13px;color:var(--gris);margin:0;">' + sanitizar(mat.descripcion) + '</p>'
            : '';

        document.getElementById('mc-preview-area').innerHTML =
            '<div style="text-align:center;padding:40px;color:var(--gris);font-size:14px;">Cargando…</div>';
        document.getElementById('mc-footer').innerHTML = '';

        document.getElementById('mc-overlay').classList.add('visible');
        document.body.style.overflow = 'hidden';
    }

    // URL del recurso activo — usada por mcDescargar() y mcAbrirExterno()
    window._mcUrlDescarga = '';
    window._mcUrlExterna  = '';

    window.mcDescargar = function () {
        if (window._mcUrlDescarga) window.open(window._mcUrlDescarga, '_blank', 'noopener,noreferrer');
    };
    window.mcAbrirExterno = function () {
        if (window._mcUrlExterna) window.open(window._mcUrlExterna, '_blank', 'noopener,noreferrer');
    };

    function rellenarPreview(mat, data) {
        var area   = document.getElementById('mc-preview-area');
        var footer = document.getElementById('mc-footer');
        var url    = data.url || '';
        var tipo   = mat.tipo_material;

        window._mcUrlDescarga = url;
        window._mcUrlExterna  = url;

        var btnDescargar = esTipoArchivo(tipo)
            ? '<button class="btn btn-outline btn-pequeño" onclick="mcDescargar()">⬇ Descargar</button>'
            : '';

        if (tipo === 'pdf') {
            var ifrPdf = document.createElement('iframe');
            ifrPdf.src = url;
            ifrPdf.title = mat.titulo || '';
            area.innerHTML = '';
            area.appendChild(ifrPdf);
            footer.innerHTML = btnDescargar + '<span style="font-size:12px;color:var(--gris);">Si el visor no carga, usa el botón Descargar.</span>';

        } else if (tipo === 'imagen') {
            var img = document.createElement('img');
            img.src = url;
            img.alt = mat.titulo || '';
            area.innerHTML = '';
            area.appendChild(img);
            footer.innerHTML = btnDescargar;

        } else if (tipo === 'video_externo') {
            var vid = document.createElement('video');
            vid.controls = true;
            vid.src = url;
            var fbDiv = document.createElement('div');
            fbDiv.className = 'mc-aviso';
            fbDiv.style.display = 'none';
            fbDiv.textContent = 'No fue posible reproducir el video. Usa el botón de descarga para verlo.';
            vid.addEventListener('error', function () {
                vid.style.display = 'none';
                fbDiv.style.display = 'block';
            });
            area.innerHTML = '';
            area.appendChild(vid);
            area.appendChild(fbDiv);
            footer.innerHTML = btnDescargar;

        } else if (tipo === 'youtube') {
            var embedUrl = youtubeEmbedUrl(url);
            if (embedUrl) {
                var ifr = document.createElement('iframe');
                ifr.src = embedUrl;
                ifr.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
                ifr.allowFullscreen = true;
                ifr.title = mat.titulo || '';
                area.innerHTML = '';
                area.appendChild(ifr);
                footer.innerHTML = '<button class="btn btn-outline btn-pequeño" onclick="mcAbrirExterno()">↗ Abrir en YouTube</button>';
            } else {
                area.innerHTML = '<div class="mc-aviso">No se pudo generar el enlace de previsualización.</div>';
                footer.innerHTML = '<button class="btn btn-outline btn-pequeño" onclick="mcAbrirExterno()">↗ Abrir en YouTube</button>';
            }

        } else if (tipo === 'word' || tipo === 'excel') {
            // Microsoft Office Online viewer — requiere que la URL sea públicamente accesible
            var officeUrl = 'https://view.officeapps.live.com/op/embed.aspx?src=' + encodeURIComponent(url);
            var ifrO = document.createElement('iframe');
            ifrO.src = officeUrl;
            ifrO.title = mat.titulo || '';
            area.innerHTML = '<div class="mc-aviso" style="margin-bottom:10px;">La previsualización usa el visor de Microsoft Office Online. Si no carga, descarga el archivo para revisarlo.</div>';
            area.appendChild(ifrO);
            footer.innerHTML = btnDescargar;

        } else if (tipo === 'link_externo') {
            var ifrL = document.createElement('iframe');
            ifrL.src = url;
            ifrL.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-forms allow-popups');
            ifrL.title = mat.titulo || '';
            area.innerHTML = '<div class="mc-aviso" style="margin-bottom:10px;">⚠ Algunos sitios externos bloquean la previsualización. Si no aparece el contenido, usa "Abrir en nueva pestaña".</div>';
            area.appendChild(ifrL);
            footer.innerHTML = '<button class="btn btn-outline btn-pequeño" onclick="mcAbrirExterno()">↗ Abrir en nueva pestaña</button>';

        } else {
            area.innerHTML = '<div class="mc-aviso">Tipo de material no soportado para previsualización.</div>';
            footer.innerHTML = '<button class="btn btn-outline btn-pequeño" onclick="mcAbrirExterno()">↗ Abrir</button>';
        }
    }

    // ── Modal: cerrar ─────────────────────────────────────────────────────────
    window.cerrarModal = function () {
        var overlay = document.getElementById('mc-overlay');
        overlay.classList.remove('visible');
        document.body.style.overflow = '';
        // Limpiar iframe/video para detener la reproducción
        document.getElementById('mc-preview-area').innerHTML = '';
    };

    // Cerrar con ESC
    document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') cerrarModal();
    });

    // Cerrar al hacer clic en el fondo
    document.getElementById('mc-overlay').addEventListener('click', function (e) {
        if (e.target === this) cerrarModal();
    });

    // ── Helpers ───────────────────────────────────────────────────────────────
    function youtubeEmbedUrl(url) {
        var m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([A-Za-z0-9_-]{11})/);
        return m ? 'https://www.youtube.com/embed/' + m[1] : null;
    }

    // Codifica caracteres que romperían atributos HTML o cadenas JS embebidas
    function escaparUrl(url) {
        return String(url || '')
            .replace(/&/g, '%26')
            .replace(/"/g, '%22')
            .replace(/'/g, '%27')
            .replace(/</g, '%3C')
            .replace(/>/g, '%3E');
    }

    init();
})();
</script>
</body>
</html>
