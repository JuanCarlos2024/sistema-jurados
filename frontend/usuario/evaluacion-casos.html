<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casos del Ciclo — Sistema de Jurados</title>
    <link rel="icon" type="image/png" href="/assets/logo_V2.png">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        /* Header de la evaluación */
        .eval-header-jurado {
            background: #fff;
            border: 1px solid var(--gris-borde);
            border-radius: 10px;
            padding: 14px 18px;
            margin-bottom: 16px;
        }
        .eval-header-jurado h2 { margin: 0 0 3px; font-size: 16px; }
        .eval-header-jurado p  { margin: 0; font-size: 13px; color: var(--gris); }

        /* Acordeón de ciclo */
        .ciclo-accordion {
            border: 1px solid var(--gris-borde);
            border-radius: 10px;
            margin-bottom: 14px;
            overflow: hidden;
        }
        .ciclo-acc-header {
            width: 100%;
            background: #f8f9fa;
            border: none;
            padding: 14px 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            text-align: left;
            border-bottom: 1px solid transparent;
            transition: background .12s;
        }
        .ciclo-acc-header:hover { background: #f0f2f5; }
        .ciclo-acc-header.expandido { border-bottom-color: var(--gris-borde); }
        .ciclo-acc-titulo { font-weight: 700; white-space: nowrap; }
        .ciclo-acc-estado {
            padding: 1px 8px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            white-space: nowrap;
        }
        .ciclo-acc-stats { font-size: 12px; color: var(--gris); flex: 1; }
        .acc-arrow { font-size: 11px; color: var(--gris); margin-left: auto; }
        .ciclo-acc-body { padding: 16px; }
        .acc-collapsed { display: none; }

        /* Caso card */
        .caso-card {
            border: 1px solid var(--gris-borde);
            border-radius: 10px;
            background: #fff;
            margin-bottom: 14px;
            overflow: hidden;
        }
        .caso-card:last-child { margin-bottom: 0; }
        .caso-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            padding: 10px 14px;
            background: #f8f9fa;
            border-bottom: 1px solid var(--gris-borde);
        }
        .caso-card-body { padding: 14px 16px; }

        .badge-tipo-interpretativa { background:#eaf4fb; color:#1a5276; display:inline-block; padding:2px 9px; border-radius:10px; font-size:11px; font-weight:600; }
        .badge-tipo-reglamentaria  { background:#fef9e7; color:#7d6608; display:inline-block; padding:2px 9px; border-radius:10px; font-size:11px; font-weight:600; }
        .badge-tipo-informativo    { background:#e9f7ef; color:#1e8449; display:inline-block; padding:2px 9px; border-radius:10px; font-size:11px; font-weight:600; }

        /* Formulario de respuesta */
        .opciones-decision { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
        .opcion-radio {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            border: 2px solid var(--gris-borde);
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all .15s;
            user-select: none;
        }
        .opcion-radio input[type=radio] { margin: 0; }
        .opcion-radio.acepta:has(input:checked)  { border-color: #27ae60; background: #f0fff4; color: #1e8449; }
        .opcion-radio.rechaza:has(input:checked) { border-color: #e74c3c; background: #fef9f9; color: #922b21; }

        .respuesta-registrada {
            background: #f0fff4;
            border: 1px solid #a9dfbf;
            border-left: 4px solid #27ae60;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 13px;
        }
        .respuesta-registrada .dec-label { font-weight: 700; color: #1e8449; font-size: 14px; margin-bottom: 4px; }
        .respuesta-registrada .dec-label.rechaza-label { color: #922b21; }
        .respuesta-sin-resp {
            background: #fef9e7;
            border: 1px solid #f9e79f;
            border-left: 4px solid #f39c12;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 13px;
        }
        .respuesta-sin-resp .dec-label { font-weight: 700; color: #7d6608; font-size: 14px; margin-bottom: 4px; }

        .informativo-aviso {
            background: #eaf4fb;
            border: 1px solid #aed6f1;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            color: #1a5276;
            margin-bottom: 12px;
        }

        .form-error { color: var(--rojo, #e74c3c); font-size: 12px; margin-top: 4px; }

        /* Retroalimentación */
        .retro-bloque {
            margin-top: 12px;
            padding: 12px 14px;
            border: 1px solid #d5d8dc;
            border-left: 4px solid #aab7b8;
            border-radius: 8px;
            background: #f8f9fa;
            font-size: 13px;
        }
        .retro-bloque > strong { display:block; margin-bottom:8px; color:#555; font-size:12px; text-transform:uppercase; letter-spacing:.5px; }
        .retro-bloque.retro-pend-bloque { border-left-color: #f39c12; background: #fef9e7; }
        .retro-item { margin-bottom:8px; }
        .retro-dec  { display:block; font-weight:600; font-size:13px; margin-bottom:2px; }
        .retro-ok   { color:#1e8449; }
        .retro-mal  { color:#922b21; }
        .retro-pend { color:#7d6608; }
        .retro-auto { color:#1a5276; }
        .retro-com  { display:block; color:#555; font-style:italic; font-size:12px; margin:3px 0; }
        .retro-resultado { display:block; font-size:12px; font-weight:500; margin-top:2px; }
        .retro-final {
            margin-top:8px;
            padding-top:8px;
            border-top:1px solid #d5d8dc;
            font-size:13px;
            color:#333;
        }

        .sin-ciclo {
            text-align: center;
            padding: 40px 20px;
            color: var(--gris);
        }
        .sin-ciclo p { font-size: 14px; margin: 8px 0 0; }

        /* Video inline */
        .video-inline-contenedor {
            max-width: 820px;
            margin: 8px auto 16px auto;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #aed6f1;
            background: #000;
        }
        .video-inline-contenedor.oculto { display: none; }
        .video-inline-ratio {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
        }
        .video-inline-ratio iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        .video-inline-fallback {
            padding: 20px;
            text-align: center;
            color: #ccc;
            font-size: 13px;
            background: #1a1a1a;
        }
        .video-inline-fallback a { color: #aed6f1; }

        /* Modo descuento automático */
        .aviso-da { background:#e8f4fd; border:1px solid #aed6f1; border-radius:8px; padding:10px 14px; font-size:13px; color:#1a5276; margin-bottom:12px; }
        .aviso-sin-casos-da { background:#e8f8f2; border:1px solid #a2d9c9; border-radius:8px; padding:14px 16px; font-size:14px; color:#1e6444; text-align:center; margin:8px 0; }
        .resolucion-auto-ok  { background:#f0fff4; border:1px solid #a9dfbf; border-left:4px solid #27ae60; border-radius:8px; padding:12px 16px; font-size:13px; }
        .resolucion-auto-mal { background:#fef9f9; border:1px solid #f1948a; border-left:4px solid #e74c3c; border-radius:8px; padding:12px 16px; font-size:13px; }
        .comentario-ciclo-da { margin-top:16px; padding:14px 16px; background:#f8f9fa; border:1px solid #ddd; border-radius:8px; }
        .comentario-ciclo-da h4 { margin:0 0 10px; font-size:13px; font-weight:600; color:#555; }
    </style>
</head>
<body>
<div class="layout">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <img src="/assets/logo_V2.png" alt="Federación del Rodeo Chileno" style="width:72px;height:72px;object-fit:contain;margin-bottom:6px;">
            <h2>Sistema de Jurados</h2>
        </div>
        <nav class="sidebar-nav">
            <a href="/usuario/dashboard.html" class="nav-item"><span class="icon">🏠</span> Mi Panel</a>
            <a href="/usuario/resumen.html" class="nav-item"><span class="icon">💵</span> Mis Pagos</a>
            <a href="/usuario/perfil.html" class="nav-item"><span class="icon">👤</span> Mi Perfil</a>
            <a href="/usuario/evaluaciones.html" class="nav-item activo"><span class="icon">📋</span> Mis Evaluaciones</a>
            <a href="/usuario/capacitaciones.html" class="nav-item"><span class="icon">🎓</span> Mis Capacitaciones</a>
            <a href="/usuario/material-complementario.html" class="nav-item"><span class="icon">📂</span> Material complementario</a>
        </nav>
        <div class="sidebar-footer">
            <div class="sidebar-usuario" id="nombre-usr"></div>
            <button class="btn btn-secundario btn-pequeño w-100" onclick="api.cerrarSesion()">Cerrar Sesión</button>
        </div>
    </aside>

    <div class="main-content">
        <div class="topbar">
            <div class="flex items-center gap-12">
                <button class="btn-menu-movil" onclick="document.getElementById('sidebar').classList.toggle('abierto')">☰</button>
                <a href="/usuario/evaluaciones.html" class="btn btn-secundario btn-pequeño" style="margin-right:8px;">← Volver</a>
                <h1 id="titulo-pagina">Mis Casos</h1>
            </div>
        </div>

        <div class="page-body">
            <div id="contenido">
                <div class="spinner-wrap"><div class="spinner"></div></div>
            </div>
        </div>
    </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script>
protegerRuta('usuario_pagado');
document.getElementById('nombre-usr').textContent = api.getUsuario()?.nombre || '';

const params  = getQueryParams();
const evalId  = params.id;
const cicloParam = parseInt(params.ciclo) || 0; // ciclo a auto-expandir

if (api.getUsuario()?.tipo_persona !== 'jurado') {
    document.getElementById('contenido').innerHTML =
        '<div class="alerta alerta-error">Esta sección solo está disponible para jurados.</div>';
} else if (!evalId) {
    document.getElementById('contenido').innerHTML =
        '<div class="alerta alerta-error">No se especificó evaluación.</div>';
    setTimeout(() => { window.location.href = '/usuario/evaluaciones.html'; }, 2000);
} else {
    cargar();
}

const _respondidos = new Set();
let   _modoFlujo   = 'apelacion_jurado';

async function cargar() {
    try {
        const data = await api.get(`/usuario/evaluaciones/${evalId}/casos`);
        render(data);
    } catch(e) {
        document.getElementById('contenido').innerHTML =
            `<div class="alerta alerta-error">${sanitizar(e.message || 'Error al cargar casos')}</div>`;
    }
}

// ── Etiquetas de estado ciclo ───────────────────────────────────────
const CICLO_LABEL = {
    abierto:        'Abierto',
    en_revision:    'En revisión',
    cerrado:        'Cerrado',
    cargado:        'Por abrir',
    sin_casos:      'Sin casos',
    pendiente_carga:'—'
};
const CICLO_STYLE = {
    abierto:        'background:#d5f5e3;color:#1e8449',
    en_revision:    'background:#fdebd0;color:#784212',
    cerrado:        'background:#f0f0f0;color:#666',
    cargado:        'background:#d6eaf8;color:#1a5276',
    sin_casos:      'background:#eaecee;color:#888'
};

// ── Render principal ────────────────────────────────────────────────
function render(data) {
    const ev    = data.evaluacion || {};
    _modoFlujo  = ev.modo_flujo || 'apelacion_jurado';
    const rodeo = ev.rodeo || {};
    const ciclo1 = data.ciclo1;
    const ciclo2 = data.ciclo2;

    if (!ciclo1 && !ciclo2) {
        document.getElementById('contenido').innerHTML = `
        <div class="sin-ciclo">
            <div style="font-size:40px;">⏳</div>
            <strong>Sin ciclos disponibles</strong>
            <p>Espera a que el administrador configure esta evaluación.</p>
            <a href="/usuario/evaluaciones.html" class="btn btn-secundario btn-pequeño" style="margin-top:16px;text-decoration:none;">← Volver</a>
        </div>`;
        return;
    }

    const club = rodeo.club || 'Evaluación';
    const asoc = rodeo.asociacion || '';
    document.getElementById('titulo-pagina').textContent = `${club}${asoc ? ' — ' + asoc : ''}`;

    // Determinar ciclo a auto-expandir
    let autoExpand = cicloParam;
    if (!autoExpand) {
        // Expandir el ciclo con pendientes, o el más relevante con casos
        if (ciclo1?.puede_responder || (ciclo1?.casos?.length > 0 && ciclo1.estado === 'abierto')) {
            autoExpand = 1;
        } else if (ciclo2?.puede_responder || (ciclo2?.casos?.length > 0 && ciclo2.estado === 'abierto')) {
            autoExpand = 2;
        } else if (ciclo1?.casos?.length > 0) {
            autoExpand = 1;
        } else if (ciclo2?.casos?.length > 0) {
            autoExpand = 2;
        } else {
            autoExpand = 1;
        }
    }

    let html = `
    <div class="eval-header-jurado">
        <h2>${sanitizar(club)}${asoc ? ' — ' + sanitizar(asoc) : ''}</h2>
        <p>${sanitizar(rodeo.fecha || '')}${rodeo.tipo_rodeo_nombre ? ' · ' + sanitizar(rodeo.tipo_rodeo_nombre) : ''}</p>
    </div>
    ${renderCicloAccordion(ciclo1, 1, autoExpand === 1)}
    ${renderCicloAccordion(ciclo2, 2, autoExpand === 2)}`;

    document.getElementById('contenido').innerHTML = html;
}

function renderCicloAccordion(ciclo, num, expanded) {
    if (!ciclo) {
        return `
        <div class="ciclo-accordion">
            <div class="ciclo-acc-header" style="cursor:default;opacity:.6;">
                <span class="ciclo-acc-titulo">${labelCiclo(num)}</span>
                <span class="ciclo-acc-estado" style="background:#eaecee;color:#888;">Sin configurar</span>
            </div>
        </div>`;
    }

    const estadoStyle = CICLO_STYLE[ciclo.estado] || 'background:#eaecee;color:#555';
    const estadoLabel = CICLO_LABEL[ciclo.estado] || ciclo.estado;
    const casos       = ciclo.casos || [];

    const respondidos = casos.filter(c => c.mi_respuesta && c.mi_respuesta.decision !== 'sin_respuesta').length;
    const sinResp     = casos.filter(c => c.mi_respuesta && c.mi_respuesta.decision === 'sin_respuesta').length;
    const pendientes  = casos.filter(c => c.puede_responder).length;

    let stats = `${casos.length} caso(s)`;
    if (respondidos > 0) stats += ` · ${respondidos} respondido(s)`;
    if (pendientes  > 0) stats += ` · ${pendientes} pendiente(s)`;
    if (sinResp     > 0) stats += ` · ${sinResp} sin respuesta`;

    const isExpanded  = expanded;
    const arrowIcon   = isExpanded ? '▼' : '▶';
    const bodyClass   = isExpanded ? '' : 'acc-collapsed';
    const headerClass = isExpanded ? 'expandido' : '';

    const esModoDA  = _modoFlujo === 'descuento_automatico';
    const esSinCasos = esModoDA && ciclo.es_ciclo_sin_casos;

    let bodyHtml;
    if (esSinCasos) {
        bodyHtml = `<div class="aviso-sin-casos-da">
            <div style="font-size:24px;margin-bottom:8px;">📋</div>
            <strong>Ciclo sin situaciones a revisar</strong>
            <p style="margin:6px 0 0;font-size:13px;">El analista indicó que este ciclo no contiene situaciones para revisión.</p>
            <p style="margin:10px 0 0;font-size:13px;border-top:1px solid #a2d9c9;padding-top:8px;"><strong>Comentario del analista:</strong> ${sanitizar(ciclo.comentario_sin_casos || 'Sin comentario.')}</p>
        </div>`;
    } else if (casos.length === 0) {
        bodyHtml = '<div style="text-align:center;padding:28px 16px;color:var(--gris);font-size:14px;">Sin casos cargados en este ciclo.</div>';
    } else {
        bodyHtml = casos.map(caso => renderCasoCard(caso, ciclo)).join('');
    }

    // Sección de comentario por ciclo (modo DA) — no mostrar si el ciclo fue abierto sin casos
    const comentarioCicloDA = esModoDA && !esSinCasos && ['abierto','cerrado','en_revision'].includes(ciclo.estado)
        ? renderComentarioCicloDA(ciclo)
        : '';

    return `
    <div class="ciclo-accordion">
        <button class="ciclo-acc-header ${headerClass}" onclick="toggleAcc(${num})" id="acc-btn-${num}">
            <span class="ciclo-acc-titulo">${labelCiclo(num)}</span>
            <span class="ciclo-acc-estado" style="${estadoStyle}">${sanitizar(estadoLabel)}</span>
            <span class="ciclo-acc-stats">${sanitizar(stats)}</span>
            <span class="acc-arrow" id="acc-arrow-${num}">${arrowIcon}</span>
        </button>
        <div class="ciclo-acc-body ${bodyClass}" id="acc-body-${num}">
            ${esModoDA && !esSinCasos ? `<div class="aviso-da">⚡ <strong>Descuento Automático:</strong> Los descuentos se aplican automáticamente al cierre del ciclo. No se requiere acepta/rechaza individual.</div>` : ''}
            ${bodyHtml}
            ${comentarioCicloDA}
        </div>
    </div>`;
}

// ── Modo descuento automático: cuerpo de caso ───────────────────────
function renderCuerpoDA(caso, ciclo) {
    if (caso.estado === 'resuelto' || caso.estado === 'consolidado') {
        const sinDesc = !caso.resolucion_final || caso.resolucion_final === 'sin_descuento';
        const d = caso.descuento_puntos || 0;
        if (sinDesc) {
            return `<div class="resolucion-auto-ok">
                <strong style="color:#1e8449;">✓ Sin descuento</strong>
                <p style="margin:4px 0 0;font-size:12px;color:#555;">Este caso fue resuelto automáticamente al cierre del ciclo sin aplicar descuento.</p>
            </div>`;
        }
        return `<div class="resolucion-auto-mal">
            <strong style="color:#922b21;">Descuento aplicado: -${d} pt</strong>
            <p style="margin:4px 0 0;font-size:12px;color:#555;">Este caso fue resuelto automáticamente al cierre del ciclo.</p>
        </div>`;
    }
    // Ciclo abierto o en revisión: informar que se resolverá al cierre
    return `<div class="aviso-da">
        <strong>Resolución automática al cierre</strong>
        <p style="margin:4px 0 0;">Este caso será resuelto al cerrar el ciclo. No es necesaria tu respuesta individual.</p>
        ${caso.descuento_puntos > 0 ? `<p style="margin:4px 0 0;font-size:12px;">Descuento potencial: <strong>-${caso.descuento_puntos} pt</strong></p>` : ''}
    </div>`;
}

// ── Comentario de ciclo (modo DA) ──────────────────────────────────
function renderComentarioCicloDA(ciclo) {
    const miComent = ciclo.mi_comentario;
    const esCerrado = !['abierto'].includes(ciclo.estado);

    if (miComent && miComent.estado === 'enviado') {
        return `<div class="comentario-ciclo-da">
            <h4>Mi comentario del ciclo</h4>
            <div style="background:#f0fff4;border:1px solid #a9dfbf;border-radius:6px;padding:10px 12px;font-size:13px;">
                <p style="margin:0 0 4px;">${sanitizar(miComent.comentario)}</p>
                <span style="font-size:11px;color:var(--gris);">${miComent.enviado_en ? fmtFechaChile(miComent.enviado_en) : ''}</span>
            </div>
            ${!esCerrado ? `<button class="btn btn-outline btn-pequeño" style="margin-top:8px;" onclick="mostrarFormComentarioCiclo('${ciclo.id}')">Modificar comentario</button>
            <div id="form-coment-${ciclo.id}" style="display:none;margin-top:10px;">${_formComentarioCiclo(ciclo.id, miComent.comentario)}</div>` : ''}
        </div>`;
    }

    if (esCerrado) {
        return `<div class="comentario-ciclo-da">
            <h4>Comentario del ciclo</h4>
            <p style="font-size:13px;color:var(--gris);">El ciclo está cerrado. ${miComent?.estado === 'generado_por_cierre' ? 'No enviaste comentario.' : 'Sin comentario registrado.'}</p>
        </div>`;
    }

    return `<div class="comentario-ciclo-da">
        <h4>Tu comentario del ciclo <span style="color:#e74c3c;">*</span></h4>
        <p style="font-size:12px;color:var(--gris);margin-bottom:10px;">Si tienes algún comentario sobre una situación, indica el número de la situación y a qué se refiere. Si no tienes observaciones, puedes escribir "Sin comentarios", "Acepto" u "OK".</p>
        ${_formComentarioCiclo(ciclo.id, '')}
    </div>`;
}

function _formComentarioCiclo(cicloId, valorInicial) {
    return `<textarea id="coment-ciclo-${cicloId}" class="form-control" rows="3" maxlength="1000"
        placeholder="Ej: OK, Acepto, Sin comentarios…">${sanitizar(valorInicial)}</textarea>
    <button class="btn btn-primario btn-pequeño" style="margin-top:8px;" onclick="enviarComentarioCiclo('${cicloId}')">
        Enviar comentario
    </button>
    <div id="error-ciclo-${cicloId}" class="form-error oculto"></div>`;
}

function mostrarFormComentarioCiclo(cicloId) {
    const el = document.getElementById(`form-coment-${cicloId}`);
    if (el) el.style.display = el.style.display === 'none' ? '' : 'none';
}

async function enviarComentarioCiclo(cicloId) {
    const ta  = document.getElementById(`coment-ciclo-${cicloId}`);
    const err = document.getElementById(`error-ciclo-${cicloId}`);
    const comentario = ta?.value.trim() || '';
    if (err) err.classList.add('oculto');
    if (!comentario) {
        if (err) { err.textContent = 'Debe ingresar un comentario para enviar la revisión del ciclo.'; err.classList.remove('oculto'); }
        return;
    }
    const btn = ta?.parentElement?.querySelector('.btn-primario');
    if (btn) { btn.disabled = true; btn.textContent = 'Guardando...'; }
    try {
        await api.post(`/usuario/evaluaciones/${evalId}/ciclos/${cicloId}/comentario`, { comentario });
        mostrarToast('Comentario guardado', 'exito');
        cargar();
    } catch(e) {
        if (err) { err.textContent = e.message || 'Error al guardar.'; err.classList.remove('oculto'); }
        if (btn) { btn.disabled = false; btn.textContent = 'Guardar comentario'; }
    }
}

function toggleAcc(num) {
    const body   = document.getElementById('acc-body-' + num);
    const arrow  = document.getElementById('acc-arrow-' + num);
    const btn    = document.getElementById('acc-btn-' + num);
    if (!body) return;
    const isOpen = !body.classList.contains('acc-collapsed');
    body.classList.toggle('acc-collapsed', isOpen);
    if (arrow) arrow.textContent = isOpen ? '▶' : '▼';
    if (btn)   btn.classList.toggle('expandido', !isOpen);
}

// ── Render caso card ────────────────────────────────────────────────
function renderCasoCard(caso, ciclo) {
    const esModoDA       = _modoFlujo === 'descuento_automatico';
    const esInformativo  = caso.tipo_caso === 'informativo';
    const yaRespondio    = !!caso.mi_respuesta;
    const puedeResponder = !!caso.puede_responder;
    const esSinRespuesta = yaRespondio && caso.mi_respuesta.decision === 'sin_respuesta';

    const tipoBadge = {
        interpretativa: '<span class="badge-tipo-interpretativa">Apreciación</span>',
        reglamentaria:  '<span class="badge-tipo-reglamentaria">Reglamentaria</span>',
        informativo:    '<span class="badge-tipo-informativo">Conceptual</span>'
    }[caso.tipo_caso] || '';

    const descuentoHtml = caso.descuento_puntos > 0
        ? `<span style="background:#fdebd0;color:#784212;padding:1px 7px;border-radius:4px;font-size:11px;font-weight:600;">-${caso.descuento_puntos} pt</span>`
        : '';

    let estadoBadge = '';
    if (esSinRespuesta) {
        estadoBadge = '<span style="font-size:12px;color:#7d6608;font-weight:600;">Sin respuesta</span>';
    } else if (yaRespondio) {
        estadoBadge = '<span style="font-size:12px;color:#27ae60;font-weight:600;">&#10003; Respondido</span>';
    } else if (!puedeResponder) {
        estadoBadge = '<span style="font-size:12px;color:#aaa;">Sin respuesta</span>';
    }

    let cuerpo = '';
    if (esModoDA) {
        cuerpo = renderCuerpoDA(caso, ciclo);
    } else if (esSinRespuesta) {
        cuerpo = renderSinRespuesta(caso);
    } else if (yaRespondio) {
        cuerpo = renderRespuestaRegistrada(caso, esInformativo);
    } else if (puedeResponder && esInformativo) {
        cuerpo = renderFormInformativo(caso);
    } else if (puedeResponder) {
        cuerpo = renderFormDecision(caso);
    } else {
        cuerpo = `<div class="informativo-aviso" style="background:#f8f9fa;border-color:#d5d8dc;color:#666;">
            Este caso no fue respondido durante el período de evaluación.
        </div>`;
    }

    const descripcionHtml = caso.descripcion
        ? `<p style="margin:0 0 12px;font-size:14px;">${sanitizar(caso.descripcion)}</p>`
        : '';

    const videoHtml = caso.video_url
        ? `<div style="margin-bottom:12px;">
            <button id="btn-video-${caso.id}" class="btn btn-pequeño"
                style="background:#eaf4fb;color:#1a5276;border:1px solid #aed6f1;"
                onclick="toggleVideo('${caso.id}')">&#9654; Ver video</button>
            <div id="video-${caso.id}" class="video-inline-contenedor oculto"
                data-url="${sanitizar(caso.video_url)}"></div>
           </div>`
        : '';

    return `
    <div class="caso-card" id="card-${caso.id}">
        <div class="caso-card-header">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
                <strong>Caso #${caso.numero_caso}</strong>
                ${tipoBadge}
                ${descuentoHtml}
            </div>
            ${estadoBadge}
        </div>
        <div class="caso-card-body">
            ${descripcionHtml}
            ${videoHtml}
            ${cuerpo}
        </div>
    </div>`;
}

// ── Sin respuesta al cierre ─────────────────────────────────────────
function renderSinRespuesta(caso) {
    return `<div class="respuesta-sin-resp">
        <div class="dec-label">Sin respuesta registrada</div>
        <p style="margin:4px 0 0;color:var(--texto);font-size:13px;">No se registró respuesta antes del cierre del ciclo.</p>
    </div>
    ${renderRetroalimentacion(caso.mi_respuesta, caso.descuento_puntos)}`;
}

// ── Respuesta registrada (acepta / rechaza / informativo) ───────────
function renderRespuestaRegistrada(caso, esInformativo) {
    const resp = caso.mi_respuesta;
    if (esInformativo) {
        return `<div class="respuesta-registrada">
            <div class="dec-label">Reconocido</div>
            ${resp.comentario ? `<p style="margin:4px 0 0;color:var(--texto);">${sanitizar(resp.comentario)}</p>` : ''}
        </div>`;
    }
    const esAcepta = resp.decision === 'acepta';
    return `<div class="respuesta-registrada">
        <div class="dec-label ${esAcepta ? '' : 'rechaza-label'}">${esAcepta ? '✓ Acepta' : '✗ Rechaza'}</div>
        ${resp.comentario ? `<p style="margin:4px 0 0;color:var(--texto);">${sanitizar(resp.comentario)}</p>` : ''}
    </div>
    ${renderRetroalimentacion(resp, caso.descuento_puntos)}`;
}

// ── Retroalimentación analista / comité ────────────────────────────
function renderRetroalimentacion(resp, descuento_puntos) {
    // Caso especial: sin respuesta al cierre de ciclo
    if (resp.decision === 'sin_respuesta') {
        const df = resp.descuento_final !== null && resp.descuento_final !== undefined
            ? resp.descuento_final : (descuento_puntos ?? 0);
        const descLabel = df === 0 ? 'Sin descuento' : `-${df} pt`;
        return `<div class="retro-bloque retro-pend-bloque">
            <strong>Retroalimentación</strong>
            <div class="retro-item">
                <span class="retro-dec retro-pend">No se registró respuesta antes del cierre del ciclo.</span>
                <span class="retro-resultado retro-mal">Se mantuvo el descuento asociado a este caso por falta de respuesta.</span>
            </div>
            <div class="retro-final">Descuento final: <strong>${sanitizar(descLabel)}</strong></div>
        </div>`;
    }

    const da = resp.decision_analista;
    const dc = resp.decision_comite;
    const df = resp.descuento_final;

    // Sin decisión analista aún
    if (!da) {
        if (resp.decision === 'acepta') {
            return `<div class="retro-bloque">
                <strong>Retroalimentación</strong>
                <span style="color:#1a5276;">Respuesta registrada correctamente. Al aceptar la observación técnica, se mantiene el descuento asociado al caso.</span>
            </div>`;
        }
        return `<div class="retro-bloque retro-pend-bloque">
            <strong>Retroalimentación</strong>
            <span style="color:#7d6608;">Respuesta recibida. Pendiente revisión del analista.</span>
        </div>`;
    }

    let analistaHtml = '';
    let comiteHtml   = '';

    if (da === 'aprobada_auto') {
        analistaHtml = `<div class="retro-item">
            <span class="retro-dec retro-auto">Respuesta registrada correctamente. Al aceptar la observación técnica, se mantiene el descuento asociado al caso.</span>
        </div>`;
    } else if (da === 'apelacion_aceptada') {
        analistaHtml = `<div class="retro-item">
            <span class="retro-dec retro-ok">Analista: apelación acogida</span>
            ${resp.comentario_analista ? `<span class="retro-com">${sanitizar(resp.comentario_analista)}</span>` : ''}
            <span class="retro-resultado retro-ok">No se aplicará descuento.</span>
        </div>`;
    } else if (da === 'apelacion_rechazada') {
        analistaHtml = `<div class="retro-item">
            <span class="retro-dec retro-mal">Analista: apelación rechazada</span>
            ${resp.comentario_analista ? `<span class="retro-com">${sanitizar(resp.comentario_analista)}</span>` : ''}
            <span class="retro-resultado retro-mal">Se mantiene el descuento.</span>
        </div>`;
    } else if (da === 'derivada_comite') {
        analistaHtml = `<div class="retro-item">
            <span class="retro-dec retro-pend">Analista: derivado a Comité Técnico</span>
            ${resp.comentario_analista ? `<span class="retro-com">${sanitizar(resp.comentario_analista)}</span>` : ''}
            ${!dc ? '<span class="retro-resultado retro-pend">Pendiente resolución del Comité.</span>' : ''}
        </div>`;
        if (dc === 'confirma_falta') {
            comiteHtml = `<div class="retro-item">
                <span class="retro-dec retro-mal">Comité: confirma falta</span>
                ${resp.comentario_comite ? `<span class="retro-com">${sanitizar(resp.comentario_comite)}</span>` : ''}
                <span class="retro-resultado retro-mal">Se mantiene el descuento.</span>
            </div>`;
        } else if (dc === 'acoge_apelacion') {
            comiteHtml = `<div class="retro-item">
                <span class="retro-dec retro-ok">Comité: acoge apelación</span>
                ${resp.comentario_comite ? `<span class="retro-com">${sanitizar(resp.comentario_comite)}</span>` : ''}
                <span class="retro-resultado retro-ok">No se aplicará descuento.</span>
            </div>`;
        }
    }

    // Descuento final
    let descLabel;
    if (df !== null && df !== undefined) {
        descLabel = df === 0 ? 'Sin descuento' : `-${df} pt`;
    } else if (da === 'aprobada_auto' || da === 'apelacion_aceptada' || dc === 'acoge_apelacion') {
        descLabel = 'Sin descuento';
    } else if (da === 'apelacion_rechazada' || dc === 'confirma_falta') {
        descLabel = descuento_puntos === 0 ? 'Sin descuento' : `-${descuento_puntos} pt`;
    } else if (da === 'derivada_comite' && !dc) {
        descLabel = 'Pendiente comité';
    } else {
        descLabel = 'Pendiente analista';
    }

    return `<div class="retro-bloque">
        <strong>Retroalimentación</strong>
        ${analistaHtml}
        ${comiteHtml}
        <div class="retro-final">Descuento final: <strong>${sanitizar(descLabel)}</strong></div>
    </div>`;
}

// ── Formulario informativo ─────────────────────────────────────────
function renderFormInformativo(caso) {
    return `
    <div class="informativo-aviso">
        Este es un caso informativo. No requiere decisión de acepta/rechaza.
        Puedes agregar un comentario opcional y confirmar que lo has revisado.
    </div>
    <div class="form-group" style="margin-bottom:12px;">
        <label class="form-label">Comentario <span style="color:var(--gris);font-weight:400;">(opcional)</span></label>
        <textarea id="comentario-${caso.id}" class="form-control" rows="3" maxlength="1000"
            placeholder="Observación sobre este caso..."></textarea>
    </div>
    <button class="btn btn-primario btn-pequeño" onclick="enviarInformativo('${caso.id}')">Reconocer caso</button>
    <div id="error-${caso.id}" class="form-error oculto"></div>`;
}

// ── Formulario decisión ────────────────────────────────────────────
function renderFormDecision(caso) {
    return `
    <div class="opciones-decision">
        <label class="opcion-radio acepta">
            <input type="radio" name="dec-${caso.id}" value="acepta"> ✓ Acepta
        </label>
        <label class="opcion-radio rechaza">
            <input type="radio" name="dec-${caso.id}" value="rechaza"> ✗ Rechaza
        </label>
    </div>
    <div class="form-group" style="margin-bottom:12px;">
        <label class="form-label">Comentario
            <span id="req-label-${caso.id}" style="color:var(--rojo);font-weight:400;display:none;"> * obligatorio si rechaza</span>
        </label>
        <textarea id="comentario-${caso.id}" class="form-control" rows="3" maxlength="1000"
            placeholder="Comentario sobre su decisión..."></textarea>
    </div>
    <button class="btn btn-primario btn-pequeño" onclick="enviarDecision('${caso.id}')">Enviar respuesta</button>
    <div id="error-${caso.id}" class="form-error oculto"></div>`;
}

// ── Hint obligatorio al seleccionar rechaza ─────────────────────────
document.addEventListener('change', function(e) {
    if (e.target.type !== 'radio' || !e.target.name.startsWith('dec-')) return;
    const casoId  = e.target.name.replace('dec-', '');
    const reqLabel = document.getElementById(`req-label-${casoId}`);
    if (reqLabel) reqLabel.style.display = e.target.value === 'rechaza' ? '' : 'none';
});

// ── Enviar decisión ────────────────────────────────────────────────
async function enviarDecision(casoId) {
    if (_respondidos.has(casoId)) return;
    const radios   = document.querySelectorAll(`input[name="dec-${casoId}"]`);
    const decision = [...radios].find(r => r.checked)?.value || null;
    const comentario = document.getElementById(`comentario-${casoId}`)?.value.trim() || '';
    const errEl    = document.getElementById(`error-${casoId}`);

    errEl.classList.add('oculto');
    if (!decision) {
        errEl.textContent = 'Selecciona Acepta o Rechaza.';
        errEl.classList.remove('oculto');
        return;
    }
    if (decision === 'rechaza' && !comentario) {
        errEl.textContent = 'El comentario es obligatorio cuando rechazas.';
        errEl.classList.remove('oculto');
        return;
    }

    const btn = document.querySelector(`#card-${casoId} .btn-primario`);
    if (btn) { btn.disabled = true; btn.textContent = 'Enviando...'; }

    try {
        await api.post(`/usuario/evaluaciones/${evalId}/casos/${casoId}/responder`, {
            decision, comentario: comentario || undefined
        });
        _respondidos.add(casoId);
        mostrarToast('Respuesta registrada', 'exito');
        cargar();
    } catch(e) {
        if (e.status === 409) { mostrarToast('Ya respondiste este caso', 'warning'); cargar(); }
        else {
            errEl.textContent = e.message || 'Error al enviar. Intenta de nuevo.';
            errEl.classList.remove('oculto');
            if (btn) { btn.disabled = false; btn.textContent = 'Enviar respuesta'; }
        }
    }
}

// ── Enviar informativo ─────────────────────────────────────────────
async function enviarInformativo(casoId) {
    if (_respondidos.has(casoId)) return;
    const comentario = document.getElementById(`comentario-${casoId}`)?.value.trim() || '';
    const errEl      = document.getElementById(`error-${casoId}`);
    errEl.classList.add('oculto');

    const btn = document.querySelector(`#card-${casoId} .btn-primario`);
    if (btn) { btn.disabled = true; btn.textContent = 'Enviando...'; }

    try {
        await api.post(`/usuario/evaluaciones/${evalId}/casos/${casoId}/responder`, {
            comentario: comentario || undefined
        });
        _respondidos.add(casoId);
        mostrarToast('Caso informativo reconocido', 'exito');
        cargar();
    } catch(e) {
        if (e.status === 409) { mostrarToast('Ya reconociste este caso', 'warning'); cargar(); }
        else {
            errEl.textContent = e.message || 'Error al enviar.';
            errEl.classList.remove('oculto');
            if (btn) { btn.disabled = false; btn.textContent = 'Reconocer caso'; }
        }
    }
}

// ── Video inline ───────────────────────────────────────────────────
// ── YouTube IFrame API — detección de bloqueo embebido (errores 101/150) ──
(function() {
    if (document.querySelector('script[src*="youtube.com/iframe_api"]')) return;
    var s = document.createElement('script'); s.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(s);
})();
window._ytCallbacks = window._ytCallbacks || [];
window.onYouTubeIframeAPIReady = function() {
    window._ytApiReady = true;
    (window._ytCallbacks || []).forEach(function(cb) { try { cb(); } catch(e) {} });
    window._ytCallbacks = [];
};
function _ytExtraerId(url) {
    if (!url || !/^https?:\/\//i.test(url)) return null;
    try {
        const u = new URL(url);
        let vid = null, start = 0;
        if (u.hostname === 'youtu.be') {
            vid = u.pathname.slice(1).split('/')[0] || null;
            const t = u.searchParams.get('t') || u.searchParams.get('start');
            if (t) start = parseInt(t, 10) || 0;
        } else if (/youtube\.com$/i.test(u.hostname)) {
            vid = u.pathname.startsWith('/embed/')
                ? u.pathname.split('/embed/')[1].split('/')[0]
                : u.searchParams.get('v');
            const t = u.searchParams.get('t') || u.searchParams.get('start');
            if (t) start = parseInt(t, 10) || 0;
        }
        if (!vid) return null;
        return { id: vid.split('?')[0].split('&')[0], start: start };
    } catch(_) { return null; }
}
function _ytFallbackInlineHtml(url) {
    const e = String(url).replace(/&/g, '&amp;').replace(/"/g, '&quot;');
    return '<div class="video-inline-fallback" style="background:#fef9e7;border:1px solid #f0a500;padding:16px;border-radius:6px;">'
        + '<p style="margin:0 0 8px;font-size:13px;font-weight:600;color:#7d4e00;">Video no disponible para reproducción embebida</p>'
        + '<p style="margin:0 0 12px;font-size:12px;color:#7d4e00;">YouTube o el propietario del contenido bloqueó la reproducción de este video dentro del sistema.</p>'
        + '<div style="display:flex;gap:8px;flex-wrap:wrap;">'
        + '<a href="' + e + '" target="_blank" rel="noopener noreferrer" class="btn btn-primario btn-pequeño">Abrir en YouTube ↗</a>'
        + '<button class="btn btn-secundario btn-pequeño" data-ytcopy="' + e + '" onclick="_ytCopiarEnlace(this)">Copiar enlace</button>'
        + '</div></div>';
}
function _ytLinkFallback(url) {
    const e = String(url).replace(/&/g, '&amp;').replace(/"/g, '&quot;');
    return '<div style="padding:3px 0 6px;font-size:11px;color:var(--gris);">'
        + '¿No carga el video? <a href="' + e + '" target="_blank" rel="noopener noreferrer" style="color:#1a5276;">Abrir en YouTube ↗</a></div>';
}
function _ytCopiarEnlace(btn) {
    const url = btn.getAttribute('data-ytcopy') || '';
    if (!url) return;
    if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(url).then(function() {
            const o = btn.textContent; btn.textContent = '✓ Copiado';
            setTimeout(function() { btn.textContent = o; }, 2000);
        }).catch(function() { prompt('Copia este enlace:', url); });
    } else { prompt('Copia este enlace:', url); }
}
function _ytCrearPlayer(wrap, cid, url, yt, iframeStyle) {
    const style = iframeStyle || 'width:100%;aspect-ratio:16/9;border:none;display:block;';
    function init() {
        if (!document.getElementById(cid)) return;
        new YT.Player(cid, {
            videoId: yt.id,
            playerVars: { autoplay: 0, rel: 0, start: yt.start || 0, modestbranding: 1 },
            events: {
                onReady: function(ev) { ev.target.getIframe().style.cssText = style; },
                onError: function(ev) {
                    if (ev.data === 101 || ev.data === 150) { wrap.innerHTML = _ytFallbackInlineHtml(url); }
                }
            }
        });
    }
    if (window.YT && window.YT.Player) { init(); }
    else { (window._ytCallbacks = window._ytCallbacks || []).push(init); }
}

function toggleVideo(casoId) {
    const wrap = document.getElementById('video-' + casoId);
    const btn  = document.getElementById('btn-video-' + casoId);
    if (!wrap || !btn) return;
    const url = wrap.dataset.url || '';
    const visible = !wrap.classList.contains('oculto');
    if (visible) {
        wrap.innerHTML = '';
        wrap.classList.add('oculto');
        btn.textContent = '▶ Ver video';
    } else {
        wrap.innerHTML = '';
        const yt = _ytExtraerId(url);
        if (yt) {
            const cid = 'yt-p-' + (window._ytNextId = (window._ytNextId || 0) + 1);
            const ratio = document.createElement('div');
            ratio.className = 'video-inline-ratio';
            ratio.innerHTML = '<div id="' + cid + '" style="position:absolute;inset:0;"></div>';
            wrap.appendChild(ratio);
            wrap.insertAdjacentHTML('beforeend', _ytLinkFallback(url));
            _ytCrearPlayer(wrap, cid, url, yt, 'position:absolute;inset:0;width:100%;height:100%;border:none;');
        } else if (url) {
            const fb = document.createElement('div');
            fb.className = 'video-inline-fallback';
            const a = document.createElement('a');
            a.href = url; a.target = '_blank'; a.rel = 'noopener';
            a.textContent = 'Abrir video en nueva pestaña ↗';
            fb.appendChild(a);
            wrap.appendChild(fb);
        }
        wrap.classList.remove('oculto');
        btn.textContent = '▼ Ocultar video';
    }
}
</script>
