<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rendir Prueba — Sistema de Jurados</title>
    <link rel="icon" type="image/png" href="/assets/logo_V2.png">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body.bloqueado { user-select: none; }

        .prueba-header {
            background: #fff;
            border-bottom: 1px solid var(--gris-borde);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .prueba-titulo-hdr { font-size: 15px; font-weight: 700; }

        .timer-box {
            font-size: 20px;
            font-weight: 800;
            padding: 4px 16px;
            border-radius: 8px;
            background: #f0f0f0;
            color: var(--texto);
            min-width: 64px;
            text-align: center;
        }
        .timer-box.urgente { background: #fadbd8; color: #922b21; animation: parpadeo .7s infinite; }
        @keyframes parpadeo { 0%,100%{opacity:1} 50%{opacity:.5} }

        .progreso-bar {
            height: 6px;
            background: var(--gris-borde);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 24px;
        }
        .progreso-fill { height: 100%; background: var(--primario); transition: width .3s; }
        .progreso-label { font-size: 12px; color: var(--gris); margin-bottom: 6px; }

        .pregunta-box { max-width: 700px; margin: 0 auto; }
        .pregunta-num-lbl {
            font-size: 12px; font-weight: 700;
            text-transform: uppercase; letter-spacing: .5px;
            color: var(--gris); margin-bottom: 8px;
        }
        .pregunta-enunciado-lbl {
            font-size: 18px; font-weight: 600;
            line-height: 1.5; margin-bottom: 20px;
        }
        .video-preg {
            width: 100%;
            max-width: 820px;
            aspect-ratio: 16 / 9;
            margin: 12px auto 18px auto;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
        }
        .video-preg iframe {
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
        }
        @media (max-width: 900px) {
            .video-preg { max-width: 100%; }
        }
        .imagen-preg {
            width: 100%;
            max-width: 820px;
            margin: 12px auto 18px auto;
            border-radius: 10px;
            overflow: hidden;
            background: #f3f4f6;
            border: 1px solid #d9e0e8;
        }
        .imagen-preg img {
            width: 100%;
            max-height: 480px;
            object-fit: contain;
            display: block;
        }

        .alt-btn {
            display: flex; align-items: flex-start; gap: 14px;
            padding: 14px 16px;
            border: 2px solid var(--gris-borde); border-radius: 10px;
            background: #fff; cursor: pointer;
            margin-bottom: 10px; text-align: left; width: 100%;
            font-size: 14px; transition: border-color .15s, background .15s;
        }
        .alt-btn:hover:not([disabled]) { border-color: var(--primario); background: #f0f4ff; }
        .alt-btn.seleccionada { border-color: var(--primario); background: #e8f0fe; }
        .alt-btn[disabled]    { cursor: not-allowed; opacity: .7; }
        .alt-letra {
            width: 28px; height: 28px; border-radius: 50%;
            border: 2px solid currentColor;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 13px; flex-shrink: 0; color: var(--gris);
        }
        .alt-btn.seleccionada .alt-letra { color: var(--primario); border-color: var(--primario); }
        .alt-texto { flex: 1; padding-top: 3px; }

        /* Paginación — solo visual, sin interacción */
        .paginacion { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; }
        .pag-dot {
            width: 28px; height: 28px; border-radius: 6px;
            border: 1px solid var(--gris-borde); background: #fff;
            font-size: 11px; font-weight: 600;
            display: flex; align-items: center; justify-content: center;
            color: var(--gris);
        }
        .pag-dot.respondida  { background: #d5f5e3; border-color: #1e8449; color: #1e8449; }
        .pag-dot.actual      { border-color: var(--primario); color: var(--primario); font-weight: 800; }

        .nav-pregunta {
            display: flex; justify-content: flex-end;
            align-items: center; margin-top: 28px;
        }

        .timer-pregunta {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 140px;
            padding: 8px 14px;
            border-radius: 10px;
            background: #eef4ff;
            border: 1px solid #b9cbea;
            color: #183b66;
            font-weight: 700;
            font-size: 14px;
            flex-shrink: 0;
        }
        .timer-pregunta.urgente {
            background: #ffe8e8;
            border-color: #e57373;
            color: #b00020;
            animation: parpadeo .7s infinite;
        }

        .aviso-avance {
            background: #fef9e7; border: 1px solid #f1c40f;
            border-radius: 8px; padding: 10px 14px;
            font-size: 13px; color: #7d6608;
            margin-bottom: 14px; text-align: center;
        }

        /* Modal de confirmación de salida */
        .modal-salida-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.65);
            display: flex; align-items: center; justify-content: center;
            z-index: 9999;
        }
        .modal-salida {
            background: #fff; border-radius: 12px;
            padding: 32px 28px; max-width: 440px; width: 92%;
            text-align: center;
            box-shadow: 0 12px 40px rgba(0,0,0,0.22);
        }
        .modal-salida-icono { font-size: 36px; margin-bottom: 12px; }
        .modal-salida h3 {
            font-size: 17px; font-weight: 800;
            margin-bottom: 12px; color: #7d0000;
        }
        .modal-salida p {
            font-size: 13px; color: #555;
            line-height: 1.65; margin-bottom: 24px;
        }
        .modal-salida-acciones {
            display: flex; gap: 10px;
            justify-content: center; flex-wrap: wrap;
        }
        .btn-salir-confirmar {
            background: #fadbd8; color: #922b21;
            border: 1px solid #e8c0bb;
            padding: 9px 18px; border-radius: 8px;
            font-size: 13px; font-weight: 600; cursor: pointer;
        }
        .btn-salir-confirmar:disabled { opacity: .6; cursor: not-allowed; }
    </style>
</head>
<body class="bloqueado" oncontextmenu="return false;">

<!-- Cargando -->
<div id="cargando" style="display:flex;align-items:center;justify-content:center;min-height:100vh;">
    <div class="alerta alerta-info" style="font-size:14px;">Cargando prueba…</div>
</div>

<!-- Contenedor principal -->
<div id="contenedor-prueba" style="display:none;min-height:100vh;background:#f8f9fb;">

    <div class="prueba-header">
        <span class="prueba-titulo-hdr" id="hdr-titulo">—</span>
        <div style="display:flex;align-items:center;gap:14px;">
            <span style="font-size:13px;color:var(--gris);" id="hdr-progreso"></span>
            <div id="timer-box" class="timer-box" style="display:none;"></div>
        </div>
    </div>

    <!-- Pantalla de instrucciones -->
    <div id="pantalla-instrucciones" style="display:none;padding:24px 20px;max-width:700px;margin:0 auto;">
        <div class="card">
            <div style="text-align:center;margin-bottom:16px;">
                <div style="font-size:20px;font-weight:800;margin-bottom:6px;" id="instr-titulo"></div>
                <div id="instr-descripcion" style="font-size:14px;color:var(--gris);display:none;"></div>
            </div>
            <div id="instr-datos" style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-bottom:18px;"></div>
            <div id="instr-texto" style="display:none;">
                <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--gris);margin-bottom:8px;">Instrucciones</div>
                <div id="instr-contenido" style="font-size:14px;line-height:1.7;white-space:pre-wrap;border:1px solid var(--gris-borde);border-radius:8px;padding:14px 16px;background:#f8f9fb;"></div>
            </div>
            <div style="text-align:center;margin-top:24px;">
                <button class="btn btn-primario" style="padding:12px 32px;font-size:16px;" onclick="comenzarPrueba()">Comenzar prueba →</button>
            </div>
        </div>
    </div>

    <!-- Zona de preguntas -->
    <div id="zona-preguntas" style="display:none;padding:24px 20px;max-width:760px;margin:0 auto;">
        <div class="progreso-label" id="progreso-label"></div>
        <div class="progreso-bar"><div class="progreso-fill" id="progreso-fill" style="width:0%"></div></div>

        <!-- Paginación: solo indicador visual, sin onclick -->
        <div class="paginacion" id="paginacion"></div>

        <div class="pregunta-box" id="pregunta-box"></div>
    </div>
</div>

<!-- ═══ Modal de confirmación de salida ══════════════════════════════════════ -->
<div id="modal-salida" class="modal-salida-overlay" style="display:none;">
    <div class="modal-salida">
        <div class="modal-salida-icono">⚠️</div>
        <h3>¿Salir de la prueba?</h3>
        <p>
            Estás respondiendo una prueba. Si sales, vuelves atrás, recargas o cierras
            esta página, <strong>la prueba se finalizará</strong> y las preguntas no
            respondidas quedarán como incorrectas.
        </p>
        <div class="modal-salida-acciones">
            <button class="btn btn-primario" onclick="cerrarModalSalida()">
                Cancelar y continuar respondiendo
            </button>
            <button class="btn-salir-confirmar" id="btn-confirmar-salida" onclick="abandonarYSalir()">
                Salir y finalizar prueba
            </button>
        </div>
    </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script>
// ─── Estado global ────────────────────────────────────────────────────────────
var _intentoId            = null;
var _preguntas            = [];
var _respuestas           = {};   // pregunta_id → alternativa_id
var _actual               = 0;
var _timerInterval        = null;
var _timerSegRestantes    = 0;
var _tiempoPorPregunta    = 0;    // segundos por pregunta (0 = sin límite)
var _enviando             = false;
var _asigId               = null;
var _preguntaBloqueada    = false; // impide doble-click durante avance

// Protección de salida
var _pruebaActiva       = false; // true solo mientras el jurado está respondiendo preguntas
var _enviandoAbandono   = false; // guard contra doble acción en modal de salida
var _modalSalidaVisible = false;

// ─── Init ─────────────────────────────────────────────────────────────────────

protegerRuta('usuario_pagado');
if (!api.getUsuario()) {
    api.cerrarSesion();
} else {
    var _params = new URLSearchParams(window.location.search);
    _asigId = _params.get('id');
    if (!_asigId) { window.location.href = '/usuario/capacitaciones.html'; }
    else { iniciarPrueba(); }
}

async function iniciarPrueba() {
    try {
        var data = await api.get('/usuario/capacitaciones/' + _asigId + '/iniciar');
        _intentoId         = data.intento_id;
        _preguntas         = data.preguntas || [];
        _tiempoPorPregunta = data.prueba.tiempo_por_pregunta_segundos || 0;

        _preguntas.forEach(function (p) {
            _respuestas[p.id] = p.respuesta_guardada || null;
        });

        document.getElementById('hdr-titulo').textContent = data.prueba.titulo;
        document.title = data.prueba.titulo;

        document.getElementById('cargando').style.display    = 'none';
        document.getElementById('contenedor-prueba').style.display = '';

        var prueba = data.prueba;
        if (prueba.instrucciones || prueba.descripcion) {
            mostrarInstrucciones(prueba, data.total_preguntas || _preguntas.length);
        } else {
            comenzarPrueba();
        }
    } catch (err) {
        document.getElementById('cargando').innerHTML =
            '<div class="alerta alerta-error" style="font-size:14px;">'
            + sanitizar(err.message || 'No se pudo cargar la prueba')
            + '<br><a href="/usuario/capacitaciones.html">Volver</a></div>';
    }
}

function mostrarInstrucciones(prueba, totalPreguntas) {
    document.getElementById('instr-titulo').textContent = prueba.titulo || '';
    var divDesc = document.getElementById('instr-descripcion');
    if (prueba.descripcion) {
        divDesc.textContent   = prueba.descripcion;
        divDesc.style.display = '';
    } else {
        divDesc.style.display = 'none';
    }

    var datos = [];
    datos.push('<div style="text-align:center;padding:10px 18px;background:#eef4ff;border-radius:8px;min-width:90px;">'
        + '<div style="font-size:24px;font-weight:800;">' + totalPreguntas + '</div>'
        + '<div style="font-size:11px;color:var(--gris);font-weight:600;text-transform:uppercase;">Preguntas</div>'
        + '</div>');
    if (prueba.tiempo_por_pregunta_segundos) {
        var t    = prueba.tiempo_por_pregunta_segundos;
        var tStr = t >= 60
            ? Math.floor(t / 60) + ' min' + (t % 60 > 0 ? ' ' + (t % 60) + 's' : '')
            : t + 's';
        datos.push('<div style="text-align:center;padding:10px 18px;background:#eef4ff;border-radius:8px;min-width:90px;">'
            + '<div style="font-size:24px;font-weight:800;">' + tStr + '</div>'
            + '<div style="font-size:11px;color:var(--gris);font-weight:600;text-transform:uppercase;">Por pregunta</div>'
            + '</div>');
    }
    document.getElementById('instr-datos').innerHTML = datos.join('');

    if (prueba.instrucciones) {
        document.getElementById('instr-contenido').textContent = prueba.instrucciones;
        document.getElementById('instr-texto').style.display   = '';
    } else {
        document.getElementById('instr-texto').style.display = 'none';
    }

    document.getElementById('pantalla-instrucciones').style.display = '';
    document.getElementById('zona-preguntas').style.display = 'none';
}

function comenzarPrueba() {
    document.getElementById('pantalla-instrucciones').style.display = 'none';
    document.getElementById('zona-preguntas').style.display = '';
    _pruebaActiva = true;
    // Empujar un estado extra al historial para poder interceptar el botón "Atrás"
    history.pushState({ enPrueba: true }, '', window.location.href);
    mostrarPregunta(0);
}

// ─── Timer POR PREGUNTA ───────────────────────────────────────────────────────

function detenerTimer() {
    if (_timerInterval) {
        clearInterval(_timerInterval);
        _timerInterval = null;
    }
    document.getElementById('timer-box').style.display = 'none';
}

function iniciarTimerPregunta() {
    detenerTimer();
    if (!_tiempoPorPregunta) return;  // sin límite

    _timerSegRestantes = _tiempoPorPregunta;
    document.getElementById('timer-box').style.display = '';
    actualizarDisplayTimer();

    _timerInterval = setInterval(function () {
        _timerSegRestantes--;
        actualizarDisplayTimer();

        if (_timerSegRestantes <= 0) {
            detenerTimer();
            tiempoAgotado();
        }
    }, 1000);
}

function actualizarDisplayTimer() {
    var seg     = Math.max(_timerSegRestantes, 0);
    var urgente = seg <= 10;
    var mm      = String(Math.floor(seg / 60)).padStart(2, '0');
    var ss      = String(seg % 60).padStart(2, '0');

    var box = document.getElementById('timer-box');
    box.textContent = seg + 's';
    box.className   = 'timer-box' + (urgente ? ' urgente' : '');

    var tp = document.getElementById('timer-pregunta');
    if (tp) {
        tp.textContent = 'Tiempo restante: ' + mm + ':' + ss;
        tp.className   = 'timer-pregunta' + (urgente ? ' urgente' : '');
    }
}

async function tiempoAgotado() {
    if (_enviando || _preguntaBloqueada) return;
    _preguntaBloqueada = true;

    var p = _preguntas[_actual];
    // Registrar como no respondida si no tiene respuesta
    if (!_respuestas[p.id]) {
        try {
            await api.post('/usuario/capacitaciones/intentos/' + _intentoId + '/responder', {
                pregunta_id:    p.id,
                alternativa_id: null
            });
        } catch (e) { /* continúa aunque falle la red */ }
    }

    avanzarSiguiente();
}

// ─── Render pregunta ──────────────────────────────────────────────────────────

function youtubeEmbed(url, muted) {
    if (!url) return null;
    url = url.trim();
    var idMatch = url.match(/(?:youtube\.com\/(?:watch\?.*v=|embed\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
    if (!idMatch) return null;
    var videoId  = idMatch[1];
    var startSec = 0;
    // start= (formato embed)
    var startMatch = url.match(/[?&]start=(\d+)/);
    if (startMatch) {
        startSec = parseInt(startMatch[1], 10);
    } else {
        // t= (formatos watch y youtu.be): 90, 120s, 2m30s, 1h30m20s
        var tMatch = url.match(/[?&]t=([0-9hms]+)/);
        if (tMatch) {
            var parts = tMatch[1].match(/^(?:(\d+)h)?(?:(\d+)m)?(?:(\d+)s?)?$/);
            if (parts) {
                startSec = (parseInt(parts[1] || 0) * 3600)
                         + (parseInt(parts[2] || 0) * 60)
                         +  parseInt(parts[3] || 0);
            }
        }
    }
    var params = [];
    if (startSec > 0) params.push('start=' + startSec);
    if (muted)        params.push('mute=1');
    return 'https://www.youtube-nocookie.com/embed/' + videoId
         + (params.length > 0 ? '?' + params.join('&') : '');
}

function mostrarPregunta(idx) {
    _actual            = idx;
    _preguntaBloqueada = false;
    var total = _preguntas.length;
    var pct   = total > 0 ? Math.round((respondidas() / total) * 100) : 0;

    document.getElementById('hdr-progreso').textContent  = 'Pregunta ' + (idx + 1) + ' de ' + total;
    document.getElementById('progreso-label').textContent = respondidas() + ' de ' + total + ' respondidas (' + pct + '%)';
    document.getElementById('progreso-fill').style.width  = pct + '%';

    renderPaginacion();

    var p = _preguntas[idx];
    var letras = ['A','B','C','D','E','F','G','H'];

    // Video de la pregunta
    var videoHtml = '';
    var embedSrc  = youtubeEmbed(p.video_url, p.video_sin_audio);
    if (embedSrc) {
        videoHtml = '<div class="video-preg"><iframe src="' + embedSrc + '" allowfullscreen></iframe></div>';
    }

    // Imagen de la pregunta
    var imagenHtml = '';
    if (p.imagen_url && (p.tipo === 'imagen_alternativas' || p.tipo === 'verdadero_falso_imagen')) {
        imagenHtml = '<div class="imagen-preg"><img src="' + sanitizar(p.imagen_url) + '" alt="Imagen de la pregunta" onerror="this.parentElement.style.display=\'none\'"></div>';
    }

    var altsHtml = (p.alternativas || []).map(function (a, i) {
        var sel = _respuestas[p.id] === a.id;
        return '<button class="alt-btn' + (sel ? ' seleccionada' : '') + '" onclick="responder(\'' + p.id + '\',\'' + a.id + '\')">'
            + '<span class="alt-letra">' + (letras[i] || i + 1) + '</span>'
            + '<span class="alt-texto">' + sanitizar(a.texto) + '</span>'
            + '</button>';
    }).join('');

    var esUltima         = idx === total - 1;
    var todasRespondidas = respondidas() === total;

    // Botón de avance — nunca hay botón "Anterior"
    var btnAvance = '';
    if (!esUltima) {
        btnAvance = '<button class="btn btn-primario" onclick="avanzarSiguiente()">Siguiente →</button>';
    } else {
        btnAvance = '<button class="btn btn-primario" onclick="finalizarPrueba(false)" id="btn-finalizar">'
            + (todasRespondidas ? 'Finalizar y enviar' : 'Omitir restantes y finalizar')
            + '</button>';
    }

    document.getElementById('pregunta-box').innerHTML =
        '<div style="display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:8px;">'
        + '<div class="pregunta-num-lbl" style="margin-bottom:0;">Pregunta ' + (idx + 1) + ' de ' + total + '</div>'
        + (_tiempoPorPregunta ? '<div id="timer-pregunta" class="timer-pregunta">—</div>' : '')
        + '</div>'
        + imagenHtml
        + videoHtml
        + '<div class="pregunta-enunciado-lbl">' + sanitizar(p.enunciado) + '</div>'
        + '<div>' + altsHtml + '</div>'
        + '<div class="nav-pregunta">' + btnAvance + '</div>';

    // Iniciar timer al mostrar la pregunta
    iniciarTimerPregunta();
}

function renderPaginacion() {
    // Solo visual: sin onclick
    var html = _preguntas.map(function (p, i) {
        var resp = _respuestas[p.id] !== null && _respuestas[p.id] !== undefined;
        var cls  = 'pag-dot' + (resp ? ' respondida' : '') + (i === _actual ? ' actual' : '');
        return '<div class="' + cls + '">' + (i + 1) + '</div>';
    }).join('');
    document.getElementById('paginacion').innerHTML = html;
}

function respondidas() {
    return _preguntas.filter(function (p) { return _respuestas[p.id] != null; }).length;
}

// ─── Avanzar — solo hacia adelante ───────────────────────────────────────────

function avanzarSiguiente() {
    detenerTimer();
    // Si el jurado no seleccionó nada, registrar como no respondida (fire-and-forget)
    var p = _preguntas[_actual];
    if (p && !_respuestas[p.id] && _intentoId) {
        api.post('/usuario/capacitaciones/intentos/' + _intentoId + '/responder', {
            pregunta_id:    p.id,
            alternativa_id: null
        }).catch(function () {});
    }
    var total = _preguntas.length;
    if (_actual < total - 1) {
        mostrarPregunta(_actual + 1);
    } else {
        finalizarPrueba(false);
    }
}

// ─── Guardar respuesta ────────────────────────────────────────────────────────

async function responder(preguntaId, alternativaId) {
    if (_preguntaBloqueada) return;

    _respuestas[preguntaId] = alternativaId;
    // Actualizar UI de inmediato
    renderPaginacion();
    // Resaltar alternativa seleccionada sin redibujar todo
    document.querySelectorAll('.alt-btn').forEach(function (btn) {
        btn.classList.remove('seleccionada');
    });
    var idx = _preguntas.findIndex(function (p) { return p.id === preguntaId; });
    if (idx >= 0) {
        var alts = _preguntas[idx].alternativas || [];
        var altIdx = alts.findIndex(function (a) { return a.id === alternativaId; });
        var btns   = document.querySelectorAll('.alt-btn');
        if (btns[altIdx]) btns[altIdx].classList.add('seleccionada');
    }

    try {
        await api.post('/usuario/capacitaciones/intentos/' + _intentoId + '/responder', {
            pregunta_id:    preguntaId,
            alternativa_id: alternativaId
        });
    } catch (err) {
        console.error('[rendir] error guardando respuesta:', err);
    }

    // Actualizar texto del botón Finalizar si estamos en la última pregunta
    if (_actual === _preguntas.length - 1) {
        var btn = document.getElementById('btn-finalizar');
        if (btn) {
            var allAnswered = _preguntas.every(function (p) { return _respuestas[p.id] != null; });
            btn.textContent = allAnswered ? 'Finalizar y enviar' : 'Omitir restantes y finalizar';
        }
    }
}

// ─── Modal de salida / abandono ──────────────────────────────────────────────

function mostrarModalSalida() {
    if (_modalSalidaVisible) return;
    _modalSalidaVisible = true;
    var btn = document.getElementById('btn-confirmar-salida');
    if (btn) { btn.disabled = false; btn.textContent = 'Salir y finalizar prueba'; }
    document.getElementById('modal-salida').style.display = 'flex';
}

function cerrarModalSalida() {
    _modalSalidaVisible = false;
    document.getElementById('modal-salida').style.display = 'none';
}

async function abandonarYSalir() {
    if (_enviandoAbandono || !_intentoId) return;
    _enviandoAbandono = true;

    var btn = document.getElementById('btn-confirmar-salida');
    if (btn) { btn.disabled = true; btn.textContent = 'Finalizando…'; }

    _pruebaActiva = false; // desactivar protección ANTES de navegar
    detenerTimer();

    try {
        await api.post('/usuario/capacitaciones/intentos/' + _intentoId + '/abandonar', {});
        window.location.href = '/usuario/capacitacion-resultado.html?id=' + _intentoId;
    } catch (err) {
        // Si falla, re-activar la prueba para que el jurado pueda continuar
        _enviandoAbandono = false;
        _pruebaActiva     = true;
        cerrarModalSalida();
        iniciarTimerPregunta();
        mostrarToast(err.message || 'Error al finalizar. Puedes continuar respondiendo.', 'error');
    }
}

// ─── Finalizar ────────────────────────────────────────────────────────────────

async function finalizarPrueba(porTiempo) {
    if (_enviando) return;

    detenerTimer();

    var sinResponder = _preguntas.length - respondidas();
    if (!porTiempo && sinResponder > 0) {
        var ok = confirm('Tienes ' + sinResponder + ' pregunta(s) sin responder. ¿Finalizar de todas formas?');
        if (!ok) {
            // Reanudar timer si el usuario cancela en la última pregunta
            iniciarTimerPregunta();
            return;
        }
    }

    _enviando     = true;
    _pruebaActiva = false; // desactivar protección ANTES de navegar
    var btn = document.getElementById('btn-finalizar');
    if (btn) { btn.disabled = true; btn.textContent = 'Enviando…'; }

    try {
        await api.post('/usuario/capacitaciones/intentos/' + _intentoId + '/finalizar', {});
        window.location.href = '/usuario/capacitacion-resultado.html?id=' + _intentoId;
    } catch (err) {
        _enviando     = false;
        _pruebaActiva = true; // re-activar si falla el envío
        if (btn) { btn.disabled = false; btn.textContent = 'Finalizar y enviar'; }
        mostrarToast(err.message || 'Error al enviar la prueba', 'error');
    }
}
// ─── Protección de salida ─────────────────────────────────────────────────────

// Interceptar botón "Atrás" del navegador
window.addEventListener('popstate', function () {
    if (!_pruebaActiva) return;
    // Volver a empujar el estado para que la URL no cambie
    history.pushState({ enPrueba: true }, '', window.location.href);
    mostrarModalSalida();
});

// Interceptar recarga de página y cierre de pestaña
window.addEventListener('beforeunload', function (e) {
    if (!_pruebaActiva) return;
    e.preventDefault();
    e.returnValue = ''; // requerido por Chrome/Edge para mostrar el diálogo nativo
    return '';
});

// sendBeacon al cerrar/recargar: finalizar en backend si el usuario confirma salir
// pagehide es más confiable que beforeunload para esto
document.addEventListener('pagehide', function (e) {
    if (!_pruebaActiva || !_intentoId) return;
    // e.persisted=true significa que la página va al bfcache (se puede restaurar)
    // En ese caso no finalizamos. En la práctica no ocurre porque beforeunload
    // devuelve valor (lo que deshabilita bfcache en los navegadores modernos).
    if (e.persisted) return;
    var token = api.getToken();
    if (!token) return;
    var url = '/api/usuario/capacitaciones/intentos/' + _intentoId
            + '/abandonar?t=' + encodeURIComponent(token);
    if (navigator.sendBeacon) {
        navigator.sendBeacon(url, new Blob(['{}'], { type: 'application/json' }));
    }
});
</script>
