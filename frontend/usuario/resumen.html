<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Pagos — Sistema de Jurados</title>
    <link rel="icon" type="image/png" href="/assets/logo_V2.png">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="layout">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo"><img src="/assets/logo_V2.png" alt="Federación del Rodeo Chileno" style="width:72px; height:72px; object-fit:contain; margin-bottom:6px;"><h2>Sistema de Jurados</h2></div>
        <nav class="sidebar-nav">
            <a href="/usuario/dashboard.html" class="nav-item"><span class="icon">🏠</span> Mi Panel</a>
            <a href="/usuario/resumen.html" class="nav-item activo"><span class="icon">💵</span> Mis Pagos</a>
            <a href="/usuario/perfil.html" class="nav-item"><span class="icon">👤</span> Mi Perfil</a>
        </nav>
        <div class="sidebar-footer">
            <div class="sidebar-usuario" id="nombre-usr"></div>
            <button class="btn btn-secundario btn-pequeño w-100" onclick="api.cerrarSesion()">Cerrar Sesión</button>
        </div>
    </aside>

    <div class="main-content">
        <div class="topbar">
            <div class="flex items-center gap-12">
                <button class="btn-menu-movil" onclick="document.getElementById('sidebar').classList.toggle('abierto')">☰</button>
                <h1>Mis Pagos</h1>
            </div>
        </div>

        <div class="page-body">

            <!-- Navegación mes -->
            <div class="resumen-header">
                <div>
                    <div class="resumen-mes-titulo" id="titulo-mes">Cargando...</div>
                    <div style="font-size:13px; opacity:0.8;" id="subtitulo-rodeos"></div>
                </div>
                <div class="resumen-nav">
                    <button class="btn btn-secundario btn-pequeño" id="btn-anterior" onclick="navegarMes(-1)">‹ Mes anterior</button>
                    <button class="btn btn-secundario btn-pequeño" id="btn-siguiente" onclick="navegarMes(1)">Mes siguiente ›</button>
                </div>
            </div>

            <!-- Totales -->
            <div class="resumen-totales" id="totales">
                <div class="spinner-wrap"><div class="spinner"></div></div>
            </div>

            <!-- Alerta informativa -->
            <div class="alerta alerta-info" style="margin-bottom:20px;">
                <div>
                    <strong>Información:</strong> Los montos mostrados son de referencia para que emita su boleta de honorarios en el SII.
                    Solo los bonos <strong>aprobados</strong> se incluyen en el total líquido.
                </div>
            </div>

            <!-- Tabla de asignaciones -->
            <div class="card">
                <div class="card-titulo">🏆 Detalle de rodeos</div>
                <div id="tabla-asignaciones" class="tabla-wrap">
                    <div class="spinner-wrap"><div class="spinner"></div></div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal solicitar bono -->
<div class="modal-overlay oculto" id="modal-overlay">
<div class="modal" style="max-width:460px;">
    <div class="modal-header">
        <h3>Solicitar bono por distancia</h3>
        <button class="modal-cerrar" onclick="cerrarModal()">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
</div>
</div>

<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script>
protegerRuta('usuario_pagado');
document.getElementById('nombre-usr').textContent = api.getUsuario()?.nombre || '';

const ahora = new Date();
let añoActual = ahora.getFullYear();
let mesActual = ahora.getMonth() + 1;

let bonosConfig = [];

async function init() {
    try {
        bonosConfig = await api.get('/usuario/bonos/config-activos') || [];
    } catch(e) { bonosConfig = []; }

    // Auto-navegar al mes más reciente con datos (evita mostrar mes vacío por defecto)
    try {
        const meses = await api.get('/usuario/resumen/meses-disponibles');
        if (meses && meses.length > 0) {
            añoActual = meses[0].año;
            mesActual = meses[0].mes;
        }
    } catch(e) { /* usar mes actual si falla */ }

    cargarResumen();
}

async function cargarResumen() {
    document.getElementById('titulo-mes').textContent = `${nombreMes(mesActual)} ${añoActual}`;

    // Deshabilitar "siguiente" si ya estamos en el mes actual
    const hoy = new Date();
    const esActual = añoActual === hoy.getFullYear() && mesActual === hoy.getMonth() + 1;
    document.getElementById('btn-siguiente').disabled = esActual;

    mostrarSpinner(document.getElementById('totales'));
    mostrarSpinner(document.getElementById('tabla-asignaciones'));

    try {
        const r = await api.get(`/usuario/resumen?año=${añoActual}&mes=${mesActual}`);
        renderTotales(r);
        renderAsignaciones(r.asignaciones || []);
        document.getElementById('subtitulo-rodeos').textContent = `${r.asignaciones?.length || 0} rodeo(s) registrado(s)`;
    } catch(err) {
        mostrarError(err);
    }
}

function navegarMes(delta) {
    mesActual += delta;
    if (mesActual > 12) { mesActual = 1; añoActual++; }
    if (mesActual < 1)  { mesActual = 12; añoActual--; }
    cargarResumen();
}

function renderTotales(r) {
    const pendientes = (r.asignaciones || []).filter(a => a.estado_designacion === 'pendiente').length;
    const rechazadas = (r.asignaciones || []).filter(a => a.estado_designacion === 'rechazado').length;
    document.getElementById('totales').innerHTML = `
        <div class="total-card">
            <div class="valor">${formatCLP(r.total_pago_base)}</div>
            <div class="etiqueta">Pago base total</div>
        </div>
        <div class="total-card">
            <div class="valor">${formatCLP(r.total_bono_aprobado)}</div>
            <div class="etiqueta">Bonos aprobados</div>
        </div>
        <div class="total-card">
            <div class="valor">${formatCLP(r.bruto)}</div>
            <div class="etiqueta">Total bruto</div>
        </div>
        ${pendientes > 0 ? `<div class="total-card" style="border-color:#f39c12;">
            <div class="valor" style="color:#f39c12;">${pendientes}</div>
            <div class="etiqueta">Designación(es) pendiente(s)</div>
        </div>` : ''}
        ${rechazadas > 0 ? `<div class="total-card" style="border-color:#e74c3c;">
            <div class="valor" style="color:#e74c3c;">${rechazadas}</div>
            <div class="etiqueta">Designación(es) rechazada(s)</div>
        </div>` : ''}`;
}

function renderAsignaciones(asignaciones) {
    const div = document.getElementById('tabla-asignaciones');
    if (!asignaciones || asignaciones.length === 0) {
        div.innerHTML = '<p class="tabla-vacia">Sin rodeos registrados en este período</p>';
        return;
    }

    div.innerHTML = `<table>
        <thead><tr>
            <th>Fecha</th>
            <th>Club</th>
            <th>Asociación</th>
            <th>Tipo rodeo</th>
            <th>Días</th>
            <th>Categoría</th>
            <th>Designación</th>
            <th>Pago base</th>
            <th>Bono</th>
        </tr></thead>
        <tbody>
        ${asignaciones.map(a => {
            const bono = a.bonos && a.bonos.length > 0 ? a.bonos[a.bonos.length-1] : null;
            const esRechazada = a.estado_designacion === 'rechazado';
            let bonoHtml = '';
            if (esRechazada) {
                bonoHtml = '<span style="color:#aaa; font-size:12px;">—</span>';
            } else if (bono) {
                const est = estadoBono(bono.estado);
                const monto = ['aprobado','modificado'].includes(bono.estado) ? bono.monto_aprobado : bono.monto_solicitado;
                bonoHtml = `<span class="bono-chip ${bono.estado}" title="${est.texto}">${formatCLP(monto)} (${est.texto})</span>`;
            } else if (a.estado_designacion === 'aceptado' || a.estado_designacion === null) {
                bonoHtml = `<button class="btn btn-pequeño btn-outline" onclick="abrirSolicitarBono('${a.id}', '${sanitizar(a.rodeos?.club||'')}')">Solicitar bono</button>`;
            }

            let designacionHtml = '';
            if (a.estado_designacion === 'pendiente') {
                designacionHtml = `<div style="display:flex; gap:4px; flex-wrap:wrap;">
                    <button class="btn btn-pequeño btn-primario" onclick="abrirAceptar('${a.id}', '${sanitizar(a.rodeos?.club||'')}')">Aceptar</button>
                    <button class="btn btn-pequeño btn-peligro" onclick="abrirRechazar('${a.id}', '${sanitizar(a.rodeos?.club||'')}')">Rechazar</button>
                </div>`;
            } else if (a.estado_designacion === 'rechazado') {
                designacionHtml = `<span class="badge" style="background:#e74c3c; color:#fff;">Rechazada</span>`;
            } else {
                designacionHtml = `<span class="badge badge-activo">Aceptada</span>`;
            }

            return `<tr style="${esRechazada ? 'opacity:0.6;' : ''}">
                <td style="white-space:nowrap;">${formatFecha(a.rodeos?.fecha)}</td>
                <td><strong>${sanitizar(a.rodeos?.club||'—')}</strong></td>
                <td>${sanitizar(a.rodeos?.asociacion||'—')}</td>
                <td>${sanitizar(a.rodeos?.tipo_rodeo_nombre||'—')}</td>
                <td style="text-align:center;">${a.duracion_dias_aplicada}</td>
                <td>${a.categoria_aplicada ? `<span class="badge badge-${a.categoria_aplicada.toLowerCase()}">${a.categoria_aplicada}</span>` : '<span class="badge badge-delegado">Delegado</span>'}</td>
                <td>${designacionHtml}</td>
                <td class="${esRechazada ? '' : 'monto-positivo'}">${esRechazada ? `<span style="text-decoration:line-through; color:#aaa;">${formatCLP(a.pago_base_calculado)}</span>` : formatCLP(a.pago_base_calculado)}</td>
                <td>${bonoHtml}</td>
            </tr>`;
        }).join('')}
        </tbody>
    </table>`;
}

function abrirSolicitarBono(asignacionId, clubNombre) {
    if (!bonosConfig || bonosConfig.length === 0) {
        mostrarToast('No hay bonos de distancia configurados. Consulte con el administrador.', 'error');
        return;
    }

    document.getElementById('modal-body').innerHTML = `
        <div class="alerta alerta-info" style="margin-bottom:16px;">
            <div>Solicitar bono para: <strong>${sanitizar(clubNombre)}</strong><br>
            El administrador revisará y aprobará su solicitud.</div>
        </div>
        <form onsubmit="enviarBono(event, '${asignacionId}')">
            <div class="form-grupo">
                <label class="form-label">Distancia recorrida (km) <span class="req">*</span></label>
                <input type="number" id="km-input" class="form-control" min="1" required placeholder="Ej: 420">
                <div class="form-hint">El bono se determinará automáticamente según la distancia</div>
            </div>
            <div id="bono-sugerido" class="alerta alerta-info oculto" style="margin-bottom:12px;"></div>
            <div class="form-grupo">
                <label class="form-label">Observación (opcional)</label>
                <textarea id="obs-bono" class="form-control" rows="2" placeholder="Información adicional..."></textarea>
            </div>
            <div class="form-acciones">
                <button type="submit" class="btn btn-primario">Solicitar bono</button>
                <button type="button" class="btn btn-secundario" onclick="cerrarModal()">Cancelar</button>
            </div>
        </form>`;

    // Mostrar bono sugerido en tiempo real
    document.getElementById('km-input').addEventListener('input', function() {
        const km = parseInt(this.value);
        const div = document.getElementById('bono-sugerido');
        if (!km || km <= 0) { div.classList.add('oculto'); return; }
        const bono = bonosConfig.find(b => km >= b.distancia_minima && (b.distancia_maxima == null || km <= b.distancia_maxima));
        if (bono) {
            div.textContent = `✓ Bono correspondiente: ${bono.nombre} — ${formatCLP(bono.monto)}`;
            div.classList.remove('oculto');
        } else {
            div.className = 'alerta alerta-error';
            div.textContent = `No existe bono configurado para ${km} km. Consulte con el administrador.`;
            div.classList.remove('oculto');
        }
    });

    document.getElementById('modal-overlay').classList.remove('oculto');
}

async function enviarBono(e, asignacionId) {
    e.preventDefault();
    const btn = e.target.querySelector('button[type=submit]');
    btn.disabled = true;
    const km = parseInt(document.getElementById('km-input').value);
    const obs = document.getElementById('obs-bono').value.trim();

    try {
        const result = await api.post('/usuario/bonos', {
            asignacion_id: asignacionId,
            distancia_km: km,
            observacion: obs || undefined
        });
        mostrarToast(result.mensaje || 'Bono solicitado correctamente', 'success');
        cerrarModal();
        cargarResumen();
    } catch(err) {
        mostrarError(err);
    } finally {
        btn.disabled = false;
    }
}

// ── Aceptar/Rechazar designación ────────────────────────────────
function abrirAceptar(asigId, clubNombre) {
    document.getElementById('modal-body').innerHTML = `
        <div class="alerta alerta-info" style="margin-bottom:16px;">
            <strong>Aceptar designación:</strong> ${sanitizar(clubNombre)}<br>
            <small>Indique la distancia recorrida. Si corresponde a un tramo con bono, se generará automáticamente.</small>
        </div>
        <form onsubmit="enviarRespuesta(event, '${asigId}', 'aceptar')">
            <div class="form-grupo">
                <label class="form-label">Distancia recorrida (km) <span class="req">*</span></label>
                <input type="number" id="resp-km" class="form-control" min="0" required placeholder="Ej: 420">
                <div id="resp-bono-preview" class="alerta alerta-info oculto" style="margin-top:8px;"></div>
            </div>
            <div class="form-acciones">
                <button type="submit" class="btn btn-primario">Aceptar designación</button>
                <button type="button" class="btn btn-secundario" onclick="cerrarModal()">Cancelar</button>
            </div>
        </form>`;

    document.getElementById('resp-km').addEventListener('input', async function() {
        const km = parseInt(this.value);
        const prev = document.getElementById('resp-bono-preview');
        if (!km || km <= 0) { prev.classList.add('oculto'); return; }
        const bono = (bonosConfig || []).find(b => km >= b.distancia_minima && (b.distancia_maxima == null || km <= b.distancia_maxima));
        if (bono) {
            prev.textContent = `Bono automático: ${bono.nombre} — ${formatCLP(bono.monto)}`;
            prev.className = 'alerta alerta-info';
            prev.classList.remove('oculto');
        } else {
            prev.textContent = `Sin bono configurado para ${km} km`;
            prev.className = 'alerta alerta-error';
            prev.classList.remove('oculto');
        }
    });

    document.getElementById('modal-overlay').classList.remove('oculto');
}

function abrirRechazar(asigId, clubNombre) {
    document.getElementById('modal-body').innerHTML = `
        <div class="alerta alerta-error" style="margin-bottom:16px;">
            <strong>¿Rechazar designación?</strong><br>
            ${sanitizar(clubNombre)}<br>
            <small>Esta acción quedará registrada. El administrador podrá reasignar a otra persona.</small>
        </div>
        <form onsubmit="enviarRespuesta(event, '${asigId}', 'rechazar')">
            <div class="form-grupo">
                <label class="form-label">Motivo (opcional)</label>
                <textarea id="resp-obs" class="form-control" rows="2" placeholder="Explique brevemente por qué rechaza..."></textarea>
            </div>
            <div class="form-acciones">
                <button type="submit" class="btn btn-peligro">Sí, rechazar</button>
                <button type="button" class="btn btn-secundario" onclick="cerrarModal()">Cancelar</button>
            </div>
        </form>`;
    document.getElementById('modal-overlay').classList.remove('oculto');
}

async function enviarRespuesta(e, asigId, accion) {
    e.preventDefault();
    const btn = e.target.querySelector('button[type=submit]');
    btn.disabled = true;
    const body = { accion };
    if (accion === 'aceptar') body.distancia_km = parseInt(document.getElementById('resp-km').value);
    if (accion === 'rechazar') {
        const obs = document.getElementById('resp-obs').value.trim();
        if (obs) body.observacion_designacion = obs;
    }
    try {
        const r = await api.post(`/usuario/asignaciones/${asigId}/responder`, body);
        mostrarToast(r.mensaje || 'Respuesta registrada', 'success');
        cerrarModal();
        cargarResumen();
    } catch(err) { mostrarError(err); } finally { btn.disabled = false; }
}

function cerrarModal() { document.getElementById('modal-overlay').classList.add('oculto'); }
document.getElementById('modal-overlay').addEventListener('click', function(e) { if (e.target===this) cerrarModal(); });

init().catch(mostrarError);
</script>
</body>
</html>
